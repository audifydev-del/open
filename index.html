<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Audify</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        [x-cloak] { display: none !important; }
        :root { --app-height: 100dvh; }
        body { background: #000; color: white; overflow: hidden; height: var(--app-height); font-family: 'Inter', sans-serif; }
        .app-shell { width: 100%; max-width: 450px; height: var(--app-height); margin: 0 auto; position: relative; display: flex; flex-direction: column; }
        
        .player-view { 
            position: absolute; inset: 0; z-index: 100; background: #000; 
            transition: transform 0.5s cubic-bezier(0.32, 0.72, 0, 1); 
            overflow-y: auto; scrollbar-width: none;
        }

        .immersive-bg { 
            position: absolute; top: -10%; width: 120%; height: 90vh; 
            object-fit: cover; opacity: 0.8; filter: blur(60px) saturate(180%);
            mask-image: linear-gradient(to bottom, black 10%, transparent 90%);
            -webkit-mask-image: linear-gradient(to bottom, black 10%, transparent 90%);
            z-index: 0; transform: scale(1.2);
        }

        .main-art { 
            width: 80%; aspect-ratio: 1/1; margin: 0 auto; 
            border-radius: 12px; box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            object-fit: cover; z-index: 10; position: relative;
        }

        .lyrics-window { 
            margin-top: 10px; 
            padding: 20px 20px 60px 20px; 
            height: 350px; /* Locked height so the list stays visible below */
            overflow-y: auto;
            scrollbar-width: none; 
            position: relative;
            z-index: 20;
            mask-image: linear-gradient(to bottom, transparent 0%, black 15%, black 85%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 15%, black 85%, transparent 100%);
            scroll-behavior: smooth;
        }
        .lyrics-window::-webkit-scrollbar { display: none; }

        .lyrics-line { 
            font-size: 1.5rem; 
            font-weight: 800; 
            line-height: 1.3; 
            color: rgba(255,255,255,0.3); 
            transition: all 0.5s ease; 
            margin-bottom: 25px; 
        }
        
        .lyrics-line.active { 
            color: #fff; 
            transform: scale(1.03); 
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
        }

        .song-list-item {
            background: rgba(255,255,255,0.05);
            transition: 0.2s;
        }
        .song-list-item:active { transform: scale(0.98); background: rgba(255,255,255,0.1); }

        #yt-player-container { position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none; }
    </style>
</head>
<body x-data="audifyApp()" x-init="init()">

    <div class="app-shell" x-cloak>
        <!-- Home/Library -->
        <main class="flex-grow overflow-y-auto px-4 pt-12 pb-20 z-10 relative" x-show="!open">
             <div class="flex justify-between items-center mb-8">
                <h1 class="text-2xl font-black tracking-tight">Your Library</h1>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <template x-for="s in trending">
                    <div @click="play(s)" class="bg-white/5 rounded-md flex items-center gap-3 h-16 overflow-hidden cursor-pointer">
                        <img :src="s.thumbnail" class="h-full w-16 object-cover">
                        <span class="text-[11px] font-bold truncate pr-2" x-text="s.title"></span>
                    </div>
                </template>
            </div>
        </main>

        <!-- Full Player View -->
        <div x-show="open" class="player-view" x-transition:enter="translate-y-full" x-transition:enter-end="translate-y-0" x-transition:leave="translate-y-full">
            <img :src="active?.thumbnail" class="immersive-bg">
            
            <div class="p-8 flex flex-col relative z-10">
                <header class="flex justify-between items-center mb-6">
                    <i class="fa-solid fa-chevron-down text-xl p-2" @click="open=false"></i>
                    <p class="text-[10px] font-bold uppercase tracking-widest">Now Playing</p>
                    <i class="fa-solid fa-ellipsis-vertical text-xl p-2"></i>
                </header>
                
                <img :src="active?.thumbnail" class="main-art mb-8">

                <div class="mb-4">
                    <h2 class="text-xl font-black mb-1 truncate" x-text="active?.title"></h2>
                    <p class="text-md text-white/60 font-medium truncate" x-text="active?.artist"></p>
                </div>
                
                <div class="mb-6">
                    <div class="relative h-1 bg-white/10 rounded-full mb-2" @click="seek($event)">
                        <div class="absolute h-full bg-white rounded-full" :style="`width: ${prog}%`"></div>
                    </div>
                    <div class="flex justify-between text-[10px] font-bold text-white/40">
                        <span x-text="formatTime(currentTime)">0:00</span>
                        <span x-text="formatTime(duration)">0:00</span>
                    </div>
                </div>

                <div class="flex justify-around items-center mb-8">
                    <i class="fa-solid fa-backward-step text-2xl"></i>
                    <button @click="toggle()" class="w-14 h-14 bg-white text-black rounded-full flex items-center justify-center">
                        <i class="fa-solid text-xl" :class="playing ? 'fa-pause' : 'fa-play'"></i>
                    </button>
                    <i class="fa-solid fa-forward-step text-2xl"></i>
                </div>

                <!-- Lyrics Section -->
                <div class="mb-8">
                    <h3 class="text-[10px] font-black uppercase tracking-widest text-white/30 mb-2">Lyrics</h3>
                    <div class="lyrics-window" id="lyrics-window" @scroll="handleUserScroll">
                        <div id="lyrics-container">
                            <template x-for="(line, index) in lyrics" :key="index">
                                <div class="lyrics-line" :id="'line-'+index" :class="currentLineIndex === index ? 'active' : ''" x-text="line.text"></div>
                            </template>
                            <div x-show="lyrics.length === 0" class="text-center text-white/20 font-bold py-10">Loading...</div>
                        </div>
                    </div>
                </div>

                <!-- Song List (The List You Wanted Back) -->
                <div class="mt-4">
                    <h3 class="text-[10px] font-black uppercase tracking-widest text-white/30 mb-4">Up Next</h3>
                    <div class="space-y-3 pb-20">
                        <template x-for="s in trending">
                            <div @click="play(s)" class="song-list-item p-3 rounded-xl flex items-center gap-4 cursor-pointer">
                                <img :src="s.thumbnail" class="w-12 h-12 rounded-lg object-cover">
                                <div class="overflow-hidden flex-grow">
                                    <p class="font-bold text-xs truncate" x-text="s.title"></p>
                                    <p class="text-[10px] text-zinc-400 truncate" x-text="s.artist"></p>
                                </div>
                                <i class="fa-solid fa-play text-[10px] text-white/20"></i>
                            </div>
                        </template>
                    </div>
                </div>
            </div>
        </div>
        
        <div id="yt-player-container"><div id="player"></div></div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let ytPlayer;
        function onYouTubeIframeAPIReady() {
            ytPlayer = new YT.Player('player', {
                height: '1', width: '1', videoId: '',
                playerVars: { 'autoplay': 1, 'controls': 0, 'playsinline': 1 },
                events: {
                    'onStateChange': (e) => {
                        if(window.audifyAppInstance) {
                            window.audifyAppInstance.playing = (e.data === YT.PlayerState.PLAYING);
                            if(e.data === YT.PlayerState.PLAYING) window.audifyAppInstance.fetchLyrics(window.audifyAppInstance.active);
                        }
                    }
                }
            });
        }

        function audifyApp() {
            return {
                open: false, playing: false, prog: 0, currentTime: 0, duration: 0,
                trending: [], active: null, lyrics: [], currentLineIndex: -1, 
                isUserScrolling: false,

                formatTime(s) {
                    if(!s) return "0:00";
                    let m = Math.floor(s/60), sec = Math.floor(s%60);
                    return `${m}:${sec < 10 ? '0' : ''}${sec}`;
                },
                async init() {
                    window.audifyAppInstance = this;
                    const res = await fetch('/search?q=trending+hits');
                    this.trending = await res.json();
                    
                    setInterval(() => {
                        if(this.playing && ytPlayer?.getCurrentTime) {
                            this.currentTime = ytPlayer.getCurrentTime();
                            this.duration = ytPlayer.getDuration();
                            this.prog = (this.currentTime / this.duration) * 100;
                            this.syncLyrics();
                        }
                    }, 200);
                },
                async fetchLyrics(track) {
                    if(!track || this.lyrics.length) return;
                    try {
                        const res = await fetch(`https://lrclib.net/api/search?track_name=${encodeURIComponent(track.title)}&artist_name=${encodeURIComponent(track.artist)}`);
                        let data = await res.json();
                        if(data[0]?.syncedLyrics) {
                            this.lyrics = data[0].syncedLyrics.split('\n').map(line => {
                                const match = line.match(/\[(\d+):(\d+\.\d+)\](.*)/);
                                return match ? { time: parseInt(match[1]) * 60 + parseFloat(match[2]), text: match[3].trim() } : null;
                            }).filter(l => l?.text);
                        }
                    } catch(e) {}
                },
                syncLyrics() {
                    if(!this.lyrics.length) return;
                    let index = this.lyrics.findLastIndex(l => this.currentTime >= l.time);
                    if (index !== -1 && index !== this.currentLineIndex) {
                        this.currentLineIndex = index;
                        const activeEl = document.getElementById('line-' + index);
                        const windowEl = document.getElementById('lyrics-window');
                        if(activeEl && windowEl && !this.isUserScrolling) {
                            windowEl.scrollTo({ top: activeEl.offsetTop - 100, behavior: 'smooth' });
                        }
                    }
                },
                handleUserScroll() {
                    this.isUserScrolling = true;
                    clearTimeout(this.scrollTimeout);
                    this.scrollTimeout = setTimeout(() => this.isUserScrolling = false, 3000);
                },
                play(s) {
                    this.active = s;
                    this.open = true;
                    this.lyrics = [];
                    this.currentLineIndex = -1;
                    ytPlayer.loadVideoById(s.id);
                    // Scroll to top of player view when changing songs
                    document.querySelector('.player-view').scrollTo(0,0);
                },
                toggle() { this.playing ? ytPlayer.pauseVideo() : ytPlayer.playVideo(); },
                seek(e) { ytPlayer.seekTo((e.offsetX / e.currentTarget.offsetWidth) * this.duration); }
            }
        }
    </script>
</body>
</html>
