<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player - Innertube Stream</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b0b0b; color: #fff; }
        .spotify-card { background: #181818; transition: 0.3s; cursor: pointer; }
        .spotify-card:hover { background: #282828; }
        .progress-container:hover .progress-handle { opacity: 1; }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">

    <div class="flex flex-1 overflow-hidden">
        <main class="flex-1 p-8 overflow-y-auto bg-gradient-to-b from-zinc-800 to-black">
            <div class="flex gap-4 mb-10">
                <input id="search-input" type="text" placeholder="Search for music..." 
                       class="w-full max-w-md p-3 rounded-full bg-zinc-900 text-white outline-none border-2 border-transparent focus:border-green-500">
                <button onclick="searchMusic()" class="bg-green-500 text-black font-bold py-3 px-8 rounded-full">Search</button>
            </div>

            <div id="results" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6 mb-24">
                </div>
        </main>
    </div>

    <footer class="h-24 bg-black border-t border-zinc-900 px-4 flex items-center justify-between fixed bottom-0 w-full z-50">
        <div class="flex items-center w-1/3">
            <img id="p-thumb" src="" class="hidden w-14 h-14 rounded mr-4">
            <div class="overflow-hidden">
                <div id="p-title" class="font-bold text-sm truncate">Ready to play</div>
                <div id="p-artist" class="text-zinc-400 text-xs truncate">Select a song</div>
            </div>
        </div>

        <div class="flex flex-col items-center w-1/3 gap-2">
            <div class="flex items-center gap-6">
                <button onclick="togglePlay()" id="play-btn" class="bg-white text-black rounded-full w-10 h-10 flex items-center justify-center hover:scale-105 transition">▶</button>
            </div>
            <div class="w-full flex items-center gap-2 group">
                <span id="current-time" class="text-[10px] text-zinc-400">0:00</span>
                <div class="flex-1 bg-zinc-800 h-1 rounded-full relative progress-container cursor-pointer" onclick="seek(event)">
                    <div id="progress-bar" class="bg-white h-full w-0 rounded-full group-hover:bg-green-500"></div>
                </div>
                <span id="total-duration" class="text-[10px] text-zinc-400">0:00</span>
            </div>
        </div>

        <div class="w-1/3 flex justify-end">
            <audio id="main-audio" class="hidden"></audio>
        </div>
    </footer>

    <script>
        const audio = document.getElementById('main-audio');
        const playBtn = document.getElementById('play-btn');

        async function searchMusic() {
            const query = document.getElementById('search-input').value;
            const res = await fetch(`/search?q=${encodeURIComponent(query)}`);
            const songs = await res.json();
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '';

            songs.forEach(song => {
                resultsDiv.innerHTML += `
                    <div class="spotify-card p-4 rounded-lg" onclick="playSong('${song.id}', '${song.title.replace(/'/g, "\\'")}', '${song.artist.replace(/'/g, "\\'")}', '${song.thumbnail}')">
                        <img src="${song.thumbnail}" class="w-full aspect-square object-cover rounded shadow-lg mb-4">
                        <h3 class="font-bold truncate">${song.title}</h3>
                        <p class="text-zinc-400 text-xs truncate">${song.artist}</p>
                    </div>`;
            });
        }

        async function playSong(id, title, artist, thumb) {
            document.getElementById('p-title').innerText = title;
            document.getElementById('p-artist').innerText = artist;
            document.getElementById('p-thumb').src = thumb;
            document.getElementById('p-thumb').classList.remove('hidden');

            const res = await fetch(`/get_audio?id=${id}`);
            const data = await res.json();

            if (data.url) {
                audio.src = data.url;
                audio.play();
                playBtn.innerText = '⏸';
            } else {
                alert("This song is restricted for direct streaming.");
            }
        }

        function togglePlay() {
            if (audio.paused) { audio.play(); playBtn.innerText = '⏸'; }
            else { audio.pause(); playBtn.innerText = '▶'; }
        }

        audio.ontimeupdate = () => {
            const progress = (audio.currentTime / audio.duration) * 100;
            document.getElementById('progress-bar').style.width = progress + "%";
            document.getElementById('current-time').innerText = formatTime(audio.currentTime);
            document.getElementById('total-duration').innerText = formatTime(audio.duration);
        };

        function formatTime(secs) {
            if (isNaN(secs)) return "0:00";
            const min = Math.floor(secs / 60);
            const sec = Math.floor(secs % 60);
            return `${min}:${sec < 10 ? '0' : ''}${sec}`;
        }

        function seek(e) {
            const rect = e.currentTarget.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            audio.currentTime = percent * audio.duration;
        }
    </script>
</body>
</html>
