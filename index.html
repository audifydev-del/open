<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Audify</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --theme-color: #121212; }
        [x-cloak] { display: none !important; }
        
        body, html { 
            background-color: #000; margin: 0; padding: 0; 
            height: 100%; width: 100%; display: flex; 
            justify-content: center; align-items: center; overflow: hidden;
        }

        .app-shell { 
            width: 100%; max-width: 450px; height: 100%; 
            position: relative; 
            background-color: var(--theme-color) !important; 
            transition: background-color 1.2s ease-in-out;
            overflow: hidden;
        }

        .immersive-player {
            position: absolute; inset: 0;
            background-color: var(--theme-color); 
            z-index: 100;
            display: flex; flex-direction: column;
            transition: transform 0.6s cubic-bezier(0.32, 0.72, 0, 1), background-color 1.2s ease;
        }

        .artwork-container { 
            position: absolute; top: 0; left: 0; width: 100%; height: 65%; z-index: 1;
        }
        .artwork-container img { width: 100%; height: 100%; object-fit: cover; }
        
        .artwork-overlay { 
            position: absolute; inset: 0; 
            background: linear-gradient(to bottom, transparent 0%, rgba(0,0,0,0.3) 50%, var(--theme-color) 100%); 
            z-index: 2;
        }

        .player-content { position: relative; z-index: 10; margin-top: auto; padding: 0 30px 60px; }

        input[type="range"].progress-bar { 
            width: 100%; -webkit-appearance: none; background: rgba(255,255,255,0.2); 
            height: 4px; border-radius: 10px; outline: none;
        }
        input[type="range"].progress-bar::-webkit-slider-thumb { 
            -webkit-appearance: none; height: 14px; width: 14px; background: #fff; border-radius: 50%; 
        }
        
        #yt-hidden { position: absolute; top: -9999px; visibility: hidden; }
        canvas { display: none; }
    </style>
</head>
<body>

<div x-data="audifyApp()" x-init="initApp()" class="app-shell" id="appShell">
    <canvas id="colorCanvas"></canvas>
    
    <!-- Simplified Home UI -->
    <div class="home-page p-6">
        <input type="text" x-model="searchQuery" @keydown.enter="fetchData(searchQuery)" 
               placeholder="Search..." class="w-full bg-white/10 rounded-xl py-3 px-5 text-white mb-6">
        <div class="grid grid-cols-2 gap-4">
            <template x-for="song in songs" :key="song.id">
                <div class="bg-white/5 p-3 rounded-2xl" @click="playSong(song)">
                    <img :src="song.thumbnail" class="w-full aspect-square rounded-lg object-cover mb-2">
                    <p class="text-xs font-bold text-white truncate" x-text="song.title"></p>
                </div>
            </template>
        </div>
    </div>

    <!-- PLAYER UI -->
    <div class="immersive-player" :style="playerOpen ? 'transform: translateY(0)' : 'transform: translateY(100%)'">
        <div class="artwork-container">
            <img :src="activeTrack?.thumbnail" id="playerImg" crossorigin="anonymous">
            <div class="artwork-overlay"></div>
        </div>

        <div class="relative z-20 flex justify-between p-6 pt-10 text-white">
            <button @click="playerOpen = false"><i class="fa-solid fa-chevron-down text-xl"></i></button>
        </div>

        <div class="player-content text-white">
            <div class="mb-10">
                <h2 class="text-2xl font-black truncate" x-text="activeTrack?.title"></h2>
                <p class="text-lg text-white/60 font-bold" x-text="activeTrack?.artist"></p>
            </div>
            <div class="mb-8">
                <input type="range" class="progress-bar" min="0" :max="duration" x-model="currentTime" @input="seekMusic">
            </div>
            <div class="flex justify-center">
                <button @click="togglePlay()" class="w-16 h-16 bg-white text-black rounded-full flex items-center justify-center">
                    <i class="fa-solid text-2xl" :class="isPlaying ? 'fa-pause' : 'fa-play'"></i>
                </button>
            </div>
        </div>
    </div>

    <div id="yt-hidden"><div id="youtube-player"></div></div>
</div>

<script>
    var player;
    // Global callback for JSONP
    window.handleItunesResponse = function(data) {
        window.dispatchEvent(new CustomEvent('itunes-data', { detail: data }));
    };

    function audifyApp() {
        return {
            songs: [], searchQuery: '', activeTrack: null, playerOpen: true, isPlaying: true, currentTime: 0, duration: 0,
            initApp() {
                this.fetchData('Trending');
                let tag = document.createElement('script');
                tag.src = "https://www.youtube.com/iframe_api";
                document.head.appendChild(tag);
            },
            async fetchData(q) {
                const res = await fetch(`/search?q=${encodeURIComponent(q)}`);
                this.songs = await res.json();
            },
            async playSong(song) {
                this.activeTrack = song;
                this.playerOpen = true;

                // 1. JSONP Request to iTunes (Bypasses CORS without Proxy)
                const script = document.createElement('script');
                const term = encodeURIComponent(`${song.artist} ${song.title}`);
                script.src = `https://itunes.apple.com/search?term=${term}&limit=1&entity=song&callback=handleItunesResponse`;
                
                const onData = (e) => {
                    const data = e.detail;
                    if (data.results?.length > 0) {
                        const imgUrl = data.results[0].artworkUrl100.replace('100x100bb.jpg', '600x600bb.jpg');
                        this.activeTrack.thumbnail = imgUrl;
                        
                        // Extract color after image loads
                        const img = new Image();
                        img.crossOrigin = "anonymous";
                        img.src = imgUrl;
                        img.onload = () => this.updateTheme(img);
                    }
                    window.removeEventListener('itunes-data', onData);
                    document.body.removeChild(script);
                };
                
                window.addEventListener('itunes-data', onData);
                document.body.appendChild(script);

                // 2. YouTube
                if (player && typeof player.loadVideoById === 'function') {
                    player.loadVideoById(song.id);
                } else {
                    player = new YT.Player('youtube-player', {
                        height: '1', width: '1', videoId: song.id,
                        playerVars: { 'origin': window.location.origin },
                        events: { 'onStateChange': (e) => { if(e.data == 1) this.duration = Math.floor(player.getDuration()); } }
                    });
                }
            },
            updateTheme(img) {
                const canvas = document.getElementById('colorCanvas');
                const ctx = canvas.getContext('2d');
                canvas.width = 10; canvas.height = 10;
                ctx.drawImage(img, 0, 0, 10, 10);
                const p = ctx.getImageData(0, 0, 10, 10).data;
                let r=0, g=0, b=0;
                for (let i=0; i<p.length; i+=4) { r += p[i]; g += p[i+1]; b += p[i+2]; }
                const count = p.length/4;
                
                const color = `rgb(${Math.max(15, (r/count)-40)}, ${Math.max(15, (g/count)-40)}, ${Math.max(15, (b/count)-40)})`;
                
                // Force update on both elements
                document.documentElement.style.setProperty('--theme-color', color);
                const shell = document.getElementById('appShell');
                const player = document.querySelector('.immersive-player');
                if(shell) shell.style.backgroundColor = color;
                if(player) player.style.backgroundColor = color;
            },
            togglePlay() { 
                this.isPlaying = !this.isPlaying; 
                this.isPlaying ? player.playVideo() : player.pauseVideo(); 
            },
            seekMusic() { player.seekTo(this.currentTime, true); },
            formatTime(s) { if(!s) return '0:00'; let m=Math.floor(s/60), sec=Math.floor(s%60); return `${m}:${sec<10?'0':''}${sec}`; }
        }
    }
</script>
</body>
</html>
