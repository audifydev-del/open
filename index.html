<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Audify</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --theme-color: #0f0f0f; }
        [x-cloak] { display: none !important; }
        
        body, html { 
            background-color: #000; margin: 0; padding: 0; 
            height: 100%; width: 100%; overflow: hidden;
            font-family: 'Inter', sans-serif;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }

        .app-shell { 
            width: 100%; max-width: 450px; height: 100%; margin: 0 auto;
            position: relative; 
            background-color: var(--theme-color) !important; 
            transition: background-color 1s ease-in-out;
        }

        /* FIXED: Main player is now scrollable */
        .immersive-player {
            position: absolute; inset: 0;
            background-color: var(--theme-color); 
            z-index: 100;
            display: flex; flex-direction: column;
            transition: transform 0.6s cubic-bezier(0.32, 0.72, 0, 1), background-color 1s ease;
            overflow-y: auto; /* Re-enabled scrolling */
            scroll-snap-type: y proximity;
        }
        .immersive-player::-webkit-scrollbar { display: none; }

        .artwork-container { 
            position: relative; width: 100%; height: 45vh; min-height: 320px; shrink: 0;
            scroll-snap-align: start;
        }
        .artwork-container img { width: 100%; height: 100%; object-fit: cover; }
        
        .artwork-overlay { 
            position: absolute; inset: 0; 
            background: linear-gradient(to bottom, transparent 0%, rgba(0,0,0,0.1) 40%, var(--theme-color) 100%); 
        }

        .player-content { padding: 0 30px 20px; shrink: 0; }

        .lyrics-section {
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            scroll-snap-align: start;
        }

        .lyrics-scroll-box {
            flex-grow: 1;
            padding: 0 60px; 
            mask-image: linear-gradient(to bottom, transparent 0%, black 20%, black 80%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 20%, black 80%, transparent 100%);
        }

        .scroll-spacer { height: 40vh; }

        .lyric-line {
            font-size: 2rem;
            line-height: 1.2;
            font-weight: 900;
            margin-bottom: 40px;
            transition: all 0.4s ease;
            color: rgba(255, 255, 255, 0.1);
            filter: blur(1px);
        }

        .lyric-line.active { 
            color: #fff; 
            transform: scale(1.05); 
            filter: blur(0px);
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
        }

        input[type="range"].progress-bar { 
            width: 100%; -webkit-appearance: none; background: rgba(255,255,255,0.15); 
            height: 4px; border-radius: 10px; outline: none;
        }
        input[type="range"].progress-bar::-webkit-slider-thumb { 
            -webkit-appearance: none; height: 16px; width: 16px; background: #fff; border-radius: 50%; 
        }

        #yt-hidden { position: absolute; top: -9999px; visibility: hidden; }
        canvas { display: none; }
    </style>
</head>
<body>

<div x-data="audifyApp()" x-init="initApp()" class="app-shell" id="appShell">
    <canvas id="colorCanvas"></canvas>
    
    <!-- Home UI -->
    <div class="h-full flex flex-col" x-show="!playerOpen">
        <header class="p-6 text-white">
            <h1 class="text-4xl font-black mb-4 tracking-tighter">Audify</h1>
            <input type="text" x-model="searchQuery" @keydown.enter="fetchData(searchQuery)" 
                   placeholder="Search..." class="w-full bg-white/10 rounded-2xl py-4 px-6 outline-none">
        </header>
        <main class="flex-grow overflow-y-auto px-4 pb-24">
            <div class="grid grid-cols-2 gap-4">
                <template x-for="song in songs" :key="song.id">
                    <div class="bg-white/5 p-3 rounded-2xl cursor-pointer" @click="playSong(song)">
                        <img :src="song.thumbnail" class="w-full aspect-square rounded-xl object-cover mb-2">
                        <p class="text-sm font-bold truncate text-white" x-text="song.title"></p>
                    </div>
                </template>
            </div>
        </main>
    </div>

    <!-- PLAYER PAGE -->
    <div class="immersive-player" id="mainPlayer" :style="playerOpen ? 'transform: translateY(0)' : 'transform: translateY(100%)'">
        <div class="artwork-container">
            <img :src="activeTrack?.thumbnail" crossorigin="anonymous">
            <div class="artwork-overlay"></div>
            <button @click="playerOpen = false" class="absolute top-10 left-6 z-30 p-2 text-white opacity-40"><i class="fa-solid fa-chevron-down text-xl"></i></button>
        </div>

        <div class="player-content text-white">
            <div class="mb-4">
                <h2 class="text-2xl font-black truncate" x-text="activeTrack?.title"></h2>
                <p class="text-lg text-white/50 font-bold" x-text="activeTrack?.artist"></p>
            </div>

            <div class="mb-6">
                <input type="range" class="progress-bar" min="0" :max="duration" x-model="currentTime" @input="seekMusic">
                <div class="flex justify-between mt-2 text-[10px] font-bold text-white/20">
                    <span x-text="formatTime(currentTime)">0:00</span>
                    <span x-text="formatTime(duration)">0:00</span>
                </div>
            </div>

            <div class="flex justify-between items-center mb-6">
                <i class="fa-solid fa-shuffle text-lg opacity-20"></i>
                <i class="fa-solid fa-backward-step text-2xl"></i>
                <button @click="togglePlay()" class="w-16 h-16 bg-white text-black rounded-full flex items-center justify-center">
                    <i class="fa-solid text-2xl" :class="isPlaying ? 'fa-pause' : 'fa-play'"></i>
                </button>
                <i class="fa-solid fa-forward-step text-2xl"></i>
                <i class="fa-solid fa-repeat text-lg opacity-20"></i>
            </div>
        </div>

        <!-- LYRICS SECTION -->
        <div class="lyrics-section" id="lyricsSection">
            <div class="lyrics-scroll-box">
                <div class="scroll-spacer"></div>
                <template x-for="(line, index) in parsedLyrics" :key="index">
                    <div class="lyric-line" 
                         :id="'line-' + index"
                         :class="{ 'active': isLineActive(index) }"
                         x-text="line.text"></div>
                </template>
                <div class="scroll-spacer"></div>
            </div>
        </div>
    </div>

    <div id="yt-hidden"><div id="youtube-player"></div></div>
</div>

<script>
    var player;
    window.handleItunesResponse = function(data) { window.dispatchEvent(new CustomEvent('itunes-data', { detail: data })); };

    function audifyApp() {
        return {
            songs: [], searchQuery: '', activeTrack: null, playerOpen: false, isPlaying: false, 
            currentTime: 0, duration: 0, parsedLyrics: [], lastIndex: -1,

            initApp() {
                this.fetchData('Trending');
                let tag = document.createElement('script');
                tag.src = "https://www.youtube.com/iframe_api";
                document.head.appendChild(tag);
            },
            async fetchData(q) {
                const res = await fetch(`/search?q=${encodeURIComponent(q)}`);
                this.songs = await res.json();
            },
            isLineActive(index) {
                const active = this.currentTime >= this.parsedLyrics[index].time && 
                             (this.parsedLyrics[index+1] ? this.currentTime < this.parsedLyrics[index+1].time : true);
                if(active && this.lastIndex !== index) {
                    this.lastIndex = index;
                    this.scrollLyrics(index);
                }
                return active;
            },
            scrollLyrics(index) {
                const line = document.getElementById('line-' + index);
                const container = document.getElementById('mainPlayer');
                const section = document.getElementById('lyricsSection');
                
                if (line && container) {
                    // Only auto-scroll if the user is actually looking at the lyrics section
                    if (container.scrollTop > 200) {
                        const targetPos = line.offsetTop - (container.clientHeight / 2) + (line.clientHeight / 2);
                        container.scrollTo({ top: targetPos, behavior: 'smooth' });
                    }
                }
            },
            async playSong(song) {
                this.activeTrack = JSON.parse(JSON.stringify(song)); 
                this.playerOpen = true;
                this.isPlaying = true;
                this.parsedLyrics = [];
                this.lastIndex = -1;

                const script = document.createElement('script');
                script.src = `https://itunes.apple.com/search?term=${encodeURIComponent(song.artist + ' ' + song.title)}&limit=1&entity=song&callback=handleItunesResponse`;
                window.addEventListener('itunes-data', (e) => {
                    if (e.detail.results?.length > 0) {
                        const hqUrl = e.detail.results[0].artworkUrl100.replace('100x100bb.jpg', '800x800bb.jpg');
                        this.activeTrack.thumbnail = hqUrl;
                        const tempImg = new Image(); tempImg.crossOrigin = "anonymous"; tempImg.src = hqUrl;
                        tempImg.onload = () => this.updateTheme(tempImg);
                    }
                }, { once: true });
                document.body.appendChild(script);

                if (player && player.loadVideoById) {
                    player.loadVideoById(song.id);
                } else {
                    player = new YT.Player('youtube-player', {
                        height: '1', width: '1', videoId: song.id,
                        events: { 'onStateChange': (e) => { if(e.data == 1) this.getLyrics(song.artist, song.title); } }
                    });
                }

                if(!this.intv) {
                    setInterval(() => { if(player && this.isPlaying) this.currentTime = player.getCurrentTime(); }, 500);
                    this.intv = true;
                }
            },
            async getLyrics(artist, title) {
                const res = await fetch(`https://lrclib.net/api/search?artist_name=${encodeURIComponent(artist)}&track_name=${encodeURIComponent(title)}`);
                const data = await res.json();
                const best = data.find(l => l.syncedLyrics);
                if(best) {
                    this.parsedLyrics = best.syncedLyrics.split('\n').map(line => {
                        const m = line.match(/\[(\d+):(\d+\.\d+)\](.*)/);
                        return m ? { time: parseInt(m[1]) * 60 + parseFloat(m[2]), text: m[3].trim() } : null;
                    }).filter(l => l && l.text);
                }
            },
            updateTheme(img) {
                const canvas = document.getElementById('colorCanvas');
                const ctx = canvas.getContext('2d');
                canvas.width = 10; canvas.height = 10;
                ctx.drawImage(img, 0, 0, 10, 10);
                const p = ctx.getImageData(0, 0, 10, 10).data;
                let r=0, g=0, b=0, count = p.length/4;
                for (let i=0; i<p.length; i+=4) { r += p[i]; g += p[i+1]; b += p[i+2]; }
                const color = `rgb(${Math.max(15, (r/count)-45)}, ${Math.max(15, (g/count)-45)}, ${Math.max(15, (b/count)-45)})`;
                document.documentElement.style.setProperty('--theme-color', color);
                document.getElementById('appShell').style.backgroundColor = color;
            },
            togglePlay() { this.isPlaying = !this.isPlaying; this.isPlaying ? player.playVideo() : player.pauseVideo(); },
            seekMusic() { player.seekTo(this.currentTime, true); },
            formatTime(s) { if(!s || s < 0) return '0:00'; let m=Math.floor(s/60), sec=Math.floor(s%60); return `${m}:${sec<10?'0':''}${sec}`; }
        }
    }
</script>
</body>
</html>
