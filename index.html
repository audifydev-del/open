<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Clone</title>
    <style>
        body { background-color: #121212; color: white; font-family: sans-serif; margin: 0; }
        .navbar { background: black; padding: 15px; display: flex; gap: 10px; }
        input { padding: 10px; border-radius: 20px; border: none; width: 300px; }
        .container { padding: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
        .song-card { background: #181818; padding: 15px; border-radius: 8px; transition: 0.3s; cursor: pointer; }
        .song-card:hover { background: #282828; }
        .song-card img { width: 100%; border-radius: 4px; }
        .player-bar { position: fixed; bottom: 0; width: 100%; background: #181818; padding: 15px; border-top: 1px solid #282828; }
    </style>
</head>
<body>

    <div class="navbar">
        <input type="text" id="search-input" placeholder="What do you want to listen to?">
        <button onclick="searchMusic()" style="border-radius: 20px; cursor: pointer; padding: 10px 20px;">Search</button>
    </div>

    <div class="container" id="results">
        <!-- Search results will appear here -->
    </div>

    <div class="player-bar" id="player">
        <div id="current-song">Select a song to play</div>
        <audio id="audio-player" controls style="width: 100%; margin-top: 10px;"></audio>
    </div>

    <script>
        async function searchMusic() {
            const query = document.getElementById('search-input').value;
            const res = await fetch(`/search?q=${query}`);
            const songs = await res.json();
            
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '';

            songs.forEach(song => {
                const card = document.createElement('div');
                card.className = 'song-card';
                card.innerHTML = `
                    <img src="${song.thumbnail}">
                    <h4>${song.title}</h4>
                    <p style="color: #b3b3b3; font-size: 14px;">${song.artist}</p>
                `;
                card.onclick = () => playSong(song.title, song.artist, song.id);
                resultsDiv.appendChild(card);
            });
        }

        function playSong(title, artist, id) {
            document.getElementById('current-song').innerText = `${title} - ${artist}`;
            // Note: Direct streaming requires a library like 'yt-dlp' or a proxy 
            // because YouTube blocks direct video links. This is a placeholder:
            alert("To play the audio, you'll need to add a stream extractor logic in Python!");
        }
    </script>
</body>
</html>
