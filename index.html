<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Audify</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        [x-cloak] { display: none !important; }
        :root { --app-height: 100dvh; }
        body { background: #000; color: white; overflow: hidden; height: var(--app-height); font-family: 'Inter', sans-serif; }
        .app-shell { width: 100%; max-width: 450px; height: var(--app-height); margin: 0 auto; position: relative; display: flex; flex-direction: column; }
        
        .shelf { display: flex; overflow-x: auto; gap: 16px; scrollbar-width: none; padding-bottom: 10px; }
        .shelf::-webkit-scrollbar { display: none; }
        
        .bottom-nav { 
            background: linear-gradient(to top, #000 85%, transparent); 
            position: absolute; bottom: 0; left: 0; right: 0; 
            height: 85px; display: flex; justify-content: space-around; 
            align-items: center; z-index: 50; padding-bottom: env(safe-area-inset-bottom); 
        }
        
        .nav-item { display: flex; flex-direction: column; align-items: center; opacity: 0.6; transition: 0.2s; cursor: pointer; }
        .nav-item.active { opacity: 1; transform: scale(1.1); }

        .player-view { 
            position: absolute; inset: 0; z-index: 100; background: #000; 
            transition: transform 0.5s cubic-bezier(0.32, 0.72, 0, 1); 
            display: flex; flex-direction: column;
        }
        
        .immersive-bg { 
            position: absolute; top: -10%; width: 120%; height: 90vh; 
            object-fit: cover; opacity: 0.8; filter: blur(60px) saturate(180%);
            mask-image: linear-gradient(to bottom, black 10%, transparent 90%);
            -webkit-mask-image: linear-gradient(to bottom, black 10%, transparent 90%);
            z-index: 0; transform: scale(1.2);
        }

        .main-art { 
            width: 280px; aspect-ratio: 1/1; margin: 0 auto; 
            border-radius: 12px; box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            object-fit: cover; z-index: 10; position: relative;
        }

        /* --- THE INVISIBLE SCROLL BOX --- */
        .lyrics-scroll-box {
            flex-grow: 1;
            overflow-y: auto;
            margin-top: 20px;
            padding: 0 32px 120px 32px;
            scrollbar-width: none; /* Firefox */
            -ms-overflow-style: none; /* IE/Edge */
        }
        .lyrics-scroll-box::-webkit-scrollbar { display: none; } /* Chrome/Safari */

        .lyrics-line { 
            font-size: 1.6rem; 
            font-weight: 800; 
            line-height: 1.3; 
            color: rgba(255,255,255,0.2); 
            transition: all 0.4s ease; 
            margin-bottom: 24px; 
            transform-origin: left;
            filter: blur(1px);
        }
        .lyrics-line.active { 
            color: #fff; 
            transform: scale(1.05); 
            filter: blur(0px);
        }

        .btn-active:active { transform: scale(0.92); opacity: 0.7; }
        #yt-player-container { position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none; }
    </style>
</head>
<body x-data="audifyApp()" x-init="init()">

    <div class="fixed inset-0 bg-black z-[200] flex items-center justify-center" x-show="splash" x-transition:leave="duration-700">
        <p class="font-bold tracking-[0.4em] uppercase text-[12px] animate-pulse">Audify</p>
    </div>

    <div class="app-shell" x-cloak>
        <!-- Main Content -->
        <main class="flex-grow overflow-y-auto px-4 pt-12 pb-44 z-10 relative">
            <div class="flex justify-between items-center mb-8">
                <h1 class="text-2xl font-black tracking-tight" x-text="currentView === 'home' ? greet() : 'Search'"></h1>
                <div class="flex gap-5 text-lg"><i class="fa-regular fa-bell"></i><i class="fa-solid fa-gear"></i></div>
            </div>

            <div x-show="currentView === 'home'" x-transition>
                <div class="grid grid-cols-2 gap-3 mb-10">
                    <template x-for="s in trending.slice(0, 6)">
                        <div @click="play(s)" class="bg-white/5 border border-white/5 rounded-md flex items-center gap-3 h-16 btn-active overflow-hidden">
                            <img :src="s.thumbnail" class="h-full w-16 object-cover">
                            <span class="text-[11px] font-bold truncate leading-tight pr-2" x-text="s.title"></span>
                        </div>
                    </template>
                </div>

                <h2 class="text-xl font-bold mb-4">Jump back in</h2>
                <div class="shelf">
                    <template x-for="s in trending">
                        <div @click="play(s)" class="w-36 flex-shrink-0 btn-active">
                            <img :src="s.thumbnail" class="w-36 h-36 rounded-lg shadow-2xl mb-3 object-cover">
                            <p class="text-xs font-bold truncate mb-0.5" x-text="s.title"></p>
                            <p class="text-[10px] text-zinc-500 truncate" x-text="s.artist"></p>
                        </div>
                    </template>
                </div>
            </div>

            <div x-show="currentView === 'search'" x-transition>
                <div class="relative mb-8">
                    <i class="fa-solid fa-magnifying-glass absolute left-4 top-4 text-zinc-500"></i>
                    <input type="text" x-model="query" @input.debounce.500ms="searchMusic()" placeholder="Search songs..." class="w-full p-4 pl-12 rounded-xl bg-zinc-900 text-white font-medium outline-none border border-white/5">
                </div>
                <div class="space-y-5">
                    <template x-for="s in searchResults">
                        <div @click="play(s)" class="flex items-center gap-4 btn-active">
                            <img :src="s.thumbnail" class="w-14 h-14 rounded-md object-cover">
                            <div class="overflow-hidden flex-grow">
                                <p class="font-bold text-sm truncate" x-text="s.title"></p>
                                <p class="text-xs text-zinc-400 truncate" x-text="s.artist"></p>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </main>

        <!-- Mini Player -->
        <div x-show="active && !open" @click="open=true" class="fixed bottom-[95px] left-3 right-3 max-w-[425px] mx-auto bg-zinc-900/80 backdrop-blur-xl border border-white/10 h-16 rounded-xl flex items-center px-3 gap-4 z-40 shadow-2xl">
            <img :src="active?.thumbnail" class="w-11 h-11 rounded-lg object-cover">
            <div class="flex-grow overflow-hidden">
                <p class="text-[12px] font-bold truncate" x-text="active?.title"></p>
                <p class="text-[10px] text-zinc-400 truncate" x-text="active?.artist"></p>
            </div>
            <button @click.stop="toggle()"><i class="fa-solid text-white text-lg" :class="playing ? 'fa-pause' : 'fa-play'"></i></button>
            <div class="absolute bottom-0 left-0 h-[2px] bg-white/30 rounded-full" style="width: 100%;">
                <div class="h-full bg-white transition-all" :style="`width: ${prog}%`"></div>
            </div>
        </div>

        <nav class="bottom-nav">
            <div class="nav-item" :class="currentView === 'home' ? 'active' : ''" @click="currentView = 'home'"><i class="fa-solid fa-house"></i><span class="text-[10px] font-bold">Home</span></div>
            <div class="nav-item" :class="currentView === 'search' ? 'active' : ''" @click="currentView = 'search'"><i class="fa-solid fa-magnifying-glass"></i><span class="text-[10px] font-bold">Search</span></div>
        </nav>

        <!-- Full Player -->
        <div x-show="open" class="player-view" x-transition:enter="translate-y-full" x-transition:enter-end="translate-y-0" x-transition:leave="translate-y-full">
            <img :src="active?.thumbnail" class="immersive-bg">
            
            <!-- Static Top Part -->
            <div class="p-8 pb-0 relative z-10">
                <header class="flex justify-between items-center mb-6">
                    <i class="fa-solid fa-chevron-down text-xl p-2 btn-active" @click="open=false"></i>
                    <p class="text-[11px] font-bold uppercase tracking-widest">Now Playing</p>
                    <i class="fa-solid fa-ellipsis-vertical text-xl p-2"></i>
                </header>
                
                <img :src="active?.thumbnail" class="main-art mb-8">

                <div class="mb-6">
                    <h2 class="text-2xl font-black mb-1 truncate" x-text="active?.title"></h2>
                    <p class="text-lg text-white/60 font-medium truncate" x-text="active?.artist"></p>
                </div>
                
                <div class="mb-6">
                    <div class="relative h-1.5 bg-white/10 rounded-full mb-2" @click="seek($event)">
                        <div class="absolute h-full bg-white rounded-full" :style="`width: ${prog}%`"></div>
                    </div>
                    <div class="flex justify-between text-[10px] font-bold text-white/40">
                        <span x-text="formatTime(currentTime)">0:00</span>
                        <span x-text="formatTime(duration)">0:00</span>
                    </div>
                </div>

                <div class="flex justify-around items-center mb-4">
                    <i class="fa-solid fa-backward-step text-3xl"></i>
                    <button @click="toggle()" class="w-16 h-16 bg-white text-black rounded-full flex items-center justify-center shadow-2xl">
                        <i class="fa-solid text-2xl" :class="playing ? 'fa-pause' : 'fa-play'"></i>
                    </button>
                    <i class="fa-solid fa-forward-step text-3xl"></i>
                </div>
            </div>

            <!-- Scrollable Lyrics Box (Invisible Box) -->
            <div class="lyrics-scroll-box z-10">
                <h3 class="text-xs font-black uppercase tracking-widest text-white/30 mb-6">Lyrics</h3>
                <div class="space-y-6">
                    <template x-for="(line, index) in lyrics">
                        <div class="lyrics-line" 
                             :class="currentLineIndex === index ? 'active' : ''" 
                             x-text="line.text"></div>
                    </template>
                </div>
            </div>
        </div>
        
        <div id="yt-player-container"><div id="player"></div></div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let ytPlayer;

        function onYouTubeIframeAPIReady() {
            ytPlayer = new YT.Player('player', {
                height: '1', width: '1', videoId: '',
                playerVars: { 'autoplay': 1, 'controls': 0, 'disablekb': 1, 'playsinline': 1, 'origin': window.location.origin },
                events: {
                    'onStateChange': (e) => {
                        if(window.audifyAppInstance) window.audifyAppInstance.playing = (e.data === YT.PlayerState.PLAYING);
                    }
                }
            });
        }

        function audifyApp() {
            return {
                splash: true, currentView: 'home', query: '', open: false,
                playing: false, prog: 0, currentTime: 0, duration: 0,
                trending: [], searchResults: [], active: null,
                lyrics: [], currentLineIndex: -1,
                greet() { return ['Good Morning','Good Afternoon','Good Evening'][Math.floor(new Date().getHours()/8)] || 'Audify' },
                formatTime(s) {
                    if(!s) return "0:00";
                    let m = Math.floor(s/60);
                    let sec = Math.floor(s%60);
                    return `${m}:${sec < 10 ? '0' : ''}${sec}`;
                },
                async init() {
                    window.audifyAppInstance = this;
                    setTimeout(() => this.splash = false, 1500);
                    try {
                        const res = await fetch('/search?q=trending+hits');
                        this.trending = await res.json();
                    } catch(e) {}

                    setInterval(() => {
                        if(this.playing && ytPlayer && ytPlayer.getCurrentTime) {
                            this.currentTime = ytPlayer.getCurrentTime();
                            this.duration = ytPlayer.getDuration();
                            this.prog = (this.currentTime / this.duration) * 100;
                            this.syncLyrics();
                        }
                    }, 250);
                },
                async searchMusic() {
                    if(!this.query) return;
                    const res = await fetch(`/search?q=${encodeURIComponent(this.query)}`);
                    this.searchResults = await res.json();
                },
                async fetchLyrics(track) {
                    this.lyrics = [];
                    try {
                        const res = await fetch(`https://lrclib.net/api/search?track_name=${encodeURIComponent(track.title)}&artist_name=${encodeURIComponent(track.artist)}`);
                        const data = await res.json();
                        if(!data.length) return;
                        let bestMatch = data[0]; 
                        if(bestMatch.syncedLyrics) {
                            this.lyrics = bestMatch.syncedLyrics.split('\n').map(line => {
                                const match = line.match(/\[(\d+):(\d+\.\d+)\](.*)/);
                                if(match) return { time: parseInt(match[1]) * 60 + parseFloat(match[2]), text: match[3].trim() };
                                return null;
                            }).filter(l => l && l.text);
                        }
                    } catch(e) {}
                },
                syncLyrics() {
                    if(!this.lyrics.length) return;
                    let index = this.lyrics.findIndex((line, i) => {
                        const nextLine = this.lyrics[i + 1];
                        return this.currentTime >= line.time && (!nextLine || this.currentTime < nextLine.time);
                    });
                    if (index !== -1) {
                        this.currentLineIndex = index;
                    }
                },
                play(s) {
                    this.active = s;
                    this.currentLineIndex = -1;
                    if(ytPlayer?.loadVideoById) {
                        ytPlayer.loadVideoById({ videoId: s.id, suggestedQuality: 'small' });
                        this.playing = true;
                        setTimeout(() => this.fetchLyrics(s), 2000);
                    }
                },
                toggle() {
                    if(!ytPlayer) return;
                    this.playing ? ytPlayer.pauseVideo() : ytPlayer.playVideo();
                },
                seek(e) {
                    if(!ytPlayer) return;
                    let pct = e.offsetX / e.currentTarget.offsetWidth;
                    ytPlayer.seekTo(pct * this.duration);
                }
            }
        }
    </script>
</body>
</html>
