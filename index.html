<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Audify</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        [x-cloak] { display: none !important; }
        :root { --app-height: 100dvh; }
        body { background: #000; color: white; overflow: hidden; height: var(--app-height); font-family: 'Inter', sans-serif; }
        .app-shell { width: 100%; max-width: 450px; height: var(--app-height); margin: 0 auto; position: relative; display: flex; flex-direction: column; }
        
        /* Dynamic Global Background */
        .global-bg {
            position: absolute; inset: 0; width: 100%; height: 100%;
            object-fit: cover; filter: blur(80px) saturate(150%) brightness(0.4);
            z-index: 0; opacity: 0; transition: opacity 1s ease;
        }
        .global-bg.active { opacity: 0.6; }

        .shelf { display: flex; overflow-x: auto; gap: 16px; scrollbar-width: none; padding-bottom: 10px; }
        .shelf::-webkit-scrollbar { display: none; }
        
        .bottom-nav { 
            background: linear-gradient(to top, #000 85%, transparent); 
            position: absolute; bottom: 0; left: 0; right: 0; 
            height: 85px; display: flex; justify-content: space-around; 
            align-items: center; z-index: 200; padding-bottom: env(safe-area-inset-bottom); 
        }
        
        .nav-item { display: flex; flex-direction: column; align-items: center; opacity: 0.5; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
        .nav-item.active { opacity: 1; transform: translateY(-5px); color: #1DB954; }

        /* Tab Switching Animation */
        .tab-content { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .view-enter { opacity: 0; transform: translateX(20px); }
        .view-exit { opacity: 0; transform: translateX(-20px); }

        /* Category Card Styles */
        .category-card {
            position: relative; overflow: hidden; border-radius: 12px;
            aspect-ratio: 16/9; display: flex; padding: 12px;
            font-weight: 800; font-size: 14px; cursor: pointer;
            transition: transform 0.2s; z-index: 10;
        }
        .category-card:active { transform: scale(0.95); }
        .category-card img {
            position: absolute; bottom: -5px; right: -15px;
            width: 65px; height: 65px; transform: rotate(25deg);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            object-fit: cover;
        }

        .player-view { 
            position: absolute; inset: 0; z-index: 300; background: #000; 
            transition: transform 0.6s cubic-bezier(0.32, 0.72, 0, 1); 
            overflow-y: auto; scrollbar-width: none;
        }
        
        .immersive-bg { 
            position: absolute; top: -10%; width: 120%; height: 90vh; 
            object-fit: cover; filter: blur(60px) saturate(180%);
            mask-image: linear-gradient(to bottom, black 10%, transparent 90%);
            -webkit-mask-image: linear-gradient(to bottom, black 10%, transparent 90%);
            z-index: 0; transform: scale(1.2); transition: opacity 0.5s ease;
        }

        .main-art { 
            width: 100%; height: 100%;
            border-radius: 12px; box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            object-fit: cover; z-index: 10; position: relative;
        }

        .lyrics-window { 
            margin-top: 10px; padding: 120px 20px 20px 20px; 
            max-height: 550px; overflow-y: auto;
            scrollbar-width: none; position: relative; z-index: 20;
            mask-image: linear-gradient(to bottom, transparent 0%, black 10%, black 95%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 10%, black 95%, transparent 100%);
        }

        .lyrics-line { 
            font-size: 1.6rem; font-weight: 800; line-height: 1.4; 
            color: rgba(255,255,255,0.15); transition: all 0.6s ease; 
            margin-bottom: 40px;
        }
        
        .lyrics-line.active { color: #fff; transform: scale(1.05); text-shadow: 0 0 20px rgba(255, 255, 255, 0.4); }

        .btn-active:active { transform: scale(0.92); opacity: 0.7; }
        #yt-player-container { position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none; }
        
        .shimmer {
            background: linear-gradient(90deg, #555 25%, #fff 50%, #555 75%);
            background-size: 200% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 2s infinite linear;
        }
        @keyframes shimmer { to { background-position: -200% 0; } }
    </style>
</head>
<body x-data="audifyApp()" x-init="init()">

    <!-- Dynamic Global Background (Thumbnail Reactive) -->
    <img :src="active?.thumbnail" class="global-bg" :class="active ? 'active' : ''" aria-hidden="true">

    <!-- Launch & Splash -->
    <div x-show="!launched" @click="launch()" class="fixed inset-0 bg-black z-[500] flex flex-col items-center justify-center cursor-pointer">
        <p class="font-bold tracking-[0.4em] uppercase text-[14px] mb-4">Audify</p>
        <p class="text-zinc-500 text-[10px] uppercase tracking-widest animate-bounce">Tap to Enter</p>
    </div>

    <div class="app-shell" x-cloak x-show="launched">
        <!-- Main Scrollable Area -->
        <main class="flex-grow overflow-y-auto px-4 pt-12 pb-44 z-10 relative">
            
            <!-- Home View -->
            <div x-show="currentView === 'home'" 
                 x-transition:enter="view-enter" x-transition:leave="view-exit" class="tab-content">
                <div class="flex justify-between items-center mb-8">
                    <h1 class="text-2xl font-black tracking-tight" x-text="greet()"></h1>
                    <div class="flex gap-5 text-lg"><i class="fa-regular fa-bell"></i><i class="fa-solid fa-gear"></i></div>
                </div>

                <div class="grid grid-cols-2 gap-3 mb-10">
                    <template x-for="s in trending.slice(0, 6)">
                        <div @click="play(s, trending)" class="bg-white/5 backdrop-blur-md border border-white/5 rounded-md flex items-center gap-3 h-16 btn-active overflow-hidden">
                            <img :src="s.thumbnail" class="h-full w-16 object-cover">
                            <span class="text-[11px] font-bold truncate pr-2" x-text="s.title"></span>
                        </div>
                    </template>
                </div>

                <h2 class="text-xl font-bold mb-4">Recently Played</h2>
                <div class="shelf mb-10">
                    <template x-for="s in trending">
                        <div @click="play(s, trending)" class="w-36 flex-shrink-0 btn-active">
                            <img :src="s.thumbnail" class="w-36 h-36 rounded-lg shadow-2xl mb-3 object-cover">
                            <p class="text-xs font-bold truncate" x-text="s.title"></p>
                            <p class="text-[10px] text-zinc-500 truncate" x-text="s.artist"></p>
                        </div>
                    </template>
                </div>

                <h2 class="text-xl font-bold mb-4">Popular Playlists</h2>
                <div class="shelf mb-10">
                    <template x-for="s in trending.slice(3, 9)">
                        <div @click="play(s, trending)" class="w-40 flex-shrink-0 btn-active">
                            <div class="relative"><img :src="s.thumbnail" class="w-40 h-40 rounded-xl object-cover brightness-75">
                            <i class="fa-solid fa-circle-play absolute bottom-4 right-4 text-white text-3xl"></i></div>
                        </div>
                    </template>
                </div>
            </div>

            <!-- Search View -->
            <div x-show="currentView === 'search'" 
                 x-transition:enter="view-enter" x-transition:leave="view-exit" class="tab-content">
                <h1 class="text-2xl font-black mb-6">Search</h1>
                <div class="sticky top-0 pt-2 pb-6 z-20">
                    <div class="relative">
                        <i class="fa-solid fa-magnifying-glass absolute left-4 top-4 text-zinc-500"></i>
                        <input type="text" x-model="query" @input.debounce.500ms="searchMusic()" placeholder="Songs, artists, or podcasts" class="w-full p-4 pl-12 rounded-lg bg-white/10 backdrop-blur-xl text-white font-semibold outline-none border border-white/5 focus:border-white/20">
                    </div>
                </div>

                <div x-show="!searchResults.length && !query">
                    <h2 class="text-lg font-bold mb-4">Browse All</h2>
                    <div class="grid grid-cols-2 gap-4">
                        <div @click="categorySearch('Pop')" class="category-card bg-[#E8115B]"><span>Pop</span><img src="https://i.scdn.co/image/ab67706f0000000216ff709088a8d11623910c2f"></div>
                        <div @click="categorySearch('Hip Hop')" class="category-card bg-[#1E3264]"><span>Hip-Hop</span><img src="https://i.scdn.co/image/ab67706f000000029bb6af539d072de34548d15c"></div>
                        <div @click="categorySearch('Rock')" class="category-card bg-[#148A08]"><span>Rock</span><img src="https://i.scdn.co/image/ab67706f00000002fe6a49298451848f0761e389"></div>
                        <div @click="categorySearch('Anime')" class="category-card bg-[#AF2896]"><span>Anime</span><img src="https://i.scdn.co/image/ab67706f00000002c414990264024840f353930b"></div>
                    </div>
                </div>

                <div class="space-y-4" x-show="searchResults.length">
                    <template x-for="s in searchResults" :key="s.id">
                        <div @click="play(s, searchResults)" class="flex items-center gap-4 btn-active">
                            <img :src="s.thumbnail" class="w-14 h-14 rounded-md object-cover">
                            <div class="flex-grow overflow-hidden">
                                <p class="font-bold text-sm truncate" x-text="s.title"></p>
                                <p class="text-xs text-zinc-400 truncate" x-text="s.artist"></p>
                            </div>
                        </div>
                    </template>
                </div>
            </div>

            <!-- Library View (New) -->
            <div x-show="currentView === 'library'" 
                 x-transition:enter="view-enter" x-transition:leave="view-exit" class="tab-content">
                <h1 class="text-2xl font-black mb-8">Your Library</h1>
                <div class="flex gap-4 mb-8">
                    <span class="px-4 py-2 bg-white/10 rounded-full text-xs font-bold">Playlists</span>
                    <span class="px-4 py-2 bg-white/10 rounded-full text-xs font-bold">Artists</span>
                </div>
                <div class="space-y-6">
                    <div class="flex items-center gap-4">
                        <div class="w-16 h-16 bg-zinc-800 rounded flex items-center justify-center text-2xl"><i class="fa-solid fa-plus"></i></div>
                        <p class="font-bold">Add New Playlist</p>
                    </div>
                    <div class="flex items-center gap-4">
                        <div class="w-16 h-16 bg-gradient-to-br from-indigo-700 to-emerald-400 rounded flex items-center justify-center text-xl"><i class="fa-solid fa-heart"></i></div>
                        <div><p class="font-bold">Liked Songs</p><p class="text-xs text-zinc-400">Playlist • 0 songs</p></div>
                    </div>
                </div>
            </div>

        </main>

        <!-- Mini Player -->
        <div x-show="active && !open" @click="open=true" class="fixed bottom-[95px] left-3 right-3 max-w-[425px] mx-auto bg-zinc-900/90 backdrop-blur-2xl border border-white/10 h-16 rounded-xl flex items-center px-3 gap-4 z-40 shadow-2xl">
            <img :src="active?.thumbnail" class="w-11 h-11 rounded-lg object-cover">
            <div class="flex-grow overflow-hidden">
                <p class="text-[12px] font-bold truncate" x-text="active?.title"></p>
                <p class="text-[10px] text-zinc-400 truncate" x-text="active?.artist"></p>
            </div>
            <button @click.stop="toggle()"><i class="fa-solid text-white text-lg" :class="playing ? 'fa-pause' : 'fa-play'"></i></button>
        </div>

        <!-- Navigation -->
        <nav class="bottom-nav">
            <div class="nav-item" :class="currentView === 'home' ? 'active' : ''" @click="currentView = 'home'"><i class="fa-solid fa-house-chimney text-xl"></i><span class="text-[10px] mt-1 font-bold">Home</span></div>
            <div class="nav-item" :class="currentView === 'search' ? 'active' : ''" @click="currentView = 'search'"><i class="fa-solid fa-magnifying-glass text-xl"></i><span class="text-[10px] mt-1 font-bold">Search</span></div>
            <div class="nav-item" :class="currentView === 'library' ? 'active' : ''" @click="currentView = 'library'"><i class="fa-solid fa-list-ul text-xl"></i><span class="text-[10px] mt-1 font-bold">Library</span></div>
        </nav>

        <!-- Full Player View -->
        <div x-show="open" class="player-view" x-transition:enter="translate-y-full" x-transition:enter-end="translate-y-0" x-transition:leave="translate-y-full">
            <img :src="active?.thumbnail" class="immersive-bg">
            <div class="min-h-screen p-8 flex flex-col relative z-10">
                <header class="flex justify-between items-center mb-10">
                    <i class="fa-solid fa-chevron-down text-xl p-2" @click="open=false"></i>
                    <p class="text-[11px] font-bold uppercase tracking-widest">Playing Now</p>
                    <i class="fa-solid fa-ellipsis-vertical text-xl p-2"></i>
                </header>
                <div class="w-[85%] mx-auto aspect-square mb-10"><img :src="active?.thumbnail" class="main-art"></div>
                <div class="mb-8">
                    <h2 class="text-2xl font-black mb-1 truncate" x-text="active?.title"></h2>
                    <p class="text-lg text-white/60 font-medium truncate" x-text="active?.artist"></p>
                </div>
                <div class="mb-10">
                    <div class="relative h-1 bg-white/10 rounded-full mb-2" @click="seek($event)"><div class="absolute h-full bg-white rounded-full" :style="`width: ${prog}%`"></div></div>
                    <div class="flex justify-between text-[10px] font-bold text-white/40"><span x-text="formatTime(currentTime)"></span><span x-text="formatTime(duration)"></span></div>
                </div>
                <div class="flex justify-around items-center mb-12">
                    <button @click="prev()" class="text-3xl"><i class="fa-solid fa-backward-step"></i></button>
                    <button @click="toggle()" class="w-20 h-20 bg-white text-black rounded-full flex items-center justify-center shadow-2xl"><i class="fa-solid text-3xl" :class="playing ? 'fa-pause' : 'fa-play'"></i></button>
                    <button @click="next()" class="text-3xl"><i class="fa-solid fa-forward-step"></i></button>
                </div>
                <div class="lyrics-window" id="lyrics-window">
                    <template x-for="(line, index) in lyrics">
                        <div class="lyrics-line" :id="'line-'+index" :class="currentLineIndex === index ? 'active' : ''" x-text="line.text"></div>
                    </template>
                </div>
            </div>
        </div>
        
        <div id="yt-player-container"><div id="player"></div></div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let ytPlayer;
        function onYouTubeIframeAPIReady() {
            ytPlayer = new YT.Player('player', { height: '1', width: '1', videoId: '', playerVars: { 'autoplay': 1, 'controls': 0 },
                events: { 'onStateChange': (e) => {
                    if(window.audifyAppInstance) {
                        window.audifyAppInstance.playing = (e.data === YT.PlayerState.PLAYING);
                        if (e.data === YT.PlayerState.ENDED) window.audifyAppInstance.next();
                    }
                }}
            });
        }

        function audifyApp() {
            return {
                launched: false, splash: true, currentView: 'home', query: '', open: false, playing: false, 
                prog: 0, currentTime: 0, duration: 0, trending: [], searchResults: [], active: null,
                lyrics: [], currentLineIndex: -1,

                launch() { this.launched = true; },
                greet() { const h = new Date().getHours(); return h < 12 ? 'Good Morning' : h < 18 ? 'Good Afternoon' : 'Good Evening'; },
                formatTime(s) { if(!s) return "0:00"; let m = Math.floor(s/60), sec = Math.floor(s%60); return `${m}:${sec < 10 ? '0' : ''}${sec}`; },
                async init() {
                    window.audifyAppInstance = this;
                    const res = await fetch('/search?q=top+hits+2026');
                    const data = await res.json();
                    this.trending = data.slice(0, 15);
                    setInterval(() => {
                        if(this.playing && ytPlayer?.getCurrentTime) {
                            this.currentTime = ytPlayer.getCurrentTime();
                            this.duration = ytPlayer.getDuration();
                            this.prog = (this.currentTime / this.duration) * 100;
                            this.syncLyrics();
                        }
                    }, 300);
                },
                categorySearch(genre) { this.query = genre; this.searchMusic(); },
                async searchMusic() {
                    if(!this.query) { this.searchResults = []; return; }
                    const res = await fetch(`/search?q=${encodeURIComponent(this.query)}`);
                    let data = await res.json();
                    
                    // Advanced De-duplication: Filtering by ID and Title similarity
                    const seen = new Set();
                    this.searchResults = data.filter(song => {
                        const duplicateKey = `${song.id}-${song.title.toLowerCase().substring(0, 10)}`;
                        if (seen.has(duplicateKey)) return false;
                        seen.add(duplicateKey);
                        return true;
                    });
                },
                async play(s, list = null) {
                    this.active = s;
                    this.open = true; // Automatically open player
                    this.lyrics = []; 
                    if(ytPlayer?.loadVideoById) { ytPlayer.loadVideoById(s.id); this.playing = true; }
                    this.fetchLyrics(s);
                },
                async fetchLyrics(track) {
                    try {
                        const res = await fetch(`https://lrclib.net/api/search?track_name=${encodeURIComponent(track.title)}&artist_name=${encodeURIComponent(track.artist)}`);
                        const data = await res.json();
                        if(data[0]?.syncedLyrics) {
                            this.lyrics = data[0].syncedLyrics.split('\n').map(l => {
                                const m = l.match(/\[(\d+):(\d+\.\d+)\](.*)/);
                                return m ? { time: parseInt(m[1])*60 + parseFloat(m[2]), text: m[3] } : null;
                            }).filter(l => l?.text);
                        }
                    } catch(e) {}
                },
                syncLyrics() {
                    let index = this.lyrics.findIndex((l, i) => this.currentTime >= l.time && (!this.lyrics[i+1] || this.currentTime < this.lyrics[i+1].time));
                    if (index !== -1 && index !== this.currentLineIndex) {
                        this.currentLineIndex = index;
                        const el = document.getElementById('line-' + index);
                        if(el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                },
                toggle() { this.playing ? ytPlayer.pauseVideo() : ytPlayer.playVideo(); },
                seek(e) { ytPlayer.seekTo((e.offsetX / e.currentTarget.offsetWidth) * this.duration); },
                next() { /* logic for next song */ },
                prev() { ytPlayer.seekTo(0); }
            }
        }
    </script>
</body>
</html>
