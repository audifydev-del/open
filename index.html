<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Audify</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --theme-color: #0f0f0f; }
        [x-cloak] { display: none !important; }
        
        body, html { 
            background-color: #000; margin: 0; padding: 0; 
            height: 100%; width: 100%;
            font-family: 'Inter', sans-serif;
            user-select: none; -webkit-tap-highlight-color: transparent;
            overflow: hidden; /* Lock the main body */
        }

        .app-shell { 
            width: 100%; max-width: 450px; height: 100vh; margin: 0 auto;
            position: relative; 
            background-color: var(--theme-color) !important; 
            transition: background-color 1s ease-in-out;
            overflow: hidden;
        }

        /* MAIN PLAYER CONTAINER - NO SCROLLING HERE */
        .immersive-player {
            position: absolute; inset: 0;
            background-color: var(--theme-color); 
            z-index: 100;
            transition: transform 0.6s cubic-bezier(0.32, 0.72, 0, 1);
            display: flex;
            flex-direction: column;
            overflow: hidden; 
        }

        .main-view {
            height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            padding-bottom: 40px;
        }

        .artwork-container { 
            position: relative; width: 100%; height: 55vh; shrink: 0;
        }
        .artwork-container img { width: 100%; height: 100%; object-fit: cover; }
        
        .artwork-overlay { 
            position: absolute; inset: 0; 
            background: linear-gradient(to bottom, transparent 0%, rgba(0,0,0,0.2) 60%, var(--theme-color) 100%); 
        }

        .player-content { 
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 35px;
            text-align: center;
        }

        .song-title {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
            display: block;
        }

        /* LYRICS SECTION - THE WINDOW */
        .lyrics-section {
            height: 100vh;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            background: var(--theme-color);
            padding-top: 20px;
            position: relative;
        }

        /* THE INVISIBLE SCROLLABLE BOX (THE WINDOW INSIDE) */
        .lyrics-scroll-window {
            flex-grow: 1;
            overflow-y: scroll; /* Forces a scrollable window */
            scrollbar-width: none; /* Firefox */
            padding: 0 35px;
            -webkit-overflow-scrolling: touch;
            /* Fade effect for top and bottom */
            mask-image: linear-gradient(to bottom, transparent 0%, black 20%, black 80%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 20%, black 80%, transparent 100%);
        }
        .lyrics-scroll-window::-webkit-scrollbar { display: none; }

        .lyric-line {
            font-size: 2.2rem;
            line-height: 1.2;
            font-weight: 900;
            margin-bottom: 35px;
            transition: all 0.4s ease;
            color: rgba(255, 255, 255, 0.15);
            text-align: left;
        }

        .lyric-line.active { 
            color: #fff; 
            transform: scale(1.05); 
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        input[type="range"].progress-bar { 
            width: 100%; -webkit-appearance: none; background: rgba(255,255,255,0.15); 
            height: 6px; border-radius: 10px; outline: none;
        }
        input[type="range"].progress-bar::-webkit-slider-thumb { 
            -webkit-appearance: none; height: 20px; width: 20px; background: #fff; border-radius: 50%; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .scroll-indicator {
            margin-top: auto;
            opacity: 0.3;
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-5px);}
            60% {transform: translateY(-3px);}
        }

        #yt-hidden { position: absolute; top: -9999px; visibility: hidden; }
        canvas { display: none; }
    </style>
</head>
<body>

<div x-data="audifyApp()" x-init="initApp()" class="app-shell" id="appShell">
    <canvas id="colorCanvas"></canvas>
    
    <!-- Home UI -->
    <div class="h-full flex flex-col" x-show="!playerOpen">
        <header class="p-6 text-white">
            <h1 class="text-4xl font-black mb-4 tracking-tighter">Audify</h1>
            <input type="text" x-model="searchQuery" @keydown.enter="fetchData(searchQuery)" 
                   placeholder="Search tracks..." class="w-full bg-white/10 rounded-2xl py-4 px-6 outline-none">
        </header>
        <main class="flex-grow overflow-y-auto px-4 pb-24">
            <div class="grid grid-cols-2 gap-4">
                <template x-for="song in songs" :key="song.id">
                    <div class="bg-white/5 p-3 rounded-2xl cursor-pointer" @click="playSong(song)">
                        <img :src="song.thumbnail" class="w-full aspect-square rounded-xl object-cover mb-2">
                        <p class="text-sm font-bold truncate text-white" x-text="song.title"></p>
                    </div>
                </template>
            </div>
        </main>
    </div>

    <!-- PLAYER PAGE -->
    <div class="immersive-player" id="mainPlayer" :style="playerOpen ? 'transform: translateY(0)' : 'transform: translateY(100%)'">
        
        <!-- WRAPPER FOR VERTICAL SWIPE BETWEEN PLAYER AND LYRICS -->
        <div class="h-[200vh] flex flex-col overflow-y-auto snap-y snap-mandatory scrollbar-hide" id="verticalScrollContainer">
            
            <!-- SECTION 1: MAIN PLAYER (SNAP) -->
            <div class="main-view text-white snap-start">
                <div class="artwork-container">
                    <img :src="activeTrack?.thumbnail" crossorigin="anonymous" id="mainArtwork">
                    <div class="artwork-overlay"></div>
                    <button @click="closePlayer" class="absolute top-12 left-8 z-30 p-2 text-white opacity-50"><i class="fa-solid fa-chevron-down text-2xl"></i></button>
                </div>

                <div class="player-content">
                    <div class="mb-10 w-full overflow-hidden">
                        <h2 class="text-3xl font-black mb-1 song-title" x-text="activeTrack?.title"></h2>
                        <p class="text-xl text-white/40 font-bold song-title" x-text="activeTrack?.artist"></p>
                    </div>

                    <div class="mb-12">
                        <input type="range" class="progress-bar" min="0" :max="duration" x-model="currentTime" @input="seekMusic">
                        <div class="flex justify-between mt-4 text-xs font-black text-white/30">
                            <span x-text="formatTime(currentTime)">0:00</span>
                            <span x-text="formatTime(duration)">0:00</span>
                        </div>
                    </div>

                    <div class="flex justify-around items-center">
                        <i class="fa-solid fa-backward-step text-4xl opacity-80"></i>
                        <button @click="togglePlay()" class="w-24 h-24 bg-white text-black rounded-full flex items-center justify-center shadow-[0_0_50px_rgba(255,255,255,0.2)]">
                            <i class="fa-solid text-4xl" :class="isPlaying ? 'fa-pause' : 'fa-play'"></i>
                        </button>
                        <i class="fa-solid fa-forward-step text-4xl opacity-80"></i>
                    </div>

                    <div class="scroll-indicator">
                        <p>Scroll for Lyrics</p>
                        <i class="fa-solid fa-chevron-down mt-2"></i>
                    </div>
                </div>
            </div>

            <!-- SECTION 2: LYRICS SECTION (SNAP) -->
            <div class="lyrics-section snap-start">
                <div class="flex items-center px-10 py-4 border-b border-white/5 mb-2">
                    <p class="text-[10px] font-black uppercase tracking-[3px] text-white/40">Lyrics</p>
                    <div class="ml-auto flex gap-4">
                        <button @click="showLyricsList = true" class="text-[10px] font-black bg-white/5 px-4 py-2 rounded-full text-white/60" x-show="lyricsVersions.length > 0">Versions</button>
                    </div>
                </div>

                <!-- THE INVISIBLE SCROLLABLE WINDOW -->
                <div class="lyrics-scroll-window" id="lyricsWindow">
                    <div class="h-[25vh]"></div> <!-- Top Spacer -->
                    <div class="lyrics-container">
                        <template x-for="(line, index) in parsedLyrics" :key="index">
                            <div class="lyric-line" 
                                 :id="'line-' + index"
                                 :class="{ 'active': isLineActive(index) }"
                                 x-text="line.text"></div>
                        </template>
                        
                        <div x-show="isSyncing" class="py-20 text-center opacity-20">
                            <p class="text-xl font-bold animate-pulse">Syncing...</p>
                        </div>

                        <div x-show="!isSyncing && parsedLyrics.length === 0" class="py-20 text-center text-white/20 italic">
                            <p x-text="lyricsStatus || 'No lyrics found for this track'"></p>
                        </div>
                    </div>
                    <div class="h-[45vh]"></div> <!-- Bottom Spacer -->
                </div>
            </div>
        </div>
    </div>

    <!-- VERSION MODAL -->
    <div x-show="showLyricsList" x-cloak class="fixed inset-0 bg-black/95 z-[600] p-10 flex flex-col justify-center">
        <h3 class="text-white font-black text-2xl mb-8">Choose Version</h3>
        <div class="space-y-4 overflow-y-auto pr-2">
            <template x-for="item in lyricsVersions" :key="item.id">
                <div @click="selectLyrics(item)" class="p-6 rounded-3xl bg-white/5 border border-white/10" :class="selectedLyricsId === item.id ? 'border-white' : ''">
                    <p class="text-white font-bold text-lg truncate" x-text="item.trackName"></p>
                    <p class="text-white/40 text-xs mt-1" x-text="'Matched duration: ' + formatTime(item.duration)"></p>
                </div>
            </template>
        </div>
        <button @click="showLyricsList = false" class="mt-10 py-5 bg-white text-black font-black rounded-3xl uppercase tracking-widest">Back</button>
    </div>

    <div id="yt-hidden"><div id="youtube-player"></div></div>
</div>

<script>
    var player;
    window.handleItunesResponse = function(data) { window.dispatchEvent(new CustomEvent('itunes-data', { detail: data })); };

    function audifyApp() {
        return {
            songs: [], searchQuery: '', activeTrack: null, playerOpen: false, isPlaying: false, 
            currentTime: 0, duration: 0, parsedLyrics: [], lastIndex: -1,
            showLyricsList: false, lyricsVersions: [], selectedLyricsId: null, 
            lyricsStatus: '', isSyncing: false,

            initApp() {
                this.fetchData('Trending');
                let tag = document.createElement('script');
                tag.src = "https://www.youtube.com/iframe_api";
                document.head.appendChild(tag);
            },
            async fetchData(q) {
                const res = await fetch(`/search?q=${encodeURIComponent(q)}`);
                this.songs = await res.json();
            },
            isLineActive(index) {
                const active = this.currentTime >= this.parsedLyrics[index].time && 
                             (this.parsedLyrics[index+1] ? this.currentTime < this.parsedLyrics[index+1].time : true);
                
                if (active) {
                    this.checkSnapAndScroll(index);
                }
                return active;
            },
            checkSnapAndScroll(index) {
                const line = document.getElementById('line-' + index);
                const windowEl = document.getElementById('lyricsWindow');
                if (!line || !windowEl) return;

                const rect = line.getBoundingClientRect();
                const winRect = windowEl.getBoundingClientRect();
                
                // Snap if the line is currently visible inside the window
                const isVisible = (
                    rect.top >= winRect.top &&
                    rect.bottom <= winRect.bottom
                );

                if (isVisible || this.lastIndex === -1) {
                    line.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
                
                this.lastIndex = index;
            },
            closePlayer() {
                this.playerOpen = false;
                document.getElementById('verticalScrollContainer').scrollTo(0,0);
            },
            async playSong(song) {
                this.activeTrack = JSON.parse(JSON.stringify(song)); 
                this.playerOpen = true;
                this.isPlaying = true;
                this.parsedLyrics = [];
                this.lyricsVersions = [];
                this.isSyncing = true;
                this.currentTime = 0;
                this.lastIndex = -1;

                const script = document.createElement('script');
                script.src = `https://itunes.apple.com/search?term=${encodeURIComponent(song.artist + ' ' + song.title)}&limit=1&entity=song&callback=handleItunesResponse`;
                const onData = (e) => {
                    if (e.detail.results?.length > 0) {
                        const hqUrl = e.detail.results[0].artworkUrl100.replace('100x100bb.jpg', '1000x1000bb.jpg');
                        const tempImg = new Image(); tempImg.crossOrigin = "anonymous"; tempImg.src = hqUrl;
                        tempImg.onload = () => { this.activeTrack.thumbnail = hqUrl; this.updateTheme(tempImg); };
                    }
                };
                window.addEventListener('itunes-data', onData, { once: true });
                document.body.appendChild(script);

                const startVideo = () => {
                    if (player && typeof player.loadVideoById === 'function') {
                        player.loadVideoById(song.id);
                    } else {
                        player = new YT.Player('youtube-player', {
                            height: '0', width: '0', videoId: song.id,
                            playerVars: { 'autoplay': 1, 'controls': 0, 'disablekb': 1 },
                            events: { 
                                'onReady': (e) => e.target.playVideo(),
                                'onStateChange': (e) => { 
                                    if(e.data == YT.PlayerState.PLAYING) {
                                        this.duration = Math.floor(player.getDuration());
                                        this.getLyricsList(this.activeTrack.artist, this.activeTrack.title);
                                    }
                                } 
                            }
                        });
                    }
                };

                if (window.YT && window.YT.Player) {
                    startVideo();
                } else {
                    window.onYouTubeIframeAPIReady = startVideo;
                }

                if(!this.intv) {
                    setInterval(() => { 
                        if(player && this.isPlaying && typeof player.getCurrentTime === 'function') {
                            this.currentTime = player.getCurrentTime();
                        } 
                    }, 500);
                    this.intv = true;
                }
            },
            async getLyricsList(artist, title) {
                try {
                    const cleanArtist = artist.replace(/\s*-\s*Topic/i, '').trim();
                    const cleanTitle = title.replace(/\(.*\)|\[.*\]/g, '').trim();
                    const res = await fetch(`https://lrclib.net/api/search?artist_name=${encodeURIComponent(cleanArtist)}&track_name=${encodeURIComponent(cleanTitle)}`);
                    const data = await res.json();
                    this.lyricsVersions = data.filter(l => l.syncedLyrics);
                    if(this.lyricsVersions.length > 0) {
                        let closest = this.lyricsVersions.reduce((prev, curr) => Math.abs(curr.duration - this.duration) < Math.abs(prev.duration - this.duration) ? curr : prev);
                        this.selectLyrics(closest);
                    } else { this.isSyncing = false; this.lyricsStatus = 'Lyrics unavailable.'; }
                } catch (e) { this.isSyncing = false; }
            },
            selectLyrics(version) {
                this.selectedLyricsId = version.id;
                this.parsedLyrics = version.syncedLyrics.split('\n').map(line => {
                    const m = line.match(/\[(\d+):(\d+\.\d+)\](.*)/);
                    return m ? { time: parseInt(m[1]) * 60 + parseFloat(m[2]), text: m[3].trim() } : null;
                }).filter(l => l && l.text);
                this.isSyncing = false;
                this.showLyricsList = false;
                this.lastIndex = -1;
            },
            updateTheme(img) {
                const canvas = document.getElementById('colorCanvas');
                const ctx = canvas.getContext('2d');
                canvas.width = 10; canvas.height = 10;
                ctx.drawImage(img, 0, 0, 10, 10);
                const p = ctx.getImageData(0, 0, 10, 10).data;
                let r=0, g=0, b=0, count = p.length/4;
                for (let i=0; i<p.length; i+=4) { r += p[i]; g += p[i+1]; b += p[i+2]; }
                const color = `rgb(${Math.max(15, (r/count)-50)}, ${Math.max(15, (g/count)-50)}, ${Math.max(15, (b/count)-50)})`;
                document.documentElement.style.setProperty('--theme-color', color);
                document.getElementById('appShell').style.backgroundColor = color;
            },
            togglePlay() { this.isPlaying = !this.isPlaying; this.isPlaying ? player.playVideo() : player.pauseVideo(); },
            seekMusic() { player.seekTo(this.currentTime, true); },
            formatTime(s) { if(!s || s < 0) return '0:00'; let m=Math.floor(s/60), sec=Math.floor(s%60); return `${m}:${sec<10?'0':''}${sec}`; }
        }
    }
</script>
</body>
</html>
