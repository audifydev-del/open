<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Audify</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- YouTube IFrame API -->
    <script src="https://www.youtube.com/iframe_api"></script>
    <style>
        [x-cloak] { display: none !important; }
        body { background-color: #000; color: white; font-family: 'Inter', sans-serif; overflow: hidden; margin: 0; }
        .app-shell { width: 100%; max-width: 450px; height: 100dvh; margin: 0 auto; position: relative; background-color: #121212; display: flex; flex-direction: column; }
        .dynamic-bg { position: absolute; inset: 0; z-index: -1; filter: blur(80px) brightness(0.3); transform: scale(1.2); transition: background-image 0.8s; background-size: cover; background-position: center; }
        .progress-rail { height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; width: 100%; position: relative; }
        .progress-fill { height: 100%; background: #1DB954; border-radius: 2px; position: absolute; }
        #yt-player { position: absolute; top: -9999px; left: -9999px; visibility: hidden; }
    </style>
</head>
<body>

<div x-data="audifyApp()" x-init="initApp()">
    <div class="app-shell">
        <!-- Main Library -->
        <main class="flex-grow overflow-y-auto px-5 pt-8 pb-32" x-show="!playerOpen">
            <h1 class="text-3xl font-black mb-6">Audify</h1>
            <input type="text" x-model="searchQuery" @keydown.enter="fetchData(searchQuery)" placeholder="Search..." class="w-full bg-zinc-800 rounded-full py-3 px-6 mb-6 outline-none text-sm">
            
            <div class="flex flex-col gap-5">
                <template x-for="song in songs" :key="song.id">
                    <div class="flex items-center gap-4 cursor-pointer" @click="playSong(song)">
                        <img :src="song.thumbnail" class="w-14 h-14 rounded bg-zinc-800 object-cover">
                        <div class="flex-grow overflow-hidden">
                            <p class="text-sm font-bold truncate" x-text="song.title"></p>
                            <p class="text-xs text-zinc-400" x-text="song.artist"></p>
                        </div>
                    </div>
                </template>
            </div>
        </main>

        <!-- Player Page -->
        <div x-show="playerOpen" x-cloak class="absolute inset-0 bg-[#121212] z-50 flex flex-col p-8">
            <div class="dynamic-bg" :style="`background-image: url(${activeTrack?.thumbnail})`"></div>
            <header class="flex justify-between items-center mb-8">
                <i class="fa-solid fa-chevron-down text-xl" @click="playerOpen = false"></i>
                <p class="text-[10px] font-bold uppercase tracking-widest">Playing from YouTube</p>
                <div></div>
            </header>

            <div class="flex-grow flex flex-col justify-center">
                <img :src="activeTrack?.thumbnail" class="w-full aspect-square rounded-lg shadow-2xl mb-12 object-cover">
                <h2 class="text-2xl font-black truncate" x-text="activeTrack?.title"></h2>
                <p class="text-lg text-white/50 mb-8" x-text="activeTrack?.artist"></p>

                <div class="mb-8" @click="handleSeek($event)">
                    <div class="progress-rail">
                        <div class="progress-fill" :style="`width: ${progress}%`"></div>
                    </div>
                </div>

                <div class="flex justify-center items-center gap-10">
                    <i class="fa-solid fa-backward-step text-3xl"></i>
                    <button @click="togglePlay()" class="w-16 h-16 bg-white text-black rounded-full flex items-center justify-center">
                        <i class="fa-solid text-2xl" :class="isPlaying ? 'fa-pause' : 'fa-play'"></i>
                    </button>
                    <i class="fa-solid fa-forward-step text-3xl"></i>
                </div>
            </div>
        </div>

        <!-- Hidden YouTube Container -->
        <div id="yt-player"></div>
    </div>
</div>

<script>
    let player;
    function onYouTubeIframeAPIReady() {
        player = new YT.Player('yt-player', {
            height: '0', width: '0',
            playerVars: { 'autoplay': 0, 'controls': 0 },
            events: {
                'onStateChange': (event) => {
                    window.dispatchEvent(new CustomEvent('yt-state-change', { detail: event.data }));
                }
            }
        });
    }

    function audifyApp() {
        return {
            songs: [], searchQuery: '', activeTrack: null,
            playerOpen: false, isPlaying: false, progress: 0,

            initApp() {
                this.fetchData('trending');
                setInterval(() => this.updateProgress(), 1000);
                window.addEventListener('yt-state-change', (e) => {
                    this.isPlaying = (e.detail === YT.PlayerState.PLAYING);
                });
            },

            async fetchData(q) {
                const res = await fetch(`/search?q=${encodeURIComponent(q)}`);
                this.songs = await res.json();
            },

            playSong(song) {
                this.activeTrack = song;
                this.playerOpen = true;
                player.loadVideoById(song.id);
                player.playVideo();
            },

            togglePlay() {
                if (this.isPlaying) { player.pauseVideo(); } 
                else { player.playVideo(); }
            },

            updateProgress() {
                if (player && player.getDuration) {
                    const duration = player.getDuration();
                    if (duration > 0) {
                        this.progress = (player.getCurrentTime() / duration) * 100;
                    }
                }
            },

            handleSeek(e) {
                const rect = e.currentTarget.getBoundingClientRect();
                const percent = (e.clientX - rect.left) / rect.width;
                player.seekTo(percent * player.getDuration());
            }
        }
    }
</script>
</body>
</html>
