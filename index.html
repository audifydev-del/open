<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player - Innertube Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: #fff; }
        .spotify-card { background: #121212; transition: background 0.3s; cursor: pointer; }
        .spotify-card:hover { background: #282828; }
        .truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden font-sans">

    <div class="flex flex-1 overflow-hidden">
        <main class="flex-1 p-8 overflow-y-auto bg-gradient-to-b from-zinc-900 to-black no-scrollbar">
            <div class="flex gap-4 mb-10 items-center">
                <input id="search-input" type="text" placeholder="Search for Official Audio..." 
                       class="w-full max-w-md p-3 rounded-full bg-zinc-800 text-white outline-none focus:ring-2 focus:ring-green-500">
                <button onclick="searchMusic()" class="bg-green-500 text-black font-bold py-3 px-8 rounded-full hover:scale-105 transition active:scale-95">
                    Search
                </button>
            </div>

            <h2 class="text-2xl font-bold mb-6">Search Results</h2>
            <div id="results" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6 mb-24">
                </div>
        </main>
    </div>

    <footer class="h-24 bg-black border-t border-zinc-900 px-4 flex items-center justify-between fixed bottom-0 w-full z-50">
        <div class="flex items-center w-1/3">
            <img id="p-thumb" src="" class="hidden w-14 h-14 rounded shadow-lg mr-4 object-cover">
            <div class="overflow-hidden">
                <div id="p-title" class="font-bold text-sm truncate">No track selected</div>
                <div id="p-artist" class="text-zinc-400 text-xs truncate">Artist</div>
            </div>
        </div>

        <div class="flex flex-col items-center w-1/3 gap-2">
            <div class="flex items-center gap-6">
                <button onclick="togglePlay()" id="play-btn" class="bg-white text-black rounded-full w-10 h-10 flex items-center justify-center hover:scale-105 transition">▶</button>
            </div>
            <div class="w-full flex items-center gap-2 group">
                <span id="current-time" class="text-[10px] text-zinc-500">0:00</span>
                <div class="flex-1 bg-zinc-800 h-1.5 rounded-full relative cursor-pointer" onclick="seek(event)">
                    <div id="progress-bar" class="bg-white group-hover:bg-green-500 h-full w-0 rounded-full transition-all duration-100"></div>
                </div>
                <span id="total-duration" class="text-[10px] text-zinc-500">0:00</span>
            </div>
        </div>

        <div class="w-1/3 flex justify-end">
            <audio id="main-audio"></audio>
        </div>
    </footer>

    <script>
        const audio = document.getElementById('main-audio');
        const playBtn = document.getElementById('play-btn');

        async function searchMusic() {
            const query = document.getElementById('search-input').value;
            if(!query) return;

            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<p class="text-zinc-500 animate-pulse">Searching...</p>';

            try {
                const res = await fetch(`/search?q=${encodeURIComponent(query)}`);
                const songs = await res.json();
                resultsDiv.innerHTML = '';

                songs.forEach(song => {
                    const card = document.createElement('div');
                    card.className = "spotify-card p-4 rounded-lg";
                    // Using backticks for safe string injection
                    card.onclick = () => playSong(song.id, song.title.replace(/'/g, "\\'"), song.artist.replace(/'/g, "\\'"), song.thumbnail);
                    
                    card.innerHTML = `
                        <img src="${song.thumbnail}" class="w-full aspect-square object-cover rounded shadow-md mb-4">
                        <h3 class="font-bold truncate text-sm">${song.title}</h3>
                        <p class="text-zinc-400 text-xs truncate">${song.artist}</p>
                    `;
                    resultsDiv.appendChild(card);
                });
            } catch (e) {
                resultsDiv.innerHTML = '<p class="text-red-500">Error loading results.</p>';
            }
        }

        async function playSong(id, title, artist, thumb) {
            // Update UI immediately
            document.getElementById('p-title').innerText = title;
            document.getElementById('p-artist').innerText = artist;
            const thumbImg = document.getElementById('p-thumb');
            thumbImg.src = thumb;
            thumbImg.classList.remove('hidden');

            // Get the direct link from Python
            try {
                const res = await fetch(`/get_audio?id=${id}`);
                const data = await res.json();

                if (data.url) {
                    audio.src = data.url;
                    audio.play();
                    playBtn.innerText = '⏸';
                } else {
                    alert("YouTube blocked the direct stream for this song. Trying a workaround...");
                }
            } catch (e) {
                console.error("Playback error", e);
            }
        }

        function togglePlay() {
            if (audio.paused) { audio.play(); playBtn.innerText = '⏸'; }
            else { audio.pause(); playBtn.innerText = '▶'; }
        }

        // Real Progress Bar logic
        audio.ontimeupdate = () => {
            if (isNaN(audio.duration)) return;
            const progress = (audio.currentTime / audio.duration) * 100;
            document.getElementById('progress-bar').style.width = progress + "%";
            document.getElementById('current-time').innerText = formatTime(audio.currentTime);
            document.getElementById('total-duration').innerText = formatTime(audio.duration);
        };

        function formatTime(secs) {
            const min = Math.floor(secs / 60);
            const sec = Math.floor(secs % 60);
            return `${min}:${sec < 10 ? '0' : ''}${sec}`;
        }

        function seek(e) {
            const rect = e.currentTarget.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            audio.currentTime = percent * audio.duration;
        }
    </script>
</body>
</html>
