<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Music Player</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; text-align: center; }
        .container { max-width: 500px; margin: auto; padding: 20px; }
        input { width: 80%; padding: 10px; border-radius: 20px; border: none; margin-bottom: 10px; }
        button { padding: 10px 20px; border-radius: 20px; border: none; background: #1db954; color: white; cursor: pointer; }
        .result-item { display: flex; align-items: center; background: #1e1e1e; margin: 10px 0; padding: 10px; cursor: pointer; border-radius: 8px; transition: 0.3s; }
        .result-item:hover { background: #282828; }
        .result-item img { width: 50px; height: 50px; margin-right: 15px; border-radius: 4px; }
        #player-container { margin-top: 20px; position: sticky; bottom: 0; background: #121212; padding: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Music Search</h1>
    <input type="text" id="searchQuery" placeholder="Search for a song...">
    <button onclick="searchMusic()">Search</button>
    
    <div id="results"></div>
</div>

<div id="player-container">
    <div id="player"></div>
</div>

<script>
    // REPLACE THIS with your actual Render URL (e.g., https://your-app.onrender.com)
    const RENDER_URL = "http://localhost:5000"; 

    async function searchMusic() {
        const query = document.getElementById('searchQuery').value;
        const resultsDiv = document.getElementById('results');
        resultsDiv.innerHTML = "Searching...";

        try {
            const response = await fetch(`${RENDER_URL}/search?q=${encodeURIComponent(query)}`);
            const data = await response.json();
            
            resultsDiv.innerHTML = "";
            data.forEach(song => {
                const div = document.createElement('div');
                div.className = 'result-item';
                div.onclick = () => playSong(song.videoId);
                div.innerHTML = `
                    <img src="${song.thumbnail}" alt="thumb">
                    <div style="text-align: left;">
                        <strong>${song.title}</strong><br>
                        <small>${song.artist}</small>
                    </div>
                `;
                resultsDiv.appendChild(div);
            });
        } catch (error) {
            resultsDiv.innerHTML = "Error connecting to backend.";
            console.error(error);
        }
    }

    function playSong(videoId) {
        const playerDiv = document.getElementById('player');
        playerDiv.innerHTML = `
            <iframe width="100%" height="80" 
                src="https://www.youtube.com/embed/${videoId}?autoplay=1" 
                frameborder="0" allow="autoplay; encrypted-media">
            </iframe>`;
    }
</script>

</body>
</html>
