<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Audify</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --theme-color: #0f0f0f; }
        [x-cloak] { display: none !important; }
        
        body, html { 
            background-color: #000; margin: 0; padding: 0; 
            height: 100%; width: 100%;
            font-family: 'Inter', sans-serif;
            user-select: none; -webkit-tap-highlight-color: transparent;
            overflow: hidden;
        }

        .app-shell { 
            width: 100%; max-width: 450px; height: 100vh; margin: 0 auto;
            position: relative; 
            background-color: var(--theme-color) !important; 
            overflow: hidden;
        }

        .immersive-player {
            position: absolute; inset: 0;
            background-color: var(--theme-color); 
            z-index: 100;
            transition: transform 0.6s cubic-bezier(0.32, 0.72, 0, 1);
            display: flex;
            flex-direction: column;
            overflow: hidden; 
        }

        /* MAIN WRAPPER */
        #verticalScrollContainer {
            height: 100vh;
            overflow-y: auto;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
        }
        #verticalScrollContainer::-webkit-scrollbar { display: none; }

        .main-view {
            height: 100vh; width: 100%;
            display: flex; flex-direction: column; flex-shrink: 0;
        }

        .artwork-container { position: relative; width: 100%; height: 50vh; shrink: 0; }
        .artwork-container img { width: 100%; height: 100%; object-fit: cover; }
        .artwork-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 0%, rgba(0,0,0,0.4) 60%, var(--theme-color) 100%); }

        .player-content { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; padding: 0 35px; text-align: center; }

        .lyrics-section {
            height: 100vh; flex-shrink: 0;
            display: flex; flex-direction: column;
            background: var(--theme-color);
        }

        /* FIXED: TARGETED SCROLLING WINDOW */
        .lyrics-scroll-window {
            flex-grow: 1;
            overflow-y: auto;
            scrollbar-width: none;
            padding: 0 35px;
            -webkit-overflow-scrolling: touch;
            position: relative;
            mask-image: linear-gradient(to bottom, transparent 0%, black 20%, black 80%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 20%, black 80%, transparent 100%);
        }

        .lyric-line {
            font-size: 2rem; line-height: 1.2; font-weight: 900;
            margin-bottom: 30px; transition: color 0.3s ease, transform 0.3s ease;
            color: rgba(255, 255, 255, 0.1); text-align: left;
        }
        .lyric-line.active { color: #fff; transform: scale(1.02); }

        input[type="range"].progress-bar { width: 100%; -webkit-appearance: none; background: rgba(255,255,255,0.1); height: 4px; border-radius: 10px; }
        input[type="range"].progress-bar::-webkit-slider-thumb { -webkit-appearance: none; height: 16px; width: 16px; background: #fff; border-radius: 50%; }

        #yt-hidden { position: absolute; top: -9999px; visibility: hidden; }
    </style>
</head>
<body>

<div x-data="audifyApp()" x-init="initApp()" class="app-shell">
    
    <!-- SEARCH LIST -->
    <div class="h-full flex flex-col" x-show="!playerOpen">
        <header class="p-6 text-white">
            <h1 class="text-4xl font-black mb-4 tracking-tighter">Audify</h1>
            <input type="text" x-model="searchQuery" @keydown.enter="fetchData(searchQuery)" 
                   placeholder="Search..." class="w-full bg-white/10 rounded-2xl py-4 px-6 outline-none">
        </header>
        <main class="flex-grow overflow-y-auto px-4 pb-20">
            <div class="grid grid-cols-2 gap-4">
                <template x-for="song in songs" :key="song.id">
                    <div class="bg-white/5 p-3 rounded-2xl" @click="playSong(song)">
                        <img :src="song.thumbnail" class="w-full aspect-square rounded-xl object-cover mb-2">
                        <p class="text-sm font-bold truncate text-white" x-text="song.title"></p>
                    </div>
                </template>
            </div>
        </main>
    </div>

    <!-- PLAYER PANEL -->
    <div class="immersive-player" id="mainPlayer" :style="playerOpen ? 'transform: translateY(0)' : 'transform: translateY(100%)'">
        <div id="verticalScrollContainer" @scroll.passive="handleMainScroll">
            
            <!-- PAGE 1: CONTROLS -->
            <div class="main-view text-white">
                <div class="artwork-container">
                    <img :src="activeTrack?.thumbnail" crossorigin="anonymous">
                    <div class="artwork-overlay"></div>
                    <button @click="closePlayer" class="absolute top-12 left-8 p-2 opacity-50"><i class="fa-solid fa-chevron-down text-2xl"></i></button>
                </div>
                <div class="player-content">
                    <div class="mb-8 text-left">
                        <h2 class="text-3xl font-black truncate" x-text="activeTrack?.title"></h2>
                        <p class="text-xl text-white/40 font-bold" x-text="activeTrack?.artist"></p>
                    </div>
                    <div class="mb-10">
                        <input type="range" class="progress-bar" min="0" :max="duration" x-model="currentTime" @input="seekMusic">
                        <div class="flex justify-between mt-3 text-[10px] font-black text-white/20">
                            <span x-text="formatTime(currentTime)">0:00</span>
                            <span x-text="formatTime(duration)">0:00</span>
                        </div>
                    </div>
                    <div class="flex justify-around items-center mb-10">
                        <i class="fa-solid fa-backward-step text-3xl opacity-40"></i>
                        <button @click="togglePlay()" class="w-20 h-20 bg-white text-black rounded-full flex items-center justify-center">
                            <i class="fa-solid text-3xl" :class="isPlaying ? 'fa-pause' : 'fa-play'"></i>
                        </button>
                        <i class="fa-solid fa-forward-step text-3xl opacity-40"></i>
                    </div>
                    <p class="text-[10px] font-black uppercase tracking-widest opacity-20">Scroll for Lyrics</p>
                </div>
            </div>

            <!-- PAGE 2: LYRICS -->
            <div class="lyrics-section">
                <div class="px-10 py-6 border-b border-white/5 flex justify-between items-center">
                    <span class="text-[10px] font-black uppercase tracking-[3px] text-white/30">Lyrics</span>
                    <button @click="showLyricsList = true" class="text-[10px] font-black bg-white/5 px-4 py-2 rounded-full text-white/50">Switch Version</button>
                </div>
                <div class="lyrics-scroll-window" id="lyricsWindow" @scroll="handleLyricsScroll">
                    <div class="h-[20vh]"></div>
                    <div class="lyrics-container">
                        <template x-for="(line, index) in parsedLyrics" :key="index">
                            <div class="lyric-line" :id="'line-' + index" :class="{ 'active': isLineActive(index) }" x-text="line.text"></div>
                        </template>
                    </div>
                    <div class="h-[60vh]"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL -->
    <div x-show="showLyricsList" x-cloak class="fixed inset-0 bg-black/95 z-[600] p-10 flex flex-col justify-center">
        <h3 class="text-white font-black text-2xl mb-8">Lyrics Versions</h3>
        <div class="space-y-4 overflow-y-auto">
            <template x-for="item in lyricsVersions" :key="item.id">
                <div @click="selectLyrics(item)" class="p-6 rounded-3xl bg-white/5 border border-white/10" :class="selectedLyricsId === item.id ? 'border-white' : ''">
                    <p class="text-white font-bold truncate" x-text="item.trackName"></p>
                </div>
            </template>
        </div>
        <button @click="showLyricsList = false" class="mt-10 py-5 bg-white text-black font-black rounded-3xl">Back</button>
    </div>

    <div id="yt-hidden"><div id="youtube-player"></div></div>
</div>

<script>
    var player;
    function audifyApp() {
        return {
            songs: [], searchQuery: '', activeTrack: null, playerOpen: false, isPlaying: false, 
            currentTime: 0, duration: 0, parsedLyrics: [], lastIndex: -1,
            showLyricsList: false, lyricsVersions: [], selectedLyricsId: null,
            isUserScrollingLyrics: false, lyricsScrollTimeout: null,
            mainScrollTimeout: null,

            initApp() {
                this.fetchData('New Hits');
                let tag = document.createElement('script');
                tag.src = "https://www.youtube.com/iframe_api";
                document.head.appendChild(tag);
            },
            async fetchData(q) {
                const res = await fetch(`/search?q=${encodeURIComponent(q)}`);
                this.songs = await res.json();
            },
            isLineActive(index) {
                const active = this.currentTime >= this.parsedLyrics[index].time && 
                             (this.parsedLyrics[index+1] ? this.currentTime < this.parsedLyrics[index+1].time : true);
                if (active && index !== this.lastIndex) {
                    this.lastIndex = index;
                    this.syncLyricsScroll(index);
                }
                return active;
            },
            handleLyricsScroll() {
                this.isUserScrollingLyrics = true;
                clearTimeout(this.lyricsScrollTimeout);
                this.lyricsScrollTimeout = setTimeout(() => { this.isUserScrollingLyrics = false; }, 3000);
            },
            syncLyricsScroll(index) {
                // FIXED: We check if the user is currently on the "Lyrics Page"
                const mainContainer = document.getElementById('verticalScrollContainer');
                const onLyricsPage = mainContainer.scrollTop > (window.innerHeight * 0.5);

                // ONLY scroll the lyrics window if we are on the lyrics page AND user isn't manual scrolling
                if (onLyricsPage && !this.isUserScrollingLyrics) {
                    const windowEl = document.getElementById('lyricsWindow');
                    const lineEl = document.getElementById('line-' + index);
                    
                    if (windowEl && lineEl) {
                        // Manual math calculation instead of scrollIntoView 
                        // to prevent the main player from jumping
                        const targetPos = lineEl.offsetTop - (windowEl.offsetHeight / 2.5);
                        windowEl.scrollTo({ top: targetPos, behavior: 'smooth' });
                    }
                }
            },
            handleMainScroll(e) {
                clearTimeout(this.mainScrollTimeout);
                this.mainScrollTimeout = setTimeout(() => {
                    const container = e.target;
                    const vh = window.innerHeight;
                    if (container.scrollTop > 0 && container.scrollTop < vh) {
                        const target = container.scrollTop > vh * 0.3 ? vh : 0;
                        container.scrollTo({ top: target, behavior: 'smooth' });
                    }
                }, 100);
            },
            closePlayer() { this.playerOpen = false; },
            async playSong(song) {
                this.activeTrack = song; this.playerOpen = true; this.isPlaying = true;
                this.currentTime = 0; this.lastIndex = -1; this.parsedLyrics = [];
                
                const startVideo = () => {
                    if (player && player.loadVideoById) {
                        player.loadVideoById(song.id);
                    } else {
                        player = new YT.Player('youtube-player', {
                            height: '0', width: '0', videoId: song.id,
                            playerVars: { 'autoplay': 1, 'controls': 0 },
                            events: { 
                                'onReady': (e) => e.target.playVideo(),
                                'onStateChange': (e) => { 
                                    if(e.data == YT.PlayerState.PLAYING) {
                                        this.duration = Math.floor(player.getDuration());
                                        this.getLyricsList(this.activeTrack.artist, this.activeTrack.title);
                                    }
                                } 
                            }
                        });
                    }
                };
                window.YT ? startVideo() : window.onYouTubeIframeAPIReady = startVideo;

                if(!this.intv) {
                    setInterval(() => { if(player && this.isPlaying) this.currentTime = player.getCurrentTime(); }, 500);
                    this.intv = true;
                }
            },
            async getLyricsList(artist, title) {
                const res = await fetch(`https://lrclib.net/api/search?artist_name=${encodeURIComponent(artist)}&track_name=${encodeURIComponent(title)}`);
                const data = await res.json();
                this.lyricsVersions = data.filter(l => l.syncedLyrics);
                if(this.lyricsVersions.length > 0) this.selectLyrics(this.lyricsVersions[0]);
            },
            selectLyrics(v) {
                this.selectedLyricsId = v.id;
                this.parsedLyrics = v.syncedLyrics.split('\n').map(line => {
                    const m = line.match(/\[(\d+):(\d+\.\d+)\](.*)/);
                    return m ? { time: parseInt(m[1]) * 60 + parseFloat(m[2]), text: m[3].trim() } : null;
                }).filter(l => l && l.text);
                this.showLyricsList = false;
            },
            togglePlay() { this.isPlaying = !this.isPlaying; this.isPlaying ? player.playVideo() : player.pauseVideo(); },
            seekMusic() { player.seekTo(this.currentTime, true); },
            formatTime(s) { let m=Math.floor(s/60), sec=Math.floor(s%60); return `${m}:${sec<10?'0':''}${sec}`; }
        }
    }
</script>
</body>
</html>
