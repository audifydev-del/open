<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Audify</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        [x-cloak] { display: none !important; }
        :root { --app-height: 100dvh; }
        body { background: #000; color: white; overflow: hidden; height: var(--app-height); font-family: 'Inter', sans-serif; }
        .app-shell { width: 100%; max-width: 450px; height: var(--app-height); margin: 0 auto; position: relative; display: flex; flex-direction: column; }
        
        .shelf { display: flex; overflow-x: auto; gap: 16px; scrollbar-width: none; padding-bottom: 10px; }
        .shelf::-webkit-scrollbar { display: none; }
        
        .bottom-nav { 
            background: linear-gradient(to top, #000 85%, transparent); 
            position: absolute; bottom: 0; left: 0; right: 0; 
            height: 85px; display: flex; justify-content: space-around; 
            align-items: center; z-index: 50; padding-bottom: env(safe-area-inset-bottom); 
        }
        
        .nav-item { display: flex; flex-direction: column; align-items: center; opacity: 0.6; transition: 0.2s; cursor: pointer; }
        .nav-item.active { opacity: 1; transform: scale(1.1); }

        .player-view { 
            position: absolute; inset: 0; z-index: 100; background: #000; 
            transition: transform 0.5s cubic-bezier(0.32, 0.72, 0, 1); 
            overflow-y: auto; scrollbar-width: none;
        }
        
        .immersive-bg { 
            position: absolute; top: -10%; width: 120%; height: 90vh; 
            object-fit: cover; filter: blur(60px) saturate(180%);
            mask-image: linear-gradient(to bottom, black 10%, transparent 90%);
            -webkit-mask-image: linear-gradient(to bottom, black 10%, transparent 90%);
            z-index: 0; transform: scale(1.2); transition: opacity 0.5s ease;
        }

        .main-art { 
            width: 100%; height: 100%;
            border-radius: 12px; box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            object-fit: cover; z-index: 10; position: relative;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .lyrics-window { 
            margin-top: 10px; padding: 120px 20px 20px 20px; 
            height: auto; max-height: 550px; overflow-y: auto;
            scrollbar-width: none; position: relative; z-index: 20;
            mask-image: linear-gradient(to bottom, transparent 0%, black 10%, black 95%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 10%, black 95%, transparent 100%);
            scroll-behavior: smooth;
        }

        .lyrics-line { 
            font-size: 1.6rem; font-weight: 800; line-height: 1.4; 
            color: rgba(255,255,255,0.15); transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1); 
            margin-bottom: 40px; transform-origin: left; filter: blur(0.5px);
        }
        
        .lyrics-line.active { 
            color: #fff; transform: scale(1.05); filter: blur(0);
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.6), 0 0 30px rgba(255, 255, 255, 0.2);
        }

        .control-pill {
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.1);
            padding: 6px 12px; border-radius: 20px; font-size: 10px; font-weight: 800;
            text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; gap: 6px; z-index: 120;
        }
        .control-pill.active { background: #fff; color: #000; }
        
        .source-item {
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.1);
            padding: 14px; border-radius: 12px; margin-bottom: 10px; cursor: pointer;
            transition: 0.2s; display: flex; justify-content: space-between; align-items: center;
        }
        .source-item.active { border-color: #fff; background: rgba(255,255,255,0.3); }
        .btn-active:active { transform: scale(0.92); opacity: 0.7; }
        #yt-player-container { position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none; }
        
        .fade-out { opacity: 0; transform: scale(0.95); }
        .fade-in { opacity: 1; transform: scale(1); }
        
        .shimmer {
            background: linear-gradient(90deg, #555 25%, #fff 50%, #555 75%);
            background-size: 200% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 2s infinite linear;
        }
        @keyframes shimmer { to { background-position: -200% 0; } }
    </style>
</head>
<body x-data="audifyApp()" x-init="init()">

    <!-- Launch Screen -->
    <div x-show="!launched" @click="launch()" class="fixed inset-0 bg-black z-[300] flex flex-col items-center justify-center cursor-pointer">
        <p class="font-bold tracking-[0.4em] uppercase text-[14px] mb-4">Audify</p>
        <p class="text-zinc-500 text-[10px] uppercase tracking-widest animate-bounce">Click anywhere to launch</p>
    </div>

    <!-- Splash Screen -->
    <div class="fixed inset-0 bg-black z-[200] flex items-center justify-center" x-show="launched && splash" x-transition:leave="duration-700">
        <p class="font-bold tracking-[0.4em] uppercase text-[12px] animate-pulse">Audify</p>
    </div>

    <div class="app-shell" x-cloak x-show="launched">
        <!-- Main Library -->
        <main class="flex-grow overflow-y-auto px-4 pt-12 pb-44 z-10 relative">
            <div class="flex justify-between items-center mb-8">
                <h1 class="text-2xl font-black tracking-tight" x-text="currentView === 'home' ? greet() : 'Search'"></h1>
                <div class="flex gap-5 text-lg"><i class="fa-regular fa-bell"></i><i class="fa-solid fa-gear"></i></div>
            </div>

            <!-- Home View -->
            <div x-show="currentView === 'home'" x-transition>
                <!-- Quick Picks Grid -->
                <div class="grid grid-cols-2 gap-3 mb-10">
                    <template x-for="s in trending.slice(0, 6)">
                        <div @click="play(s, trending)" class="bg-white/5 border border-white/5 rounded-md flex items-center gap-3 h-16 btn-active overflow-hidden">
                            <img :src="s.thumbnail" class="h-full w-16 object-cover">
                            <span class="text-[11px] font-bold truncate pr-2" x-text="s.title"></span>
                        </div>
                    </template>
                </div>

                <!-- Section 1: Recently Played -->
                <div class="mb-10">
                    <h2 class="text-xl font-bold mb-4">Recently Played</h2>
                    <div class="shelf">
                        <template x-for="s in trending">
                            <div @click="play(s, trending)" class="w-36 flex-shrink-0 btn-active">
                                <img :src="s.thumbnail" class="w-36 h-36 rounded-lg shadow-2xl mb-3 object-cover">
                                <p class="text-xs font-bold truncate" x-text="s.title"></p>
                                <p class="text-[10px] text-zinc-500 truncate" x-text="s.artist"></p>
                            </div>
                        </template>
                    </div>
                </div>

                <!-- Section 2: Made For You -->
                <div class="mb-10">
                    <h2 class="text-xl font-bold mb-4">Made For You</h2>
                    <div class="grid grid-cols-2 gap-4">
                        <template x-for="s in trending.slice().reverse().slice(0, 4)">
                            <div @click="play(s, trending)" class="btn-active">
                                <img :src="s.thumbnail" class="w-full aspect-square rounded-xl mb-2 object-cover">
                                <p class="text-[12px] font-bold truncate" x-text="s.title"></p>
                                <p class="text-[10px] text-zinc-500 truncate" x-text="s.artist"></p>
                            </div>
                        </template>
                    </div>
                </div>

                <!-- Section 3: Popular Playlists -->
                <div class="mb-10">
                    <h2 class="text-xl font-bold mb-4">Popular Playlists</h2>
                    <div class="shelf">
                        <template x-for="s in trending.slice(2, 7)">
                            <div @click="play(s, trending)" class="w-44 flex-shrink-0 btn-active relative">
                                <img :src="s.thumbnail" class="w-44 h-44 rounded-2xl mb-3 object-cover brightness-75">
                                <div class="absolute bottom-6 left-3 right-3">
                                    <p class="text-sm font-black truncate text-white uppercase italic" x-text="s.artist"></p>
                                    <p class="text-[9px] font-bold text-white/70 uppercase tracking-tighter">Essential Mix</p>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
            </div>

            <!-- Search View -->
            <div x-show="currentView === 'search'" x-transition>
                <div class="relative mb-8">
                    <i class="fa-solid fa-magnifying-glass absolute left-4 top-4 text-zinc-500"></i>
                    <input type="text" x-model="query" @input.debounce.500ms="searchMusic()" placeholder="Search songs..." class="w-full p-4 pl-12 rounded-xl bg-zinc-900 text-white outline-none border border-white/5">
                </div>
                <div class="space-y-5">
                    <template x-for="s in searchResults">
                        <div @click="play(s, searchResults)" class="flex items-center gap-4 btn-active">
                            <img :src="s.thumbnail" class="w-14 h-14 rounded-md object-cover">
                            <div class="overflow-hidden flex-grow">
                                <p class="font-bold text-sm truncate" x-text="s.title"></p>
                                <p class="text-xs text-zinc-400 truncate" x-text="s.artist"></p>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </main>

        <!-- Mini Player -->
        <div x-show="active && !open" @click="open=true" class="fixed bottom-[95px] left-3 right-3 max-w-[425px] mx-auto bg-zinc-900/80 backdrop-blur-xl border border-white/10 h-16 rounded-xl flex items-center px-3 gap-4 z-40 shadow-2xl">
            <img :src="active?.thumbnail" class="w-11 h-11 rounded-lg object-cover">
            <div class="flex-grow overflow-hidden">
                <p class="text-[12px] font-bold truncate" x-text="active?.title"></p>
                <p class="text-[10px] text-zinc-400 truncate" x-text="active?.artist"></p>
            </div>
            <button @click.stop="toggle()"><i class="fa-solid text-white text-lg" :class="playing ? 'fa-pause' : 'fa-play'"></i></button>
        </div>

        <!-- Navigation -->
        <nav class="bottom-nav">
            <div class="nav-item" :class="currentView === 'home' ? 'active' : ''" @click="currentView = 'home'"><i class="fa-solid fa-house"></i><span class="text-[10px] font-bold">Home</span></div>
            <div class="nav-item" :class="currentView === 'search' ? 'active' : ''" @click="currentView = 'search'"><i class="fa-solid fa-magnifying-glass"></i><span class="text-[10px] font-bold">Search</span></div>
        </nav>

        <!-- Full Player View -->
        <div x-show="open" class="player-view" id="full-player" x-transition:enter="translate-y-full" x-transition:enter-end="translate-y-0" x-transition:leave="translate-y-full">
            <img :src="active?.thumbnail" class="immersive-bg" :class="changing ? 'opacity-0' : 'opacity-80'">

            <div class="min-h-screen p-8 flex flex-col relative z-10 pb-6">
                <header class="flex justify-between items-center mb-10">
                    <i class="fa-solid fa-chevron-down text-xl p-2 btn-active" @click="open=false"></i>
                    <p class="text-[11px] font-bold uppercase tracking-widest">Now Playing</p>
                    <i class="fa-solid fa-ellipsis-vertical text-xl p-2"></i>
                </header>
                
                <div class="w-[85%] mx-auto aspect-square mb-10">
                    <img :src="active?.thumbnail" class="main-art" :class="changing ? 'fade-out' : 'fade-in'">
                </div>

                <div class="transition-all duration-500" :class="changing ? 'opacity-0 translate-y-2' : 'opacity-100 translate-y-0'">
                    <div class="mb-8">
                        <h2 class="text-2xl font-black mb-1 truncate" x-text="active?.title"></h2>
                        <p class="text-lg text-white/60 font-medium truncate" x-text="active?.artist"></p>
                    </div>
                    
                    <div class="mb-10">
                        <div class="relative h-1.5 bg-white/10 rounded-full mb-2" @click="seek($event)">
                            <div class="absolute h-full bg-white rounded-full" :style="`width: ${prog}%`"></div>
                        </div>
                        <div class="flex justify-between text-[10px] font-bold text-white/40">
                            <span x-text="formatTime(currentTime)">0:00</span>
                            <span x-text="formatTime(duration)">0:00</span>
                        </div>
                    </div>
                </div>

                <!-- Player Controls -->
                <div class="flex justify-around items-center mb-12">
                    <button @click="toggleShuffle()" class="text-lg" :class="shuffle ? 'text-white' : 'text-white/20'"><i class="fa-solid fa-shuffle"></i></button>
                    <button @click="prev()" class="btn-active"><i class="fa-solid fa-backward-step text-3xl"></i></button>
                    <button @click="toggle()" class="w-20 h-20 bg-white text-black rounded-full flex items-center justify-center shadow-2xl btn-active">
                        <i class="fa-solid text-3xl" :class="playing ? 'fa-pause' : 'fa-play'"></i>
                    </button>
                    <button @click="next()" class="btn-active"><i class="fa-solid fa-forward-step text-3xl"></i></button>
                    <button @click="toggleRepeat()" class="text-lg relative" :class="repeatMode !== 'off' ? 'text-white' : 'text-white/20'">
                        <i class="fa-solid fa-repeat"></i>
                        <span x-show="repeatMode === 'one'" class="absolute -top-1 -right-1 bg-white text-black text-[8px] w-3 h-3 rounded-full flex items-center justify-center font-bold">1</span>
                    </button>
                </div>

                <!-- Lyrics Area -->
                <div class="flex flex-col flex-grow relative">
                    <div class="flex justify-between items-center mb-4 relative z-[130]">
                        <h3 class="text-xs font-black uppercase tracking-widest text-white/30">Lyrics</h3>
                        <div class="flex gap-2">
                            <button @click="showSources = !showSources" class="control-pill" :class="showSources ? 'active' : ''"><i class="fa-solid fa-list-ul"></i> Sources</button>
                            <button @click="isSynced = !isSynced" class="control-pill" :class="isSynced ? 'active' : ''"><i class="fa-solid fa-arrows-rotate"></i> Sync</button>
                        </div>
                    </div>

                    <div x-show="isFetchingLyrics" class="absolute inset-x-0 top-12 text-center z-[110]" x-transition>
                        <p class="text-[10px] font-black uppercase tracking-[0.3em] shimmer">Fetching Lyrics...</p>
                    </div>

                    <div x-show="showSources" x-transition class="absolute inset-x-0 top-12 bg-zinc-900/95 backdrop-blur-3xl p-4 rounded-2xl border border-white/20 max-h-[300px] overflow-y-auto z-[150] shadow-2xl">
                        <template x-for="source in availableSources" :key="source.id">
                            <div @click="applySource(source)" class="source-item" :class="activeSourceId === source.id ? 'active' : ''">
                                <div class="overflow-hidden flex-grow mr-4">
                                    <p class="text-xs font-bold truncate text-white" x-text="source.trackName"></p>
                                    <p class="text-[10px] text-white/50 truncate" x-text="source.artistName + ' • ' + source.albumName"></p>
                                </div>
                                <div class="text-[10px] font-bold text-white/40 px-2 py-1 bg-white/5 rounded" x-text="formatTime(source.duration)"></div>
                            </div>
                        </template>
                    </div>

                    <div class="lyrics-window" id="lyrics-window" @scroll="handleUserScroll">
                        <div class="space-y-1" id="lyrics-container">
                            <template x-for="(line, index) in lyrics">
                                <div class="lyrics-line" :id="'line-'+index" :class="currentLineIndex === index ? 'active' : ''" x-text="line.text"></div>
                            </template>
                            <div x-show="lyrics.length === 0 && !isFetchingLyrics" class="text-white/20 font-bold text-xl py-20">No lyrics available for this track.</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div id="yt-player-container"><div id="player"></div></div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let ytPlayer;
        function onYouTubeIframeAPIReady() {
            ytPlayer = new YT.Player('player', {
                height: '1', width: '1', videoId: '',
                playerVars: { 'autoplay': 1, 'controls': 0, 'disablekb': 1, 'playsinline': 1 },
                events: {
                    'onStateChange': (e) => {
                        if(window.audifyAppInstance) {
                            window.audifyAppInstance.playing = (e.data === YT.PlayerState.PLAYING);
                            if (e.data === YT.PlayerState.ENDED) window.audifyAppInstance.next();
                            if(e.data === YT.PlayerState.PLAYING && !window.audifyAppInstance.lyrics.length) {
                                window.audifyAppInstance.fetchLyrics(window.audifyAppInstance.active);
                            }
                        }
                    }
                }
            });
        }

        function audifyApp() {
            return {
                launched: false, splash: true, currentView: 'home', query: '', open: false,
                playing: false, prog: 0, currentTime: 0, duration: 0, changing: false,
                trending: [], searchResults: [], active: null,
                lyrics: [], currentLineIndex: -1, isSynced: true, isFetchingLyrics: false,
                userScrollingTimer: null, isUserScrolling: false,
                showSources: false, availableSources: [], activeSourceId: null,
                shuffle: false, repeatMode: 'off', queue: [], originalQueue: [], currentIndex: -1,

                launch() { this.launched = true; if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen(); },
                greet() { return ['Good Morning','Good Afternoon','Good Evening'][Math.floor(new Date().getHours()/8)] || 'Audify' },
                formatTime(s) { if(!s) return "0:00"; let m = Math.floor(s/60), sec = Math.floor(s%60); return `${m}:${sec < 10 ? '0' : ''}${sec}`; },
                async init() {
                    window.audifyAppInstance = this;
                    setTimeout(() => this.splash = false, 1500);
                    try {
                        const res = await fetch('/search?q=trending+hits');
                        const data = await res.json();
                        this.trending = data.filter(s => !['t-series', 'tseries'].some(term => (s.title + s.artist).toLowerCase().includes(term)));
                    } catch(e) {}
                    setInterval(() => {
                        if(this.playing && ytPlayer?.getCurrentTime) {
                            this.currentTime = ytPlayer.getCurrentTime();
                            this.duration = ytPlayer.getDuration();
                            this.prog = (this.currentTime / this.duration) * 100;
                            this.syncLyrics();
                        }
                    }, 100);
                },
                async searchMusic() {
                    if(!this.query) return;
                    const res = await fetch(`/search?q=${encodeURIComponent(this.query)}`);
                    this.searchResults = await res.json();
                },
                async fetchLyrics(track) {
                    if(!track) return;
                    this.isFetchingLyrics = true;
                    this.availableSources = [];
                    try {
                        const cleanTitle = track.title.replace(/\(Official.*\)|\[Official.*\]/gi, '').trim();
                        const res = await fetch(`https://lrclib.net/api/search?track_name=${encodeURIComponent(cleanTitle)}&artist_name=${encodeURIComponent(track.artist)}`);
                        let data = await res.json();
                        this.isFetchingLyrics = false;
                        if(!data.length) return;
                        this.availableSources = data;
                        const vDur = ytPlayer?.getDuration() || 0;
                        let best = data.reduce((prev, curr) => Math.abs(curr.duration - vDur) < Math.abs(prev.duration - vDur) ? curr : prev);
                        this.applySource(best);
                    } catch(e) { this.isFetchingLyrics = false; }
                },
                applySource(source) {
                    this.activeSourceId = source.id;
                    if(source.syncedLyrics) {
                        this.lyrics = source.syncedLyrics.split('\n').map(line => {
                            const match = line.match(/\[(\d+):(\d+\.\d+)\](.*)/);
                            if(match) return { time: parseInt(match[1]) * 60 + parseFloat(match[2]), text: match[3].trim() };
                            return null;
                        }).filter(l => l && l.text);
                    } else if (source.plainLyrics) {
                        this.lyrics = [{time: 0, text: "Unsynced:"}, ...source.plainLyrics.split('\n').map(l => ({time: 0, text: l}))];
                    }
                    this.showSources = false; this.currentLineIndex = -1;
                },
                async play(s, list = null) {
                    this.changing = true;
                    this.showSources = false;
                    setTimeout(async () => {
                        if (list) {
                            this.originalQueue = [...list];
                            this.queue = this.shuffle ? this.shuffleArray([...list]) : [...list];
                        }
                        this.active = s;
                        this.currentIndex = this.queue.findIndex(item => item.id === s.id);
                        this.lyrics = []; this.availableSources = []; this.activeSourceId = null;
                        this.prog = 0; this.currentTime = 0;
                        if(ytPlayer?.loadVideoById) { ytPlayer.loadVideoById({ videoId: s.id, suggestedQuality: 'small' }); this.playing = true; }
                        setTimeout(() => this.changing = false, 50);
                    }, 400);
                },
                next() {
                    if (this.repeatMode === 'one') { ytPlayer.seekTo(0); return; }
                    let nextIdx = this.currentIndex + 1;
                    if (nextIdx < this.queue.length) this.play(this.queue[nextIdx]);
                    else if (this.repeatMode === 'all') this.play(this.queue[0]);
                },
                prev() {
                    if (this.currentTime > 3) { ytPlayer.seekTo(0); return; }
                    let prevIdx = this.currentIndex - 1;
                    if (prevIdx >= 0) this.play(this.queue[prevIdx]);
                    else if (this.repeatMode === 'all') this.play(this.queue[this.queue.length - 1]);
                },
                toggleShuffle() {
                    this.shuffle = !this.shuffle;
                    if (this.shuffle) {
                        let cur = this.queue[this.currentIndex];
                        let rem = this.originalQueue.filter(i => i.id !== cur.id);
                        this.queue = [cur, ...this.shuffleArray(rem)];
                        this.currentIndex = 0;
                    } else {
                        this.queue = [...this.originalQueue];
                        this.currentIndex = this.queue.findIndex(i => i.id === this.active.id);
                    }
                },
                toggleRepeat() {
                    const modes = ['off', 'all', 'one'];
                    this.repeatMode = modes[(modes.indexOf(this.repeatMode) + 1) % modes.length];
                },
                shuffleArray(arr) {
                    let a = [...arr];
                    for (let i = a.length - 1; i > 0; i--) {
                        const j = Math.floor(Math.random() * (i + 1));
                        [a[i], a[j]] = [a[j], a[i]];
                    }
                    return a;
                },
                syncLyrics() {
                    if(!this.lyrics.length || this.lyrics[0].time === 0) return;
                    let index = -1;
                    for (let i = 0; i < this.lyrics.length; i++) {
                        if (this.currentTime >= this.lyrics[i].time) index = i; else break;
                    }
                    if (index !== -1 && index !== this.currentLineIndex) {
                        this.currentLineIndex = index;
                        if(this.isSynced && !this.isUserScrolling) {
                            const activeEl = document.getElementById('line-' + index);
                            const windowEl = document.getElementById('lyrics-window');
                            if(activeEl && windowEl) {
                                const scrollTarget = windowEl.scrollTop + (activeEl.getBoundingClientRect().top - windowEl.getBoundingClientRect().top) - (windowEl.offsetHeight * 0.2);
                                windowEl.scrollTo({ top: scrollTarget, behavior: 'smooth' });
                            }
                        }
                    }
                },
                toggle() { this.playing ? ytPlayer.pauseVideo() : ytPlayer.playVideo(); },
                seek(e) { ytPlayer.seekTo((e.offsetX / e.currentTarget.offsetWidth) * this.duration); },
                handleUserScroll() { this.isUserScrolling = true; clearTimeout(this.userScrollingTimer); this.userScrollingTimer = setTimeout(() => this.isUserScrolling = false, 2500); }
            }
        }
    </script>
</body>
</html>
