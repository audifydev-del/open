<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Audify</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --theme-color: #0f0f0f; }
        [x-cloak] { display: none !important; }
        
        body, html { 
            background-color: #000; margin: 0; padding: 0; 
            height: 100%; width: 100%; overflow: hidden;
            font-family: 'Inter', sans-serif;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }

        .app-shell { 
            width: 100%; max-width: 450px; height: 100%; margin: 0 auto;
            position: relative; 
            background-color: var(--theme-color) !important; 
            transition: background-color 1s ease-in-out;
        }

        /* MAIN SCROLLABLE PLAYER */
        .immersive-player {
            position: absolute; inset: 0;
            background-color: var(--theme-color); 
            z-index: 100;
            display: flex; flex-direction: column;
            transition: transform 0.6s cubic-bezier(0.32, 0.72, 0, 1), background-color 1s ease;
            overflow-y: auto;
            scrollbar-width: none;
        }
        .immersive-player::-webkit-scrollbar { display: none; }

        .artwork-container { 
            position: relative; width: 100%; height: 45vh; min-height: 320px; shrink: 0;
        }
        .artwork-container img { width: 100%; height: 100%; object-fit: cover; }
        
        .artwork-overlay { 
            position: absolute; inset: 0; 
            background: linear-gradient(to bottom, transparent 0%, rgba(0,0,0,0.1) 40%, var(--theme-color) 100%); 
        }

        .player-content { padding: 0 30px 10px; shrink: 0; }

        /* LIQUID GLASS LYRICS SECTION */
        .lyrics-section {
            margin: 20px;
            padding: 20px 0;
            min-height: 80vh;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 40px;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .lyrics-scroll-box {
            flex-grow: 1;
            padding: 0 40px; 
            mask-image: linear-gradient(to bottom, transparent 0%, black 15%, black 85%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 15%, black 85%, transparent 100%);
        }

        .scroll-spacer { height: 35vh; }

        .lyric-line {
            font-size: 1.8rem;
            line-height: 1.2;
            font-weight: 900;
            margin-bottom: 35px;
            transition: all 0.4s ease;
            color: rgba(255, 255, 255, 0.1);
        }

        .lyric-line.active { 
            color: #fff; 
            transform: scale(1.04); 
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
        }

        input[type="range"].progress-bar { 
            width: 100%; -webkit-appearance: none; background: rgba(255,255,255,0.15); 
            height: 4px; border-radius: 10px; outline: none;
        }
        input[type="range"].progress-bar::-webkit-slider-thumb { 
            -webkit-appearance: none; height: 16px; width: 16px; background: #fff; border-radius: 50%; 
        }

        .dot-pulse {
            display: inline-block; width: 8px; height: 8px; border-radius: 50%;
            background-color: #fff; animation: pulse 1.5s infinite ease-in-out;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        #yt-hidden { position: absolute; top: -9999px; visibility: hidden; }
        canvas { display: none; }
    </style>
</head>
<body>

<div x-data="audifyApp()" x-init="initApp()" class="app-shell" id="appShell">
    <canvas id="colorCanvas"></canvas>
    
    <!-- Home UI -->
    <div class="h-full flex flex-col" x-show="!playerOpen">
        <header class="p-6 text-white">
            <h1 class="text-4xl font-black mb-4 tracking-tighter">Audify</h1>
            <input type="text" x-model="searchQuery" @keydown.enter="fetchData(searchQuery)" 
                   placeholder="Search..." class="w-full bg-white/10 rounded-2xl py-4 px-6 outline-none">
        </header>
        <main class="flex-grow overflow-y-auto px-4 pb-24">
            <div class="grid grid-cols-2 gap-4">
                <template x-for="song in songs" :key="song.id">
                    <div class="bg-white/5 p-3 rounded-2xl cursor-pointer" @click="playSong(song)">
                        <img :src="song.thumbnail" class="w-full aspect-square rounded-xl object-cover mb-2">
                        <p class="text-sm font-bold truncate text-white" x-text="song.title"></p>
                    </div>
                </template>
            </div>
        </main>
    </div>

    <!-- PLAYER PAGE -->
    <div class="immersive-player" id="mainPlayer" :style="playerOpen ? 'transform: translateY(0)' : 'transform: translateY(100%)'">
        <div class="artwork-container">
            <img :src="activeTrack?.thumbnail" crossorigin="anonymous" id="mainArtwork">
            <div class="artwork-overlay"></div>
            <button @click="playerOpen = false" class="absolute top-10 left-6 z-30 p-2 text-white opacity-40"><i class="fa-solid fa-chevron-down text-xl"></i></button>
        </div>

        <div class="player-content text-white">
            <div class="mb-4">
                <h2 class="text-2xl font-black truncate" x-text="activeTrack?.title"></h2>
                <p class="text-lg text-white/50 font-bold" x-text="activeTrack?.artist"></p>
            </div>

            <div class="mb-6">
                <input type="range" class="progress-bar" min="0" :max="duration" x-model="currentTime" @input="seekMusic">
                <div class="flex justify-between mt-2 text-[10px] font-bold text-white/20">
                    <span x-text="formatTime(currentTime)">0:00</span>
                    <span x-text="formatTime(duration)">0:00</span>
                </div>
            </div>

            <div class="flex justify-between items-center mb-6">
                <i class="fa-solid fa-shuffle text-lg opacity-20"></i>
                <i class="fa-solid fa-backward-step text-2xl"></i>
                <button @click="togglePlay()" class="w-16 h-16 bg-white text-black rounded-full flex items-center justify-center">
                    <i class="fa-solid text-2xl" :class="isPlaying ? 'fa-pause' : 'fa-play'"></i>
                </button>
                <i class="fa-solid fa-forward-step text-2xl"></i>
                <i class="fa-solid fa-repeat text-lg opacity-20"></i>
            </div>
        </div>

        <!-- LYRICS SECTION (Liquid Glass) -->
        <div class="lyrics-section" id="lyricsSection">
            <div class="flex justify-between items-center px-10 py-2">
                <p class="text-[9px] font-black uppercase tracking-widest text-white/20">Synced Lyrics</p>
                <button @click="showLyricsList = true" class="text-[9px] font-black uppercase bg-white/5 px-3 py-1 rounded-full text-white/40" x-show="lyricsVersions.length > 0">Versions</button>
            </div>

            <div class="lyrics-scroll-box" id="lyricsScrollBox">
                <div class="scroll-spacer"></div>
                
                <div x-show="isSyncing" class="flex flex-col items-center py-10 opacity-30">
                    <div class="dot-pulse mb-4"></div>
                    <p class="text-[10px] font-black uppercase tracking-widest">Awaiting Sync...</p>
                </div>

                <template x-for="(line, index) in parsedLyrics" :key="index">
                    <div class="lyric-line" 
                         :id="'line-' + index"
                         :class="{ 'active': isLineActive(index) }"
                         x-text="line.text"></div>
                </template>
                
                <div x-show="!isSyncing && parsedLyrics.length === 0" class="opacity-20 italic text-center py-10" x-text="lyricsStatus"></div>
                
                <div class="scroll-spacer"></div>
            </div>
        </div>
    </div>

    <!-- VERSION MODAL -->
    <div x-show="showLyricsList" x-cloak @click.away="showLyricsList = false" class="fixed inset-0 bg-black/90 z-[500] flex items-end">
        <div class="p-8 bg-[#111] w-full rounded-t-[40px] max-h-[70vh] overflow-y-auto">
            <h3 class="text-white font-black text-xl mb-6">Select Version</h3>
            <div class="space-y-4">
                <template x-for="item in lyricsVersions" :key="item.id">
                    <div @click="selectLyrics(item)" class="p-5 rounded-2xl flex justify-between items-center" :class="selectedLyricsId === item.id ? 'bg-white/10' : 'bg-white/5'">
                        <div class="overflow-hidden">
                            <p class="text-white font-bold text-sm truncate" x-text="item.trackName"></p>
                            <p class="text-white/40 text-[10px]" x-text="'Match Score: ' + Math.abs(item.duration - duration) + 's difference'"></p>
                        </div>
                        <span class="text-white/60 font-black text-xs" x-text="formatTime(item.duration)"></span>
                    </div>
                </template>
            </div>
            <button @click="showLyricsList = false" class="w-full mt-6 py-4 bg-white text-black font-black rounded-2xl">Close</button>
        </div>
    </div>

    <div id="yt-hidden"><div id="youtube-player"></div></div>
</div>

<script>
    var player;
    window.handleItunesResponse = function(data) { window.dispatchEvent(new CustomEvent('itunes-data', { detail: data })); };

    function audifyApp() {
        return {
            songs: [], searchQuery: '', activeTrack: null, playerOpen: false, isPlaying: false, 
            currentTime: 0, duration: 0, parsedLyrics: [], lastIndex: -1,
            showLyricsList: false, lyricsVersions: [], selectedLyricsId: null, 
            lyricsStatus: '', isSyncing: false,

            initApp() {
                this.fetchData('Trending');
                let tag = document.createElement('script');
                tag.src = "https://www.youtube.com/iframe_api";
                document.head.appendChild(tag);
            },
            async fetchData(q) {
                const res = await fetch(`/search?q=${encodeURIComponent(q)}`);
                this.songs = await res.json();
            },
            isLineActive(index) {
                const active = this.currentTime >= this.parsedLyrics[index].time && 
                             (this.parsedLyrics[index+1] ? this.currentTime < this.parsedLyrics[index+1].time : true);
                if(active && this.lastIndex !== index) {
                    this.lastIndex = index;
                    this.scrollLyrics(index);
                }
                return active;
            },
            scrollLyrics(index) {
                const line = document.getElementById('line-' + index);
                const container = document.getElementById('mainPlayer');
                
                if (line && container) {
                    // Only snap scroll if the user is currently scrolled down to the lyrics section
                    if (container.scrollTop > 250) {
                        const targetPos = line.offsetTop - (container.clientHeight / 2) + (line.clientHeight / 2);
                        container.scrollTo({ top: targetPos, behavior: 'smooth' });
                    }
                }
            },
            async playSong(song) {
                this.activeTrack = JSON.parse(JSON.stringify(song)); 
                this.playerOpen = true;
                this.isPlaying = true;
                this.parsedLyrics = [];
                this.lyricsVersions = [];
                this.lastIndex = -1;
                this.isSyncing = true;
                this.duration = 0;

                const script = document.createElement('script');
                script.src = `https://itunes.apple.com/search?term=${encodeURIComponent(song.artist + ' ' + song.title)}&limit=1&entity=song&callback=handleItunesResponse`;
                const onData = (e) => {
                    if (e.detail.results?.length > 0) {
                        const hqUrl = e.detail.results[0].artworkUrl100.replace('100x100bb.jpg', '800x800bb.jpg');
                        const tempImg = new Image(); tempImg.crossOrigin = "anonymous"; tempImg.src = hqUrl;
                        tempImg.onload = () => { this.activeTrack.thumbnail = hqUrl; this.updateTheme(tempImg); };
                    }
                };
                window.addEventListener('itunes-data', onData, { once: true });
                document.body.appendChild(script);

                if (player && player.loadVideoById) {
                    player.loadVideoById(song.id);
                } else {
                    player = new YT.Player('youtube-player', {
                        height: '1', width: '1', videoId: song.id,
                        events: { 
                            'onStateChange': (e) => { 
                                if(e.data == 1) {
                                    this.duration = Math.floor(player.getDuration());
                                    this.getLyricsList(this.activeTrack.artist, this.activeTrack.title);
                                }
                            } 
                        }
                    });
                }

                if(!this.intv) {
                    setInterval(() => { 
                        if(player && this.isPlaying) {
                            this.currentTime = player.getCurrentTime();
                        } 
                    }, 500);
                    this.intv = true;
                }
            },
            async getLyricsList(artist, title) {
                try {
                    const res = await fetch(`https://lrclib.net/api/search?artist_name=${encodeURIComponent(artist)}&track_name=${encodeURIComponent(title)}`);
                    const data = await res.json();
                    this.lyricsVersions = data.filter(l => l.syncedLyrics);
                    
                    if(this.lyricsVersions.length > 0) {
                        let closest = this.lyricsVersions.reduce((prev, curr) => {
                            return (Math.abs(curr.duration - this.duration) < Math.abs(prev.duration - this.duration) ? curr : prev);
                        });
                        this.selectLyrics(closest);
                    } else {
                        this.isSyncing = false;
                        this.lyricsStatus = 'No synced lyrics found.';
                    }
                } catch (e) { this.isSyncing = false; this.lyricsStatus = 'Error fetching lyrics.'; }
            },
            selectLyrics(version) {
                this.selectedLyricsId = version.id;
                this.parsedLyrics = version.syncedLyrics.split('\n').map(line => {
                    const m = line.match(/\[(\d+):(\d+\.\d+)\](.*)/);
                    return m ? { time: parseInt(m[1]) * 60 + parseFloat(m[2]), text: m[3].trim() } : null;
                }).filter(l => l && l.text);
                this.isSyncing = false;
                this.showLyricsList = false;
                this.lastIndex = -1;
            },
            updateTheme(img) {
                const canvas = document.getElementById('colorCanvas');
                const ctx = canvas.getContext('2d');
                canvas.width = 10; canvas.height = 10;
                ctx.drawImage(img, 0, 0, 10, 10);
                const p = ctx.getImageData(0, 0, 10, 10).data;
                let r=0, g=0, b=0, count = p.length/4;
                for (let i=0; i<p.length; i+=4) { r += p[i]; g += p[i+1]; b += p[i+2]; }
                const color = `rgb(${Math.max(15, (r/count)-45)}, ${Math.max(15, (g/count)-45)}, ${Math.max(15, (b/count)-45)})`;
                document.documentElement.style.setProperty('--theme-color', color);
                document.getElementById('appShell').style.backgroundColor = color;
            },
            togglePlay() { this.isPlaying = !this.isPlaying; this.isPlaying ? player.playVideo() : player.pauseVideo(); },
            seekMusic() { player.seekTo(this.currentTime, true); },
            formatTime(s) { if(!s || s < 0) return '0:00'; let m=Math.floor(s/60), sec=Math.floor(s%60); return `${m}:${sec<10?'0':''}${sec}`; }
        }
    }
</script>
</body>
</html>
