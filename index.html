<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Audify</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --theme-color: #0f0f0f; }
        [x-cloak] { display: none !important; }
        
        body, html { 
            background-color: #000; margin: 0; padding: 0; 
            height: 100%; width: 100%; display: flex; 
            justify-content: center; align-items: center; overflow: hidden;
            font-family: 'Inter', sans-serif;
        }

        .app-shell { 
            width: 100%; max-width: 450px; height: 100%; 
            position: relative; 
            background-color: var(--theme-color) !important; 
            transition: background-color 1s ease-in-out;
            overflow: hidden;
        }

        .immersive-player {
            position: absolute; inset: 0;
            background-color: var(--theme-color); 
            z-index: 100;
            display: flex; flex-direction: column;
            transition: transform 0.6s cubic-bezier(0.32, 0.72, 0, 1), background-color 1s ease;
            overflow-y: auto; /* Makes the player scrollable */
            scrollbar-width: none;
        }
        .immersive-player::-webkit-scrollbar { display: none; }

        .artwork-container { 
            position: relative; width: 100%; height: 60vh; min-height: 400px; z-index: 1;
        }
        .artwork-container img { width: 100%; height: 100%; object-fit: cover; }
        
        .artwork-overlay { 
            position: absolute; inset: 0; 
            background: linear-gradient(to bottom, transparent 0%, rgba(0,0,0,0.2) 40%, var(--theme-color) 100%); 
            z-index: 2;
        }

        .player-content { position: relative; z-index: 10; padding: 0 30px 40px; }

        input[type="range"].progress-bar { 
            width: 100%; -webkit-appearance: none; background: rgba(255,255,255,0.2); 
            height: 4px; border-radius: 10px; outline: none;
        }
        input[type="range"].progress-bar::-webkit-slider-thumb { 
            -webkit-appearance: none; height: 14px; width: 14px; background: #fff; border-radius: 50%; 
        }

        .lyrics-section {
            margin-top: 40px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            min-height: 200px;
        }
        
        .lyrics-text {
            font-size: 1.25rem;
            line-height: 1.6;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.5);
            white-space: pre-wrap;
        }
        
        #yt-hidden { position: absolute; top: -9999px; visibility: hidden; }
        canvas { display: none; }
    </style>
</head>
<body>

<div x-data="audifyApp()" x-init="initApp()" class="app-shell" id="appShell">
    <canvas id="colorCanvas"></canvas>
    
    <!-- Home UI -->
    <div class="home-page h-full flex flex-col" x-show="!playerOpen">
        <header class="p-6">
            <h1 class="text-4xl font-black mb-4 tracking-tighter text-white">Audify</h1>
            <input type="text" x-model="searchQuery" @keydown.enter="fetchData(searchQuery)" 
                   placeholder="Search songs..." 
                   class="w-full bg-white/10 rounded-2xl py-4 px-6 text-white outline-none border border-white/5">
        </header>
        <main class="flex-grow overflow-y-auto px-4 pb-24">
            <div class="grid grid-cols-2 gap-4">
                <template x-for="song in songs" :key="song.id">
                    <div class="bg-white/5 p-3 rounded-2xl" @click="playSong(song)">
                        <img :src="song.thumbnail" class="w-full aspect-square rounded-xl object-cover mb-2">
                        <p class="text-sm font-bold truncate text-white" x-text="song.title"></p>
                    </div>
                </template>
            </div>
        </main>
    </div>

    <!-- SCROLLABLE PLAYER -->
    <div class="immersive-player" :style="playerOpen ? 'transform: translateY(0)' : 'transform: translateY(100%)'">
        <div class="artwork-container">
            <img :src="activeTrack?.thumbnail" crossorigin="anonymous" id="mainArt">
            <div class="artwork-overlay"></div>
            <button @click="playerOpen = false" class="absolute top-10 left-6 z-30 p-2 bg-black/20 rounded-full text-white">
                <i class="fa-solid fa-chevron-down text-xl"></i>
            </button>
        </div>

        <div class="player-content text-white">
            <div class="mb-8">
                <h2 class="text-3xl font-black truncate" x-text="activeTrack?.title"></h2>
                <p class="text-xl text-white/60 font-bold" x-text="activeTrack?.artist"></p>
            </div>

            <div class="mb-8">
                <input type="range" class="progress-bar" min="0" :max="duration" x-model="currentTime" @input="seekMusic">
                <div class="flex justify-between mt-3 text-[11px] font-bold text-white/30">
                    <span x-text="formatTime(currentTime)">0:00</span>
                    <span x-text="formatTime(duration)">0:00</span>
                </div>
            </div>

            <div class="flex justify-center items-center gap-8 mb-10">
                <i class="fa-solid fa-backward-step text-3xl"></i>
                <button @click="togglePlay()" class="w-20 h-20 bg-white text-black rounded-full flex items-center justify-center">
                    <i class="fa-solid text-3xl" :class="isPlaying ? 'fa-pause' : 'fa-play'"></i>
                </button>
                <i class="fa-solid fa-forward-step text-3xl"></i>
            </div>

            <!-- LYRICS SECTION -->
            <div class="lyrics-section">
                <p class="text-[10px] font-black uppercase tracking-widest text-white/30 mb-4">Lyrics</p>
                <div class="lyrics-text" x-text="lyrics || 'Loading lyrics...'"></div>
            </div>
        </div>
    </div>

    <div id="yt-hidden"><div id="youtube-player"></div></div>
</div>

<script>
    var player;
    window.handleItunesResponse = function(data) {
        window.dispatchEvent(new CustomEvent('itunes-data', { detail: data }));
    };

    function audifyApp() {
        return {
            songs: [], searchQuery: '', activeTrack: null, playerOpen: false, isPlaying: false, currentTime: 0, duration: 0, lyrics: '',
            initApp() {
                this.fetchData('Latest Pop');
                let tag = document.createElement('script');
                tag.src = "https://www.youtube.com/iframe_api";
                document.head.appendChild(tag);
            },
            async fetchData(q) {
                const res = await fetch(`/search?q=${encodeURIComponent(q)}`);
                this.songs = await res.json();
            },
            async playSong(song) {
                this.activeTrack = song;
                this.playerOpen = true;
                this.isPlaying = true;
                this.lyrics = 'Searching for lyrics...';

                // 1. Fetch High-Res Art & Color (JSONP)
                const script = document.createElement('script');
                script.src = `https://itunes.apple.com/search?term=${encodeURIComponent(song.artist + ' ' + song.title)}&limit=1&entity=song&callback=handleItunesResponse`;
                const onData = (e) => {
                    if (e.detail.results?.length > 0) {
                        const imgUrl = e.detail.results[0].artworkUrl100.replace('100x100bb.jpg', '800x800bb.jpg');
                        this.activeTrack.thumbnail = imgUrl;
                        const img = new Image();
                        img.crossOrigin = "anonymous";
                        img.src = imgUrl;
                        img.onload = () => this.updateTheme(img);
                    }
                    window.removeEventListener('itunes-data', onData);
                    if(script.parentNode) script.parentNode.removeChild(script);
                };
                window.addEventListener('itunes-data', onData);
                document.body.appendChild(script);

                // 2. Fetch Lyrics from LRCLIB
                this.getLyrics(song.artist, song.title);

                // 3. YouTube
                if (player && player.loadVideoById) {
                    player.loadVideoById(song.id);
                } else {
                    player = new YT.Player('youtube-player', {
                        height: '1', width: '1', videoId: song.id,
                        events: { 'onStateChange': (e) => { if(e.data == 1) this.duration = Math.floor(player.getDuration()); } }
                    });
                }
                if(!this.intv) {
                    setInterval(() => { if(player && this.isPlaying && player.getCurrentTime) this.currentTime = Math.floor(player.getCurrentTime()); }, 1000);
                    this.intv = true;
                }
            },
            async getLyrics(artist, title) {
                try {
                    const res = await fetch(`https://lrclib.net/api/get?artist_name=${encodeURIComponent(artist)}&track_name=${encodeURIComponent(title)}`);
                    const data = await res.json();
                    this.lyrics = data.plainLyrics || data.syncedLyrics?.replace(/\[.*?\]/g, '') || "Lyrics not found.";
                } catch (e) {
                    this.lyrics = "Could not load lyrics.";
                }
            },
            updateTheme(img) {
                const canvas = document.getElementById('colorCanvas');
                const ctx = canvas.getContext('2d');
                canvas.width = 10; canvas.height = 10;
                ctx.drawImage(img, 0, 0, 10, 10);
                const p = ctx.getImageData(0, 0, 10, 10).data;
                let r=0, g=0, b=0;
                for (let i=0; i<p.length; i+=4) { r += p[i]; g += p[i+1]; b += p[i+2]; }
                const count = p.length/4;
                const color = `rgb(${Math.max(15, (r/count)-45)}, ${Math.max(15, (g/count)-45)}, ${Math.max(15, (b/count)-45)})`;
                document.documentElement.style.setProperty('--theme-color', color);
                document.getElementById('appShell').style.backgroundColor = color;
                document.querySelector('.immersive-player').style.backgroundColor = color;
            },
            togglePlay() { 
                this.isPlaying = !this.isPlaying; 
                this.isPlaying ? player.playVideo() : player.pauseVideo(); 
            },
            seekMusic() { player.seekTo(this.currentTime, true); },
            formatTime(s) { if(!s) return '0:00'; let m=Math.floor(s/60), sec=Math.floor(s%60); return `${m}:${sec<10?'0':''}${sec}`; }
        }
    }
</script>
</body>
</html>
