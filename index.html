<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Audify</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        [x-cloak] { display: none !important; }
        :root { --app-height: 100dvh; }
        body { background: #000; color: white; overflow: hidden; height: var(--app-height); font-family: 'Inter', sans-serif; }
        .app-shell { width: 100%; max-width: 450px; height: var(--app-height); margin: 0 auto; position: relative; display: flex; flex-direction: column; }
        
        /* Intensified Background Blur */
        .immersive-bg { 
            position: absolute; top: -10%; width: 120%; height: 100vh; 
            object-fit: cover; opacity: 0.85; filter: blur(70px) saturate(200%);
            mask-image: linear-gradient(to bottom, black 5%, transparent 95%);
            -webkit-mask-image: linear-gradient(to bottom, black 5%, transparent 95%);
            z-index: 0; transform: scale(1.3);
        }

        /* Lyrics Layout Logic */
        .lyrics-container {
            height: 400px;
            overflow-y: auto;
            scrollbar-width: none;
            mask-image: linear-gradient(to bottom, transparent 0%, black 20%, black 80%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 20%, black 80%, transparent 100%);
            padding: 100px 0;
            scroll-behavior: smooth;
        }
        .lyrics-container::-webkit-scrollbar { display: none; }

        .lyric-line {
            font-size: 1.8rem;
            font-weight: 800;
            line-height: 1.3;
            margin-bottom: 28px;
            color: rgba(255, 255, 255, 0.2);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            filter: blur(1px);
            transform-origin: left;
            cursor: pointer;
        }
        .lyric-line.active {
            color: #fff;
            filter: blur(0);
            transform: scale(1.08);
        }

        .main-art { 
            width: 80%; aspect-ratio: 1/1; margin: 0 auto; 
            border-radius: 16px; box-shadow: 0 40px 80px rgba(0,0,0,0.9);
            object-fit: cover; z-index: 10; position: relative;
        }

        .btn-active:active { transform: scale(0.92); opacity: 0.7; }
        #yt-player-container { position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none; }
    </style>
</head>
<body x-data="audifyApp()" x-init="init()">

    <div class="fixed inset-0 bg-black z-[200] flex items-center justify-center" x-show="splash" x-transition:leave="duration-700">
        <p class="font-bold tracking-[0.5em] uppercase text-[12px]">Audify</p>
    </div>

    <div class="app-shell" x-cloak>
        <!-- Nav & Home/Search content remains same as previous version for brevity -->
        <main class="flex-grow overflow-y-auto px-4 pt-12 pb-44 z-10 relative">
            <div class="flex justify-between items-center mb-8">
                <h1 class="text-2xl font-black tracking-tight" x-text="currentView === 'home' ? greet() : 'Search'"></h1>
                <div class="flex gap-5 text-lg"><i class="fa-solid fa-gear"></i></div>
            </div>

            <!-- Home Content -->
            <div x-show="currentView === 'home'" x-transition>
                <div class="grid grid-cols-2 gap-3 mb-10">
                    <template x-for="s in trending.slice(0, 6)">
                        <div @click="play(s)" class="bg-white/5 border border-white/5 rounded-md flex items-center gap-3 h-16 btn-active overflow-hidden">
                            <img :src="s.thumbnail" class="h-full w-16 object-cover">
                            <span class="text-[11px] font-bold truncate pr-2" x-text="s.title"></span>
                        </div>
                    </template>
                </div>
                <h2 class="text-xl font-bold mb-4">Jump back in</h2>
                <div class="shelf flex overflow-x-auto gap-4 scrollbar-hide">
                    <template x-for="s in trending">
                        <div @click="play(s)" class="w-36 flex-shrink-0 btn-active">
                            <img :src="s.thumbnail" class="w-36 h-36 rounded-lg shadow-2xl mb-3 object-cover">
                            <p class="text-xs font-bold truncate" x-text="s.title"></p>
                            <p class="text-[10px] text-zinc-500 truncate" x-text="s.artist"></p>
                        </div>
                    </template>
                </div>
            </div>

            <!-- Search Content -->
            <div x-show="currentView === 'search'" x-transition>
                <input type="text" x-model="query" @input.debounce.500ms="searchMusic()" placeholder="Search..." class="w-full p-4 rounded-xl bg-zinc-900 border border-white/5 mb-8">
                <div class="space-y-4">
                    <template x-for="s in searchResults">
                        <div @click="play(s)" class="flex items-center gap-4 btn-active">
                            <img :src="s.thumbnail" class="w-14 h-14 rounded-md object-cover">
                            <div class="overflow-hidden flex-grow"><p class="font-bold text-sm truncate" x-text="s.title"></p><p class="text-xs text-zinc-400 truncate" x-text="s.artist"></p></div>
                        </div>
                    </template>
                </div>
            </div>
        </main>

        <!-- Mini Player -->
        <div x-show="active && !open" @click="open=true" class="fixed bottom-[95px] left-3 right-3 max-w-[425px] mx-auto bg-zinc-900/80 backdrop-blur-xl border border-white/10 h-16 rounded-xl flex items-center px-3 gap-4 z-40 shadow-2xl">
            <img :src="active?.thumbnail" class="w-11 h-11 rounded-lg object-cover">
            <div class="flex-grow overflow-hidden">
                <p class="text-[12px] font-bold truncate" x-text="active?.title"></p>
                <p class="text-[10px] text-zinc-400 truncate" x-text="active?.artist"></p>
            </div>
            <button @click.stop="toggle()"><i class="fa-solid text-white text-lg" :class="playing ? 'fa-pause' : 'fa-play'"></i></button>
        </div>

        <nav class="bottom-nav">
            <div class="nav-item" @click="currentView = 'home'"><i class="fa-solid fa-house mb-1"></i><span class="text-[10px] font-bold">Home</span></div>
            <div class="nav-item" @click="currentView = 'search'"><i class="fa-solid fa-magnifying-glass mb-1"></i><span class="text-[10px] font-bold">Search</span></div>
        </nav>

        <!-- Full Player with Functioning Lyrics -->
        <div x-show="open" class="player-view" x-transition:enter="translate-y-full" x-transition:enter-end="translate-y-0" x-transition:leave="translate-y-full">
            <img :src="active?.thumbnail" class="immersive-bg">
            <div class="min-h-screen p-8 flex flex-col relative z-10">
                <header class="flex justify-between items-center mb-10">
                    <i class="fa-solid fa-chevron-down text-xl p-2 btn-active" @click="open=false"></i>
                    <p class="text-[11px] font-bold uppercase tracking-widest text-white/50">Now Playing</p>
                    <i class="fa-solid fa-ellipsis-vertical text-xl p-2"></i>
                </header>
                
                <img :src="active?.thumbnail" class="main-art mb-10">

                <div class="mb-6">
                    <h2 class="text-2xl font-black mb-1 truncate" x-text="active?.title"></h2>
                    <p class="text-lg text-white/60 font-medium truncate" x-text="active?.artist"></p>
                </div>
                
                <div class="mb-10">
                    <div class="relative h-1.5 bg-white/10 rounded-full mb-2" @click="seek($event)">
                        <div class="absolute h-full bg-white rounded-full" :style="`width: ${prog}%`"></div>
                    </div>
                    <div class="flex justify-between text-[10px] font-bold text-white/40">
                        <span x-text="formatTime(currentTime)">0:00</span>
                        <span x-text="formatTime(duration)">0:00</span>
                    </div>
                </div>

                <div class="flex justify-around items-center mb-12">
                    <i class="fa-solid fa-backward-step text-3xl"></i>
                    <button @click="toggle()" class="w-20 h-20 bg-white text-black rounded-full flex items-center justify-center btn-active shadow-2xl">
                        <i class="fa-solid text-3xl" :class="playing ? 'fa-pause' : 'fa-play'"></i>
                    </button>
                    <i class="fa-solid fa-forward-step text-3xl"></i>
                </div>

                <!-- Restore exact Lyrics automation layout -->
                <div class="lyrics-container" id="lyrics-wrapper">
                    <template x-for="(line, index) in lyrics" :key="index">
                        <div :id="'lyric-'+index" 
                             class="lyric-line" 
                             :class="currentLineIndex === index ? 'active' : ''"
                             @click="ytPlayer.seekTo(line.time)"
                             x-text="line.text"></div>
                    </template>
                    <template x-if="lyrics.length === 0">
                        <div class="text-center text-white/20 font-bold uppercase tracking-widest text-sm">No Synced Lyrics Found</div>
                    </template>
                </div>
            </div>
        </div>
        <div id="yt-player-container"><div id="player"></div></div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let ytPlayer;
        function onYouTubeIframeAPIReady() {
            ytPlayer = new YT.Player('player', {
                height: '1', width: '1', videoId: '',
                playerVars: { 'autoplay': 1, 'controls': 0, 'disablekb': 1, 'playsinline': 1, 'origin': window.location.origin },
                events: { 'onStateChange': (e) => { if(window.audifyAppInstance) window.audifyAppInstance.playing = (e.data === YT.PlayerState.PLAYING); } }
            });
        }

        function audifyApp() {
            return {
                splash: true, currentView: 'home', query: '', open: false, playing: false, prog: 0, currentTime: 0, duration: 0,
                trending: [], searchResults: [], active: null, lyrics: [], currentLineIndex: -1,
                greet() { return ['Good Morning','Good Afternoon','Good Evening'][Math.floor(new Date().getHours()/8)] || 'Hello' },
                formatTime(s) { let m=Math.floor(s/60), sec=Math.floor(s%60); return `${m}:${sec<10?'0':''}${sec}`; },
                async init() {
                    window.audifyAppInstance = this;
                    setTimeout(() => this.splash = false, 1500);
                    try { const res = await fetch('/search?q=trending+hits'); this.trending = await res.json(); } catch(e) {}
                    setInterval(() => {
                        if(this.playing && ytPlayer?.getCurrentTime) {
                            this.currentTime = ytPlayer.getCurrentTime();
                            this.duration = ytPlayer.getDuration();
                            this.prog = (this.currentTime / this.duration) * 100;
                            this.updateLyrics();
                        }
                    }, 250);
                },
                async searchMusic() { if(!this.query) return; const res = await fetch(`/search?q=${encodeURIComponent(this.query)}`); this.searchResults = await res.json(); },
                async play(s) {
                    this.active = s; this.lyrics = []; this.currentLineIndex = -1;
                    if(ytPlayer?.loadVideoById) {
                        ytPlayer.loadVideoById({ videoId: s.id, suggestedQuality: 'small' });
                        this.playing = true;
                        // Fetching lyrics with duration match logic[cite: 1]
                        setTimeout(async () => {
                            const res = await fetch(`https://lrclib.net/api/search?track_name=${encodeURIComponent(s.title)}&artist_name=${encodeURIComponent(s.artist)}`);
                            const data = await res.json();
                            if(data.length) {
                                let best = data.reduce((prev, curr) => Math.abs(curr.duration - this.duration) < Math.abs(prev.duration - this.duration) ? curr : prev);
                                if(best.syncedLyrics) {
                                    this.lyrics = best.syncedLyrics.split('\n').map(l => {
                                        const m = l.match(/\[(\d+):(\d+\.\d+)\](.*)/);
                                        return m ? { time: parseInt(m[1])*60 + parseFloat(m[2]), text: m[3].trim() } : null;
                                    }).filter(l => l && l.text);
                                }
                            }
                        }, 2000);
                    }
                },
                updateLyrics() {
                    if(!this.lyrics.length) return;
                    let index = this.lyrics.findLastIndex(l => l.time <= this.currentTime);
                    if (index !== this.currentLineIndex) {
                        this.currentLineIndex = index;
                        const el = document.getElementById('lyric-' + index);
                        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                },
                toggle() { this.playing ? ytPlayer.pauseVideo() : ytPlayer.playVideo(); },
                seek(e) { if(ytPlayer) ytPlayer.seekTo((e.offsetX / e.currentTarget.offsetWidth) * this.duration); }
            }
        }
    </script>
</body>
</html>
