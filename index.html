<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Audify</title>
    <link rel="icon" href="https://audifydev-del.github.io/open/assets/ic.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        [x-cloak] { display: none !important; }
        :root { --app-height: 100dvh; }
        body { background: #000; color: white; overflow: hidden; height: var(--app-height); font-family: 'Inter', sans-serif; }
        
        .app-shell { width: 100%; height: var(--app-height); display: flex; overflow: hidden; }
        
        /* Restored Sidebar */
        .sidebar { width: 280px; background: #000; display: flex; flex-direction: column; padding: 24px; border-right: 1px solid #1a1a1a; }
        @media (max-width: 768px) { .sidebar { display: none; } }

        .tab-enter { animation: tabIn 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        @keyframes tabIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Search Grid Boxes */
        .genre-card { aspect-ratio: 1; border-radius: 8px; padding: 12px; font-weight: 800; font-size: 16px; position: relative; overflow: hidden; cursor: pointer; transition: transform 0.2s; }
        .genre-card:active { transform: scale(0.95); }

        /* Wavy Progress Bar */
        .progress-container { position: relative; height: 30px; display: flex; align-items: center; cursor: pointer; }
        .progress-wave { width: 100%; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; overflow: hidden; position: relative; }
        .progress-fill { height: 100%; background: #fff; position: relative; transition: width 0.1s linear; }
        
        /* Restored Immersive Player */
        .player-view { position: fixed; inset: 0; z-index: 100; background: #000; transition: transform 0.6s cubic-bezier(0.32, 0.72, 0, 1); overflow-y: auto; }
        .immersive-bg { position: absolute; top: -10%; width: 120%; height: 120%; object-fit: cover; filter: blur(80px) saturate(150%); opacity: 0.5; z-index: 0; }

        .lyrics-window { margin-top: 20px; padding: 40px 0; height: 400px; overflow-y: auto; scrollbar-width: none; mask-image: linear-gradient(to bottom, transparent, black 20%, black 80%, transparent); -webkit-mask-image: linear-gradient(to bottom, transparent, black 20%, black 80%, transparent); }
        .lyrics-line { font-size: 1.8rem; font-weight: 800; color: rgba(255,255,255,0.2); transition: all 0.4s; margin-bottom: 30px; line-height: 1.2; }
        .lyrics-line.active { color: #fff; transform: scale(1.05); }

        .result-item { animation: slideUp 0.4s ease forwards; opacity: 0; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 80px; background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); display: none; }
        @media (max-width: 768px) { .bottom-nav { display: flex; justify-content: space-around; align-items: center; } }
    </style>
</head>
<body x-data="audifyApp()" x-init="init()">

    <!-- Splash Screen with Logo -->
    <div class="fixed inset-0 bg-black z-[200] flex items-center justify-center" x-show="splash" x-transition:leave="duration-700">
        <img src="https://audifydev-del.github.io/open/assets/ic.png" class="w-24 animate-bounce">
    </div>

    <div class="app-shell" x-cloak x-show="!splash">
        
        <!-- Sidebar (Desktop) -->
        <aside class="sidebar">
            <img src="https://audifydev-del.github.io/open/assets/ic.png" class="w-10 mb-8">
            <nav class="space-y-6">
                <div @click="currentView = 'home'" class="flex items-center gap-4 cursor-pointer hover:text-white transition" :class="currentView === 'home' ? 'text-white' : 'text-zinc-400'">
                    <i class="fa-solid fa-house text-xl"></i> <span class="font-bold">Home</span>
                </div>
                <div @click="currentView = 'search'" class="flex items-center gap-4 cursor-pointer hover:text-white transition" :class="currentView === 'search' ? 'text-white' : 'text-zinc-400'">
                    <i class="fa-solid fa-magnifying-glass text-xl"></i> <span class="font-bold">Search</span>
                </div>
                <div class="flex items-center gap-4 text-zinc-400 cursor-pointer">
                    <i class="fa-solid fa-lines-leaning text-xl"></i> <span class="font-bold">Your Library</span>
                </div>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="flex-grow overflow-y-auto relative pb-32">
            <header class="p-6 flex justify-between items-center sticky top-0 bg-black/50 backdrop-blur-md z-20">
                <h1 class="text-2xl font-black" x-text="currentView === 'home' ? 'Explore' : 'Search'"></h1>
                <div class="w-10 h-10 rounded-full bg-zinc-800 flex items-center justify-center"><i class="fa-solid fa-user"></i></div>
            </header>

            <!-- HOME VIEW -->
            <div x-show="currentView === 'home'" class="p-6 tab-enter">
                <h2 class="text-xl font-bold mb-4">Made For You</h2>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10">
                    <template x-for="s in trending.slice(0, 8)">
                        <div @click="play(s, trending)" class="bg-zinc-900/50 p-4 rounded-xl hover:bg-zinc-800 transition cursor-pointer group">
                            <img :src="s.thumbnail" class="w-full aspect-square object-cover rounded-lg mb-3 shadow-lg">
                            <p class="font-bold text-sm truncate" x-text="s.title"></p>
                            <p class="text-xs text-zinc-500 truncate" x-text="s.artist"></p>
                        </div>
                    </template>
                </div>
            </div>

            <!-- SEARCH VIEW -->
            <div x-show="currentView === 'search'" class="p-6 tab-enter">
                <div class="relative mb-8">
                    <input type="text" x-model="query" @input.debounce.400ms="searchMusic()" placeholder="What do you want to listen to?" class="w-full p-4 pl-12 rounded-full bg-zinc-900 border border-transparent focus:border-white/20 outline-none transition">
                    <i class="fa-solid fa-magnifying-glass absolute left-5 top-5 text-zinc-500"></i>
                </div>

                <!-- Genre Grid -->
                <div x-show="!query" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
                    <div class="genre-card" style="background: #E13300;"><span>Pop</span></div>
                    <div class="genre-card" style="background: #1E3264;"><span>Hip-Hop</span></div>
                    <div class="genre-card" style="background: #8400E7;"><span>Lo-Fi</span></div>
                    <div class="genre-card" style="background: #E8115B;"><span>Rock</span></div>
                </div>

                <!-- Results -->
                <div class="space-y-2">
                    <template x-for="(s, index) in searchResults" :key="s.id">
                        <div @click="play(s, searchResults)" class="flex items-center gap-4 p-2 rounded-lg hover:bg-zinc-900 cursor-pointer result-item" :style="'animation-delay: ' + (index * 0.05) + 's'">
                            <img :src="s.thumbnail" class="w-12 h-12 rounded object-cover">
                            <div class="flex-grow overflow-hidden">
                                <p class="font-bold text-sm truncate" x-text="s.title"></p>
                                <p class="text-xs text-zinc-500 truncate" x-text="s.artist"></p>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </main>

        <!-- Mini Player -->
        <div x-show="active && !open" @click="open=true" class="fixed bottom-[90px] md:bottom-4 left-4 right-4 bg-white text-black h-16 rounded-xl flex items-center px-4 gap-4 z-40 shadow-2xl transition-transform active:scale-95">
            <img :src="active?.thumbnail" class="w-10 h-10 rounded shadow-md object-cover">
            <div class="flex-grow overflow-hidden">
                <p class="text-xs font-black truncate" x-text="active?.title"></p>
                <p class="text-[10px] opacity-70 truncate" x-text="active?.artist"></p>
            </div>
            <button @click.stop="toggle()"><i class="fa-solid text-xl" :class="playing ? 'fa-pause' : 'fa-play'"></i></button>
        </div>

        <!-- Full Immersive Player -->
        <div x-show="open" class="player-view tab-enter" x-transition:enter="translate-y-full" x-transition:enter-end="translate-y-0" x-transition:leave="translate-y-full">
            <img :src="active?.thumbnail" class="immersive-bg">
            <div class="relative z-10 min-h-screen p-8 flex flex-col items-center">
                <header class="w-full flex justify-between items-center mb-12">
                    <i class="fa-solid fa-chevron-down text-2xl cursor-pointer" @click="open=false"></i>
                    <img src="https://audifydev-del.github.io/open/assets/ic.png" class="w-6">
                    <i class="fa-solid fa-ellipsis"></i>
                </header>

                <img :src="active?.thumbnail" class="w-full max-w-sm aspect-square rounded-2xl shadow-2xl mb-12">

                <div class="w-full max-w-sm mb-8">
                    <h2 class="text-3xl font-black mb-2" x-text="active?.title"></h2>
                    <p class="text-xl opacity-60" x-text="active?.artist"></p>
                </div>

                <!-- Wavy Scrub Bar -->
                <div class="w-full max-w-sm mb-10">
                    <div class="progress-container" @click="seek($event)">
                        <div class="progress-wave">
                            <div class="progress-fill" :style="`width: ${prog}%` text-align: right">
                                <div class="w-3 h-3 bg-white rounded-full absolute right-0 top-1/2 -translate-y-1/2 shadow-lg"></div>
                            </div>
                        </div>
                    </div>
                    <div class="flex justify-between text-xs font-bold opacity-40 mt-2">
                        <span x-text="formatTime(currentTime)"></span>
                        <span x-text="formatTime(duration)"></span>
                    </div>
                </div>

                <!-- Controls -->
                <div class="flex justify-between items-center w-full max-w-sm mb-12">
                    <i class="fa-solid fa-shuffle opacity-40"></i>
                    <i @click="prev()" class="fa-solid fa-backward-step text-4xl"></i>
                    <button @click="toggle()" class="w-20 h-20 bg-white text-black rounded-full flex items-center justify-center shadow-xl active:scale-90 transition">
                        <i class="fa-solid text-3xl" :class="playing ? 'fa-pause' : 'fa-play'"></i>
                    </button>
                    <i @click="next()" class="fa-solid fa-forward-step text-4xl"></i>
                    <i class="fa-solid fa-repeat opacity-40"></i>
                </div>

                <!-- Lyrics Section -->
                <div class="w-full max-w-sm flex-grow">
                    <div class="lyrics-window" id="lyrics-window">
                        <template x-for="(line, index) in lyrics">
                            <div class="lyrics-line" :id="'line-'+index" :class="currentLineIndex === index ? 'active' : ''" x-text="line.text"></div>
                        </template>
                    </div>
                </div>
            </div>
        </div>

        <nav class="bottom-nav">
            <div @click="currentView = 'home'" :class="currentView === 'home' ? 'text-white' : 'text-zinc-500'"><i class="fa-solid fa-house text-xl"></i></div>
            <div @click="currentView = 'search'" :class="currentView === 'search' ? 'text-white' : 'text-zinc-500'"><i class="fa-solid fa-magnifying-glass text-xl"></i></div>
            <div class="text-zinc-500"><i class="fa-solid fa-lines-leaning text-xl"></i></div>
        </nav>
    </div>

    <div id="player"></div>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let ytPlayer;
        function onYouTubeIframeAPIReady() {
            ytPlayer = new YT.Player('player', {
                height: '0', width: '0', videoId: '',
                playerVars: { 'autoplay': 1, 'controls': 0 },
                events: {
                    'onStateChange': (e) => {
                        window.audifyAppInstance.playing = (e.data === 1);
                        if(e.data === 0) window.audifyAppInstance.next();
                    }
                }
            });
        }

        function audifyApp() {
            return {
                splash: true, currentView: 'home', query: '', open: false,
                playing: false, prog: 0, currentTime: 0, duration: 0,
                trending: [], searchResults: [], active: null, lyrics: [], currentLineIndex: -1,
                
                init() {
                    window.audifyAppInstance = this;
                    setTimeout(() => this.splash = false, 2000);
                    this.fetchInitial();
                    setInterval(() => {
                        if(this.playing && ytPlayer.getCurrentTime) {
                            this.currentTime = ytPlayer.getCurrentTime();
                            this.duration = ytPlayer.getDuration();
                            this.prog = (this.currentTime / this.duration) * 100;
                            this.syncLyrics();
                        }
                    }, 500);
                },

                formatTime(s) { if(!s) return "0:00"; let m = Math.floor(s/60), sec = Math.floor(s%60); return `${m}:${sec < 10 ? '0' : ''}${sec}`; },

                async fetchInitial() {
                    // Logic to fetch trending and apply VIBE FILTER
                    const res = await fetch('/search?q=hits+2026');
                    const data = await res.json();
                    const blocked = ['bollywood', 'tseries', 'indian', 'shruti rane'];
                    this.trending = data.filter(s => !blocked.some(t => (s.title + s.artist).toLowerCase().includes(t)));
                },

                async searchMusic() {
                    if(!this.query) { this.searchResults = []; return; }
                    const res = await fetch(`/search?q=${encodeURIComponent(this.query)}`);
                    const data = await res.json();
                    this.searchResults = data.filter(s => !['bollywood','tseries'].some(b => s.title.toLowerCase().includes(b)));
                },

                play(s, list) {
                    this.active = s;
                    this.lyrics = [];
                    ytPlayer.loadVideoById(s.id);
                    this.fetchLyrics(s);
                },

                async fetchLyrics(s) {
                    try {
                        const res = await fetch(`https://lrclib.net/api/search?track_name=${encodeURIComponent(s.title)}&artist_name=${encodeURIComponent(s.artist)}`);
                        const data = await res.json();
                        if(data[0]?.syncedLyrics) {
                            this.lyrics = data[0].syncedLyrics.split('\n').map(l => {
                                const m = l.match(/\[(\d+):(\d+\.\d+)\](.*)/);
                                return m ? { time: parseInt(m[1])*60 + parseFloat(m[2]), text: m[3].trim() } : null;
                            }).filter(l => l?.text);
                        }
                    } catch(e) {}
                },

                syncLyrics() {
                    let idx = this.lyrics.findLastIndex(l => this.currentTime >= l.time);
                    if (idx !== -1 && idx !== this.currentLineIndex) {
                        this.currentLineIndex = idx;
                        document.getElementById('line-'+idx)?.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                },

                toggle() { this.playing ? ytPlayer.pauseVideo() : ytPlayer.playVideo(); },
                seek(e) { ytPlayer.seekTo((e.offsetX / e.currentTarget.offsetWidth) * this.duration); }
            }
        }
    </script>
</body>
</html>
