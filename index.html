<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Audify</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        [x-cloak] { display: none !important; }
        :root { --app-height: 100dvh; }
        body { background: #000; color: white; overflow: hidden; height: var(--app-height); font-family: 'Inter', sans-serif; }
        .app-shell { width: 100%; max-width: 450px; height: var(--app-height); margin: 0 auto; position: relative; display: flex; flex-direction: column; }
        
        .global-bg {
            position: fixed; inset: 0; width: 100%; height: 100%;
            object-fit: cover; filter: blur(80px) saturate(150%);
            opacity: 0.35; z-index: 0; transition: opacity 0.8s ease;
            pointer-events: none;
        }

        .player-view { 
            position: absolute; inset: 0; z-index: 100; background: #000; 
            transition: transform 0.5s cubic-bezier(0.32, 0.72, 0, 1); 
            overflow-y: auto; scrollbar-width: none;
        }
        
        .immersive-bg { 
            position: absolute; top: -10%; width: 120%; height: 90vh; 
            object-fit: cover; filter: blur(60px) saturate(180%);
            mask-image: linear-gradient(to bottom, black 10%, transparent 90%);
            -webkit-mask-image: linear-gradient(to bottom, black 10%, transparent 90%);
            z-index: 0; transform: scale(1.2); transition: opacity 0.5s ease;
        }

        .main-art { 
            width: 100%; height: 100%;
            border-radius: 12px; box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            object-fit: cover; z-index: 10; position: relative;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .lyrics-window { 
            margin-top: 10px; padding: 120px 20px 20px 20px; 
            height: auto; max-height: 550px; overflow-y: auto;
            scrollbar-width: none; position: relative; z-index: 20;
            mask-image: linear-gradient(to bottom, transparent 0%, black 10%, black 95%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 10%, black 95%, transparent 100%);
            scroll-behavior: smooth;
        }

        .lyrics-line { 
            font-size: 1.6rem; font-weight: 800; line-height: 1.4; 
            color: rgba(255,255,255,0.15); transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1); 
            margin-bottom: 40px; transform-origin: left;
        }
        
        .lyrics-line.active { 
            color: #fff; transform: scale(1.05); 
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.6), 0 0 30px rgba(255, 255, 255, 0.2);
        }

        .btn-active:active { transform: scale(0.92); opacity: 0.7; }
        #yt-player-container { position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none; }
    </style>
</head>
<body x-data="audifyApp()" x-init="init()">

    <!-- Launch Screen -->
    <div x-show="!launched" @click="launch()" class="fixed inset-0 bg-black z-[300] flex flex-col items-center justify-center cursor-pointer">
        <p class="font-bold tracking-[0.4em] uppercase text-[14px] mb-4">Audify</p>
        <p class="text-zinc-500 text-[10px] uppercase tracking-widest animate-bounce">Tap to Start</p>
    </div>

    <div class="app-shell" x-cloak x-show="launched">
        
        <img :src="active?.thumbnail" class="global-bg" x-show="active" :class="changing ? 'opacity-0' : 'opacity-35'">

        <!-- YOUR NEW LAYOUT WILL GO HERE -->
        <main class="flex-grow overflow-y-auto z-10 relative">
        </main>

        <!-- Mini Player -->
        <div x-show="active && !open" @click="open=true" class="fixed bottom-10 left-3 right-3 bg-white/10 backdrop-blur-2xl border border-white/10 h-16 rounded-xl flex items-center px-3 gap-4 z-40 shadow-2xl cursor-pointer">
            <img :src="active?.thumbnail" class="w-11 h-11 rounded-lg object-cover">
            <div class="flex-grow overflow-hidden">
                <p class="text-[12px] font-bold truncate" x-text="active?.title"></p>
                <p class="text-[10px] text-zinc-300 truncate" x-text="active?.artist"></p>
            </div>
            <button @click.stop="toggle()"><i class="fa-solid text-white text-lg" :class="playing ? 'fa-pause' : 'fa-play'"></i></button>
        </div>

        <!-- Music Player View -->
        <div x-show="open" class="player-view" x-transition:enter="transition duration-500" x-transition:enter-start="translate-y-full" x-transition:leave="transition duration-400" x-transition:leave-end="translate-y-full">
            <img :src="active?.thumbnail" class="immersive-bg" :class="changing ? 'opacity-0' : 'opacity-80'">
            <div class="min-h-screen p-8 flex flex-col relative z-10 pb-6">
                <header class="flex justify-between items-center mb-10">
                    <i class="fa-solid fa-chevron-down text-xl p-2 btn-active" @click="open=false"></i>
                    <p class="text-[11px] font-bold uppercase tracking-widest">Now Playing</p>
                    <i class="fa-solid fa-ellipsis-vertical text-xl p-2"></i>
                </header>
                
                <div class="w-[85%] mx-auto aspect-square mb-10">
                    <img :src="active?.thumbnail" class="main-art" :class="changing ? 'opacity-0 scale-95' : 'opacity-100 scale-100'">
                </div>

                <div class="mb-8" :class="changing ? 'opacity-0' : 'opacity-100'">
                    <h2 class="text-2xl font-black mb-1 truncate" x-text="active?.title"></h2>
                    <p class="text-lg text-white/60 font-medium truncate" x-text="active?.artist"></p>
                </div>

                <div class="mb-10">
                    <div class="relative h-1.5 bg-white/10 rounded-full mb-2" @click="seek($event)">
                        <div class="absolute h-full bg-white rounded-full" :style="`width: ${prog}%`"></div>
                    </div>
                    <div class="flex justify-between text-[10px] font-bold text-white/40">
                        <span x-text="formatTime(currentTime)">0:00</span>
                        <span x-text="formatTime(duration)">0:00</span>
                    </div>
                </div>

                <div class="flex justify-around items-center mb-12">
                    <button @click="toggleShuffle()" class="text-lg" :class="shuffle ? 'text-white' : 'text-white/20'"><i class="fa-solid fa-shuffle"></i></button>
                    <button @click="prev()" class="btn-active"><i class="fa-solid fa-backward-step text-3xl"></i></button>
                    <button @click="toggle()" class="w-20 h-20 bg-white text-black rounded-full flex items-center justify-center btn-active">
                        <i class="fa-solid text-3xl" :class="playing ? 'fa-pause' : 'fa-play'"></i>
                    </button>
                    <button @click="next()" class="btn-active"><i class="fa-solid fa-forward-step text-3xl"></i></button>
                    <button @click="toggleRepeat()" class="text-lg relative" :class="repeatMode !== 'off' ? 'text-white' : 'text-white/20'">
                        <i class="fa-solid fa-repeat"></i>
                        <span x-show="repeatMode === 'one'" class="absolute -top-1 -right-1 bg-white text-black text-[8px] w-3 h-3 rounded-full flex items-center justify-center font-bold">1</span>
                    </button>
                </div>

                <div class="lyrics-window" id="lyrics-window">
                    <template x-for="(line, index) in lyrics">
                        <div class="lyrics-line" :id="'line-'+index" :class="currentLineIndex === index ? 'active' : ''" x-text="line.text"></div>
                    </template>
                </div>
            </div>
        </div>

        <div id="yt-player-container"><div id="player"></div></div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let ytPlayer;
        let apiReady = false;

        function onYouTubeIframeAPIReady() {
            ytPlayer = new YT.Player('player', {
                height: '1', width: '1', videoId: 'dQw4w9WgXcQ', // Dummy video to initialize
                playerVars: { 'autoplay': 0, 'controls': 0, 'playsinline': 1 },
                events: {
                    'onReady': () => { apiReady = true; },
                    'onStateChange': (e) => {
                        if(window.audifyAppInstance) {
                            window.audifyAppInstance.playing = (e.data === YT.PlayerState.PLAYING);
                            if (e.data === YT.PlayerState.ENDED) window.audifyAppInstance.next();
                        }
                    }
                }
            });
        }

        function audifyApp() {
            return {
                launched: false, open: false, playing: false,
                prog: 0, currentTime: 0, duration: 0, changing: false,
                active: null, lyrics: [], currentLineIndex: -1,
                shuffle: false, repeatMode: 'off', queue: [], originalQueue: [], currentIndex: -1,

                launch() { 
                    this.launched = true;
                    // Interaction: "Wake up" the player
                    if (ytPlayer && ytPlayer.playVideo) {
                        ytPlayer.playVideo();
                        setTimeout(() => ytPlayer.pauseVideo(), 100);
                    }
                },
                
                formatTime(s) { if(!s) return "0:00"; let m = Math.floor(s/60), sec = Math.floor(s%60); return `${m}:${sec < 10 ? '0' : ''}${sec}`; },
                
                init() {
                    window.audifyAppInstance = this;
                    setInterval(() => {
                        if(this.playing && ytPlayer?.getCurrentTime) {
                            this.currentTime = ytPlayer.getCurrentTime();
                            this.duration = ytPlayer.getDuration();
                            this.prog = (this.currentTime / this.duration) * 100;
                            this.syncLyrics();
                        }
                    }, 200);
                },

                async play(s, list = null) {
                    if (!apiReady) return;
                    this.changing = true;
                    if (list) { 
                        this.originalQueue = [...list]; 
                        this.queue = this.shuffle ? this.shuffleArray([...list]) : [...list]; 
                    }
                    this.active = s;
                    this.currentIndex = this.queue.findIndex(i => i.id === s.id);
                    ytPlayer.loadVideoById(s.id);
                    this.playing = true;
                    this.fetchLyrics(s);
                    setTimeout(() => this.changing = false, 400);
                },

                // ... Rest of your helper functions (fetchLyrics, syncLyrics, etc.)
                async fetchLyrics(track) {
                    try {
                        const res = await fetch(`https://lrclib.net/api/search?track_name=${encodeURIComponent(track.title)}&artist_name=${encodeURIComponent(track.artist)}`);
                        const data = await res.json();
                        if(data.length && data[0].syncedLyrics) {
                            this.lyrics = data[0].syncedLyrics.split('\n').map(line => {
                                const match = line.match(/\[(\d+):(\d+\.\d+)\](.*)/);
                                return match ? { time: parseInt(match[1]) * 60 + parseFloat(match[2]), text: match[3].trim() } : null;
                            }).filter(l => l?.text);
                        }
                    } catch(e) {}
                },

                syncLyrics() {
                    let index = this.lyrics.findLastIndex(l => this.currentTime >= l.time);
                    if (index !== -1 && index !== this.currentLineIndex) {
                        this.currentLineIndex = index;
                        const el = document.getElementById('line-' + index);
                        const win = document.getElementById('lyrics-window');
                        if(el && win) win.scrollTo({ top: el.offsetTop - 150, behavior: 'smooth' });
                    }
                },

                next() { if (this.currentIndex < this.queue.length - 1) this.play(this.queue[this.currentIndex + 1]); },
                prev() { if (this.currentIndex > 0) this.play(this.queue[this.currentIndex - 1]); },
                toggle() { this.playing ? ytPlayer.pauseVideo() : ytPlayer.playVideo(); },
                seek(e) { ytPlayer.seekTo((e.offsetX / e.currentTarget.offsetWidth) * this.duration); },
                shuffleArray(a) { for(let i=a.length-1; i>0; i--){ let j=Math.floor(Math.random()*(i+1)); [a[i], a[j]]=[a[j], a[i]]; } return a; }
            }
        }
    </script>
</body>
</html>
