<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Audify</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        [x-cloak] { display: none !important; }
        body { background-color: #000; color: white; font-family: 'Inter', sans-serif; overflow: hidden; margin: 0; height: 100dvh; }
        .app-shell { width: 100%; max-width: 450px; height: 100%; margin: 0 auto; position: relative; background: #121212; }

        .immersive-player {
            position: fixed; top: 0; left: 50%; transform: translateX(-50%);
            width: 100%; max-width: 450px; height: 100%;
            /* The background color here will be changed by JavaScript */
            background: #121212; z-index: 100;
            display: flex; flex-direction: column;
            transition: transform 0.5s cubic-bezier(0.32, 0.72, 0, 1), background 0.8s ease;
        }

        .artwork-container { position: absolute; top: 0; left: 0; width: 100%; height: 60%; z-index: 1; }
        .artwork-container img { width: 100%; height: 100%; object-fit: cover; }
        
        /* Updated overlay to fade into the dynamic color */
        .artwork-overlay { 
            position: absolute; inset: 0; 
            background: linear-gradient(to bottom, transparent 0%, rgba(0,0,0,0.2) 40%, rgba(18,18,18,0.5) 70%, currentcolor 100%); 
            z-index: 2; 
        }

        .player-content { position: relative; z-index: 10; margin-top: auto; padding: 0 30px 40px; }

        .timeline-container { width: 100%; margin-bottom: 25px; }
        input[type="range"].progress-bar {
            width: 100%; -webkit-appearance: none; background: rgba(255,255,255,0.1);
            height: 4px; border-radius: 2px; outline: none;
        }
        input[type="range"].progress-bar::-webkit-slider-thumb {
            -webkit-appearance: none; height: 12px; width: 12px;
            background: #fff; border-radius: 50%;
        }

        .song-card { background: #1c1c1c; border-radius: 8px; padding: 10px; }
        #yt-hidden { position: absolute; top: -9999px; visibility: hidden; }
        canvas { display: none; }
    </style>
</head>
<body>

<div x-data="audifyApp()" x-init="initApp()">
    <canvas id="colorCanvas"></canvas>
    
    <div class="app-shell">
        <!-- List View -->
        <div class="h-full flex flex-col" x-show="!playerOpen">
            <header class="p-6"><h1 class="text-2xl font-black mb-4">Audify</h1>
                <input type="text" x-model="searchQuery" @keydown.enter="fetchData(searchQuery)" placeholder="Search songs..." 
                       class="w-full bg-zinc-800 rounded-lg py-3 px-5 outline-none border border-white/5">
            </header>
            <main class="flex-grow overflow-y-auto px-4 pb-20">
                <div class="grid grid-cols-2 gap-4">
                    <template x-for="song in songs" :key="song.id">
                        <div class="song-card" @click="playSong(song)">
                            <img :src="song.thumbnail" class="w-full aspect-square rounded-md object-cover mb-2" crossorigin="anonymous">
                            <p class="text-sm font-bold truncate" x-text="song.title"></p>
                            <p class="text-[11px] text-zinc-500 truncate" x-text="song.artist"></p>
                        </div>
                    </template>
                </div>
            </main>
        </div>

        <!-- PLAYER VIEW -->
        <div class="immersive-player" id="playerBody" :style="playerOpen ? 'transform: translateX(-50%) translateY(0)' : 'transform: translateX(-50%) translateY(100%)'">
            <div class="artwork-container">
                <img :src="activeTrack?.thumbnail" id="main-thumb" crossorigin="anonymous">
                <div class="artwork-overlay" id="dynamicOverlay"></div>
            </div>

            <div class="relative z-20 flex justify-between p-6">
                <button @click="playerOpen = false"><i class="fa-solid fa-chevron-down text-xl"></i></button>
                <i class="fa-solid fa-ellipsis-vertical text-xl opacity-50"></i>
            </div>

            <div class="player-content">
                <div class="mb-8">
                    <h2 class="text-3xl font-black truncate" x-text="activeTrack?.title"></h2>
                    <p class="text-xl text-white/70 font-bold" x-text="activeTrack?.artist"></p>
                </div>

                <div class="timeline-container">
                    <input type="range" class="progress-bar" min="0" :max="duration" x-model="currentTime" @input="seekMusic">
                    <div class="flex justify-between mt-2 text-[11px] font-bold text-white/50 tracking-wider">
                        <span x-text="formatTime(currentTime)">0:00</span>
                        <span x-text="formatTime(duration)">0:00</span>
                    </div>
                </div>

                <div class="flex justify-between items-center">
                    <i class="fa-solid fa-shuffle text-xl opacity-30"></i>
                    <i class="fa-solid fa-backward-step text-3xl"></i>
                    <button @click="togglePlay()" class="w-20 h-20 bg-white text-black rounded-full flex items-center justify-center shadow-2xl active:scale-95 transition-transform">
                        <i class="fa-solid text-3xl" :class="isPlaying ? 'fa-pause' : 'fa-play'"></i>
                    </button>
                    <i class="fa-solid fa-forward-step text-3xl"></i>
                    <i class="fa-solid fa-repeat text-xl opacity-30"></i>
                </div>
            </div>
        </div>

        <div id="yt-hidden"><div id="youtube-player"></div></div>
    </div>
</div>

<script>
    var player;
    function audifyApp() {
        return {
            songs: [], searchQuery: '', activeTrack: null,
            playerOpen: false, isPlaying: false,
            currentTime: 0, duration: 0, timer: null,

            initApp() {
                this.fetchData('top hits');
                let tag = document.createElement('script');
                tag.src = "https://www.youtube.com/iframe_api";
                document.head.appendChild(tag);
            },

            async fetchData(q) {
                const res = await fetch(`/search?q=${encodeURIComponent(q)}`);
                this.songs = await res.json();
            },

            playSong(song) {
                this.activeTrack = song;
                this.playerOpen = true;
                this.isPlaying = true;

                // Set image and extract color
                const img = document.getElementById('main-thumb');
                img.src = song.thumbnail;
                img.onload = () => this.updateThemeColor(img);

                if (player && typeof player.loadVideoById === 'function') {
                    player.loadVideoById(song.id);
                } else {
                    player = new YT.Player('youtube-player', {
                        height: '1', width: '1', videoId: song.id,
                        playerVars: { 'autoplay': 1, 'controls': 0 },
                        events: { 'onStateChange': (e) => { if(e.data == 1) this.duration = Math.floor(player.getDuration()); } }
                    });
                }
                this.startTracking();
            },

            updateThemeColor(imgElement) {
                const canvas = document.getElementById('colorCanvas');
                const ctx = canvas.getContext('2d');
                canvas.width = imgElement.naturalWidth || 50;
                canvas.height = imgElement.naturalHeight || 50;
                
                ctx.drawImage(imgElement, 0, 0, canvas.width, canvas.height);
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
                
                let counts = {};
                let maxCount = 0;
                let dominant = 'rgb(18, 18, 18)';

                // Sample pixels (step by 10 to save RAM)
                for (let i = 0; i < imageData.length; i += 40) {
                    let r = imageData[i];
                    let g = imageData[i+1];
                    let b = imageData[i+2];
                    // Skip blacks/whites for better color vibrancy
                    if ((r+g+b) < 100 || (r+g+b) > 700) continue; 
                    
                    let rgb = `rgb(${r},${g},${b})`;
                    counts[rgb] = (counts[rgb] || 0) + 1;
                    if (counts[rgb] > maxCount) {
                        maxCount = counts[rgb];
                        dominant = rgb;
                    }
                }
                
                document.getElementById('playerBody').style.backgroundColor = dominant;
                document.getElementById('dynamicOverlay').style.color = dominant;
            },

            startTracking() {
                if (this.timer) clearInterval(this.timer);
                this.timer = setInterval(() => {
                    if (player && this.isPlaying && typeof player.getCurrentTime === 'function') {
                        this.currentTime = Math.floor(player.getCurrentTime());
                    }
                }, 1000);
            },

            seekMusic() { if (player) player.seekTo(this.currentTime, true); },
            togglePlay() {
                if (!player) return;
                this.isPlaying = !this.isPlaying;
                this.isPlaying ? player.playVideo() : player.pauseVideo();
            },
            formatTime(s) {
                if (!s) return '0:00';
                let m = Math.floor(s / 60);
                let sec = Math.floor(s % 60);
                return `${m}:${sec < 10 ? '0' : ''}${sec}`;
            }
        }
    }
</script>
</body>
</html>
