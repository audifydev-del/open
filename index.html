<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Streamer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000000; color: #ffffff; }
        .spotify-card:hover { background-color: #282828; }
    </style>
</head>
<body class="flex flex-col h-screen font-sans">

    <div class="flex flex-1 overflow-hidden">
        <!-- Sidebar -->
        <div class="w-64 bg-black p-6 flex flex-col gap-4 border-r border-zinc-800">
            <div class="text-green-500 font-bold text-2xl mb-4">Not-Spotify</div>
            <button class="text-left font-semibold hover:text-green-500">Home</button>
            <button class="text-left font-semibold hover:text-green-500 text-zinc-400">Search</button>
        </div>

        <!-- Main Content -->
        <main class="flex-1 p-8 overflow-y-auto bg-gradient-to-b from-zinc-900 to-black">
            <div class="flex items-center gap-4 mb-10">
                <input id="search-input" type="text" placeholder="What do you want to listen to?" 
                       class="w-full max-w-md p-3 rounded-full bg-zinc-800 text-white border-none focus:ring-2 focus:ring-white outline-none">
                <button onclick="searchMusic()" class="bg-green-500 text-black font-bold py-3 px-8 rounded-full hover:scale-105 transition">Search</button>
            </div>

            <div id="results" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-6">
                <!-- Search results will inject here -->
            </div>
        </main>
    </div>

    <!-- Player Bar -->
    <div class="h-24 bg-zinc-900 border-t border-zinc-800 p-4 flex items-center justify-between">
        <div class="flex items-center gap-4 w-1/3">
            <div id="player-img-container" class="w-14 h-14 bg-zinc-800 rounded shadow-lg overflow-hidden">
                <img id="player-album-art" src="" class="hidden w-full h-full object-cover">
            </div>
            <div>
                <div id="player-title" class="font-bold text-sm">Select a song</div>
                <div id="player-artist" class="text-zinc-400 text-xs">Artist</div>
            </div>
        </div>

        <!-- The actual audio logic -->
        <div id="audio-interface" class="w-1/3 flex flex-col items-center">
            <div id="player-wrapper"></div> <!-- Iframe goes here -->
        </div>

        <div class="w-1/3"></div>
    </div>

    <script>
        async function searchMusic() {
            const query = document.getElementById('search-input').value;
            if (!query) return;

            const res = await fetch(`/search?q=${query}`);
            const data = await res.json();
            
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '';

            data.forEach(song => {
                resultsDiv.innerHTML += `
                    <div class="spotify-card p-4 rounded-lg bg-zinc-900/50 cursor-pointer transition duration-300" 
                         onclick="playSong('${song.id}', '${song.title.replace(/'/g, "\\'")}', '${song.artist.replace(/'/g, "\\'")}', '${song.thumbnail}')">
                        <img src="${song.thumbnail}" class="w-full aspect-square object-cover rounded-md mb-4 shadow-xl">
                        <h3 class="font-bold truncate">${song.title}</h3>
                        <p class="text-zinc-400 text-sm truncate">${song.artist}</p>
                    </div>
                `;
            });
        }

        function playSong(id, title, artist, thumb) {
            document.getElementById('player-title').innerText = title;
            document.getElementById('player-artist').innerText = artist;
            const img = document.getElementById('player-album-art');
            img.src = thumb;
            img.classList.remove('hidden');

            // Injecting a hidden YouTube embed for audio
            const wrapper = document.getElementById('player-wrapper');
            wrapper.innerHTML = `
                <iframe width="0" height="0" 
                    src="https://www.youtube.com/embed/${id}?autoplay=1&enablejsapi=1" 
                    frameborder="0" allow="autoplay">
                </iframe>`;
        }
    </script>
</body>
</html>
