<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Audify - Lyrics Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus+Jakarta+Sans', sans-serif;
            background-color: #000;
            color: #fff;
            overflow: hidden; /* Prevent body scroll */
            height: 100vh;
        }

        /* Orientation Lock UI */
        @media (orientation: landscape) and (max-height: 500px) {
            .orientation-guard {
                display: flex !important;
            }
        }

        .orientation-guard {
            display: none;
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 9999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        /* Lyrics Container & Centering */
        .lyrics-window {
            height: 60vh;
            overflow-y: scroll;
            scrollbar-width: none;
            -ms-overflow-style: none;
            scroll-behavior: smooth;
            /* Vertical mask for fade effect */
            -webkit-mask-image: linear-gradient(to bottom, transparent, black 30%, black 70%, transparent);
            mask-image: linear-gradient(to bottom, transparent, black 30%, black 70%, transparent);
        }

        .lyrics-window::-webkit-scrollbar {
            display: none;
        }

        .lyrics-line {
            padding: 12px 0;
            font-size: 1.5rem;
            font-weight: 700;
            line-height: 1.4;
            color: rgba(255, 255, 255, 0.3);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            transform-origin: left;
        }

        .lyrics-line.active {
            color: #fff;
            transform: scale(1.05);
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.2));
        }

        /* Filler for top/bottom scrolling */
        .scroll-spacer {
            height: 25vh;
        }
    </style>
</head>
<body x-data="audifyApp()">

    <!-- Orientation Guard -->
    <div class="orientation-guard">
        <div class="text-4xl mb-4">🔄</div>
        <h2 class="text-xl font-bold">Please rotate your device</h2>
        <p class="text-gray-400 mt-2">Audify is optimized for portrait mode.</p>
    </div>

    <!-- Main Player UI -->
    <main class="max-w-md mx-auto h-screen flex flex-col p-6">
        
        <!-- Header -->
        <header class="flex justify-between items-center mb-8">
            <button class="p-2 bg-white/10 rounded-full">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
            </button>
            <div class="text-center">
                <p class="text-xs font-bold uppercase tracking-widest text-gray-400">Playing From Project</p>
                <p class="text-sm font-semibold">Audify Player</p>
            </div>
            <button class="p-2 bg-white/10 rounded-full">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
            </button>
        </header>

        <!-- Lyrics Section -->
        <div class="lyrics-window" id="lyricsWindow">
            <div class="scroll-spacer"></div>
            <div class="space-y-4">
                <template x-for="(line, index) in lyrics" :key="index">
                    <div :id="'line-' + index"
                         class="lyrics-line"
                         :class="currentLineIndex === index ? 'active' : ''"
                         x-text="line.text"
                         @click="seekTo(line.time)">
                    </div>
                </template>
            </div>
            <div class="scroll-spacer"></div>
        </div>

        <!-- Controls (Simplified for UI layout) -->
        <footer class="mt-auto pb-10">
            <div class="mb-6">
                <div class="flex justify-between text-xs font-bold text-gray-500 mb-2">
                    <span x-text="formatTime(currentTime)">0:00</span>
                    <span x-text="formatTime(duration)">0:00</span>
                </div>
                <div class="h-1 w-full bg-white/10 rounded-full overflow-hidden">
                    <div class="h-full bg-white" :style="'width: ' + (currentTime/duration * 100) + '%'"></div>
                </div>
            </div>

            <div class="flex justify-around items-center">
                <button @click="prevLine" class="opacity-70 hover:opacity-100">
                    <svg width="32" height="32" fill="currentColor" viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
                </button>
                <button @click="togglePlay" class="w-20 h-20 bg-white rounded-full flex items-center justify-center text-black shadow-lg shadow-white/10">
                    <svg x-show="!isPlaying" width="40" height="40" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    <svg x-show="isPlaying" width="40" height="40" fill="currentColor" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </button>
                <button @click="nextLine" class="opacity-70 hover:opacity-100">
                    <svg width="32" height="32" fill="currentColor" viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
                </button>
            </div>
        </footer>
    </main>

    <script>
        function audifyApp() {
            return {
                isPlaying: false,
                currentTime: 0,
                duration: 180, // 3 minutes mock
                currentLineIndex: -1,
                // Replace with your real lyrics data
                lyrics: [
                    { time: 0, text: "Welcome to Audify" },
                    { time: 5, text: "The interface is now portrait-locked" },
                    { time: 10, text: "Lyrics will stay centered" },
                    { time: 15, text: "Tap a line to seek the audio" },
                    { time: 20, text: "Built for mobile performance" },
                    { time: 25, text: "Smooth transitions included" },
                    { time: 30, text: "Starting second verse now..." },
                    { time: 35, text: "Feel the rhythm of the design" }
                ],

                init() {
                    // Mock progress tracker for demo
                    setInterval(() => {
                        if (this.isPlaying && this.currentTime < this.duration) {
                            this.currentTime += 0.5;
                            this.syncLyrics();
                        }
                    }, 500);
                },

                togglePlay() {
                    this.isPlaying = !this.isPlaying;
                },

                syncLyrics() {
                    const index = this.lyrics.findLastIndex(l => l.time <= this.currentTime);
                    
                    if (index !== this.currentLineIndex) {
                        this.currentLineIndex = index;
                        this.scrollToActiveLine();
                    }
                },

                scrollToActiveLine() {
                    this.$nextTick(() => {
                        const container = document.getElementById('lyricsWindow');
                        const activeLine = document.getElementById('line-' + this.currentLineIndex);
                        
                        if (container && activeLine) {
                            // Calculate center point
                            const containerCenter = container.clientHeight / 2;
                            const lineCenter = activeLine.clientHeight / 2;
                            const scrollTarget = activeLine.offsetTop - containerCenter + lineCenter;
                            
                            container.scrollTo({
                                top: scrollTarget,
                                behavior: 'smooth'
                            });
                        }
                    });
                },

                seekTo(time) {
                    this.currentTime = time;
                    this.syncLyrics();
                },

                formatTime(seconds) {
                    const min = Math.floor(seconds / 60);
                    const sec = Math.floor(seconds % 60);
                    return `${min}:${sec.toString().padStart(2, '0')}`;
                }
            }
        }
    </script>
</body>
</html>
