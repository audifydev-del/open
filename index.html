<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player - Official Audio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000000; color: #ffffff; }
        .spotify-card:hover { background-color: #282828; }
        /* Hide the actual YouTube player but keep it functional */
        #player-container { position: absolute; top: -9999px; left: -9999px; }
    </style>
</head>
<body class="flex flex-col h-screen font-sans">

    <div class="flex flex-1 overflow-hidden">
        <div class="w-64 bg-black p-6 flex flex-col gap-4 border-r border-zinc-800">
            <div class="text-green-500 font-bold text-2xl mb-4">Not-Spotify</div>
            <button class="text-left font-semibold hover:text-green-500">Home</button>
            <button class="text-left font-semibold hover:text-green-500 text-zinc-400">Search</button>
        </div>

        <main class="flex-1 p-8 overflow-y-auto bg-gradient-to-b from-zinc-900 to-black">
            <div class="flex items-center gap-4 mb-10">
                <input id="search-input" type="text" placeholder="Search for official audio..." 
                       class="w-full max-w-md p-3 rounded-full bg-zinc-800 text-white border-none focus:ring-2 focus:ring-white outline-none">
                <button onclick="searchMusic()" class="bg-green-500 text-black font-bold py-3 px-8 rounded-full hover:scale-105 transition">Search</button>
            </div>

            <div id="results" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-6">
                </div>
        </main>
    </div>

    <div class="h-24 bg-zinc-900 border-t border-zinc-800 p-4 flex items-center justify-between">
        <div class="flex items-center gap-4 w-1/3">
            <div id="player-img-container" class="w-14 h-14 bg-zinc-800 rounded shadow-lg overflow-hidden">
                <img id="player-album-art" src="" class="hidden w-full h-full object-cover">
            </div>
            <div>
                <div id="player-title" class="font-bold text-sm">Select a song</div>
                <div id="player-artist" class="text-zinc-400 text-xs text-nowrap">Artist</div>
            </div>
        </div>

        <div id="player-container">
            <div id="youtube-player"></div>
        </div>

        <div class="w-1/3 flex justify-center gap-6 text-xl">
             <button onclick="player.pauseVideo()" class="hover:text-green-500">⏸</button>
             <button onclick="player.playVideo()" class="hover:text-green-500">▶</button>
        </div>
        <div class="w-1/3"></div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        let player;

        // 1. Initialize the YouTube Player API
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('youtube-player', {
                height: '0',
                width: '0',
                videoId: '',
                playerVars: {
                    'autoplay': 1,
                    'playsinline': 1,
                    'origin': window.location.origin
                },
                events: {
                    'onReady': onPlayerReady,
                    'onError': onPlayerError
                }
            });
        }

        function onPlayerReady(event) {
            console.log("YouTube Player API Ready");
        }

        function onPlayerError(event) {
            // Error 101 or 150 means the label blocked embedding for this song
            console.error("Playback Error:", event.data);
            if (event.data === 101 || event.data === 150) {
                alert("This specific official audio is restricted by the record label and cannot be played outside of YouTube.");
            }
        }

        // 2. Search Logic
        async function searchMusic() {
            const query = document.getElementById('search-input').value;
            if (!query) return;

            const res = await fetch(`/search?q=${encodeURIComponent(query)}`);
            const data = await res.json();
            
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '';

            data.forEach(song => {
                resultsDiv.innerHTML += `
                    <div class="spotify-card p-4 rounded-lg bg-zinc-900/50 cursor-pointer transition duration-300" 
                         onclick="playSong('${song.id}', '${song.title.replace(/'/g, "\\'")}', '${song.artist.replace(/'/g, "\\'")}', '${song.thumbnail}')">
                        <img src="${song.thumbnail}" class="w-full aspect-square object-cover rounded-md mb-4 shadow-xl">
                        <h3 class="font-bold truncate">${song.title}</h3>
                        <p class="text-zinc-400 text-sm truncate">${song.artist}</p>
                    </div>
                `;
            });
        }

        // 3. Play Logic using the API
        function playSong(id, title, artist, thumb) {
            document.getElementById('player-title').innerText = title;
            document.getElementById('player-artist').innerText = artist;
            const img = document.getElementById('player-album-art');
            img.src = thumb;
            img.classList.remove('hidden');

            // Instead of changing innerHTML, we tell the API to load the new ID
            if (player && player.loadVideoById) {
                player.loadVideoById({
                    videoId: id,
                    suggestedQuality: 'small'
                });
            } else {
                console.error("Player not ready yet");
            }
        }
    </script>
</body>
</html>
