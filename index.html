<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Audify</title>
    <link rel="icon" href="https://audifydev-del.github.io/open/assets/ic.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        [x-cloak] { display: none !important; }
        :root { --app-height: 100dvh; }
        body { background: #000; color: white; overflow: hidden; height: var(--app-height); font-family: 'Inter', sans-serif; }
        
        .app-shell { width: 100%; max-width: 450px; height: var(--app-height); margin: 0 auto; position: relative; display: flex; flex-direction: column; }
        
        /* Smooth Tab Transitions */
        .tab-enter { animation: tabIn 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        @keyframes tabIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .shelf { display: flex; overflow-x: auto; gap: 16px; scrollbar-width: none; padding-bottom: 10px; }
        .shelf::-webkit-scrollbar { display: none; }
        
        /* Genre Cards */
        .genre-card { aspect-ratio: 16/9; border-radius: 8px; padding: 12px; font-weight: 800; font-size: 14px; position: relative; overflow: hidden; cursor: pointer; }
        .genre-card img { position: absolute; right: -10px; bottom: -5px; width: 60px; transform: rotate(25deg); opacity: 0.8; }

        /* Search Animations */
        .result-item { animation: slideUp 0.4s ease forwards; opacity: 0; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .bottom-nav { 
            background: linear-gradient(to top, #000 85%, transparent); 
            position: absolute; bottom: 0; left: 0; right: 0; 
            height: 85px; display: flex; justify-content: space-around; 
            align-items: center; z-index: 50; padding-bottom: env(safe-area-inset-bottom); 
        }
        
        .nav-item { display: flex; flex-direction: column; align-items: center; opacity: 0.5; transition: 0.3s; cursor: pointer; }
        .nav-item.active { opacity: 1; color: #fff; }

        /* Player Styling */
        .player-view { position: absolute; inset: 0; z-index: 100; background: #000; transition: transform 0.5s cubic-bezier(0.32, 0.72, 0, 1); overflow-y: auto; scrollbar-width: none; }
        .immersive-bg { position: absolute; top: -10%; width: 120%; height: 90vh; object-fit: cover; filter: blur(60px) saturate(180%); mask-image: linear-gradient(to bottom, black 10%, transparent 90%); -webkit-mask-image: linear-gradient(to bottom, black 10%, transparent 90%); z-index: 0; transform: scale(1.2); transition: opacity 0.5s ease; }
        .main-art { width: 100%; height: 100%; border-radius: 12px; box-shadow: 0 30px 60px rgba(0,0,0,0.8); object-fit: cover; z-index: 10; position: relative; transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }

        .lyrics-window { margin-top: 10px; padding: 120px 20px 20px 20px; height: auto; max-height: 550px; overflow-y: auto; scrollbar-width: none; position: relative; z-index: 20; mask-image: linear-gradient(to bottom, transparent 0%, black 10%, black 95%, transparent 100%); -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 10%, black 95%, transparent 100%); scroll-behavior: smooth; }
        .lyrics-line { font-size: 1.6rem; font-weight: 800; line-height: 1.4; color: rgba(255,255,255,0.15); transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1); margin-bottom: 40px; }
        .lyrics-line.active { color: #fff; transform: scale(1.05); text-shadow: 0 0 15px rgba(255, 255, 255, 0.6); }

        .shimmer { background: linear-gradient(90deg, #555 25%, #fff 50%, #555 75%); background-size: 200% 100%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shimmer 2s infinite linear; }
        @keyframes shimmer { to { background-position: -200% 0; } }
        .btn-active:active { transform: scale(0.92); opacity: 0.7; }
    </style>
</head>
<body x-data="audifyApp()" x-init="init()">

    <!-- Launch Screen -->
    <div x-show="!launched" @click="launch()" class="fixed inset-0 bg-black z-[300] flex flex-col items-center justify-center cursor-pointer">
        <img src="https://audifydev-del.github.io/open/assets/ic.png" class="w-20 mb-6">
        <p class="text-zinc-500 text-[10px] uppercase tracking-[0.4em] animate-pulse">Tap to Launch</p>
    </div>

    <!-- Splash Screen -->
    <div class="fixed inset-0 bg-black z-[200] flex items-center justify-center" x-show="launched && splash" x-transition:leave="duration-700">
        <img src="https://audifydev-del.github.io/open/assets/ic.png" class="w-24 animate-pulse">
    </div>

    <div class="app-shell" x-cloak x-show="launched">
        
        <!-- Header -->
        <div class="flex justify-between items-center px-4 pt-12 pb-4 z-10">
            <div class="flex items-center gap-3">
                <img src="https://audifydev-del.github.io/open/assets/ic.png" class="w-8 h-8">
                <h1 class="text-xl font-black tracking-tight" x-text="currentView === 'home' ? greet() : 'Search'"></h1>
            </div>
            <div class="flex gap-5 text-lg"><i class="fa-regular fa-bell"></i><i class="fa-solid fa-gear"></i></div>
        </div>

        <main class="flex-grow overflow-y-auto px-4 pb-44 z-10 relative">
            
            <!-- HOME VIEW -->
            <div x-show="currentView === 'home'" class="tab-enter">
                <div class="grid grid-cols-2 gap-3 mb-10">
                    <template x-for="s in trending.slice(0, 6)">
                        <div @click="play(s, trending)" class="bg-white/5 border border-white/5 rounded-md flex items-center gap-3 h-16 btn-active overflow-hidden">
                            <img :src="s.thumbnail" class="h-full w-16 object-cover">
                            <span class="text-[11px] font-bold truncate pr-2" x-text="s.title"></span>
                        </div>
                    </template>
                </div>

                <h2 class="text-xl font-bold mb-4">Made For You</h2>
                <div class="shelf mb-10">
                    <template x-for="s in trending.slice(6, 12)">
                        <div @click="play(s, trending)" class="w-36 flex-shrink-0 btn-active">
                            <img :src="s.thumbnail" class="w-36 h-36 rounded-lg shadow-2xl mb-3 object-cover">
                            <p class="text-xs font-bold truncate" x-text="s.title"></p>
                            <p class="text-[10px] text-zinc-500 truncate" x-text="s.artist"></p>
                        </div>
                    </template>
                </div>

                <h2 class="text-xl font-bold mb-4">Global Top 50</h2>
                <div class="shelf">
                    <template x-for="s in trending.reverse()">
                        <div @click="play(s, trending)" class="w-32 flex-shrink-0 btn-active">
                            <img :src="s.thumbnail" class="w-32 h-32 rounded-lg mb-2 object-cover">
                            <p class="text-[11px] font-bold truncate text-zinc-400" x-text="s.title"></p>
                        </div>
                    </template>
                </div>
            </div>

            <!-- SEARCH VIEW -->
            <div x-show="currentView === 'search'" class="tab-enter">
                <div class="relative mb-8">
                    <i class="fa-solid fa-magnifying-glass absolute left-4 top-4 text-zinc-900"></i>
                    <input type="text" x-model="query" @input.debounce.500ms="searchMusic()" placeholder="What do you want to listen to?" class="w-full p-4 pl-12 rounded-lg bg-white text-black font-semibold outline-none">
                </div>

                <!-- Genre Grid (Shows only when no query) -->
                <div x-show="!query" class="grid grid-cols-2 gap-4">
                    <div class="genre-card" style="background: #E13300;">Podcasts</div>
                    <div class="genre-card" style="background: #1E3264;">Live Events</div>
                    <div class="genre-card" style="background: #8400E7;">Made For You</div>
                    <div class="genre-card" style="background: #E8115B;">New Releases</div>
                    <div class="genre-card" style="background: #148A08;">Pop</div>
                    <div class="genre-card" style="background: #BC5900;">Hip-Hop</div>
                </div>

                <!-- Search Results with Staggered Animation -->
                <div class="space-y-4">
                    <template x-for="(s, index) in searchResults" :key="s.id">
                        <div @click="play(s, searchResults)" class="flex items-center gap-4 btn-active result-item" :style="'animation-delay: ' + (index * 0.05) + 's'">
                            <img :src="s.thumbnail" class="w-14 h-14 rounded-md object-cover">
                            <div class="overflow-hidden flex-grow">
                                <p class="font-bold text-sm truncate text-white" x-text="s.title"></p>
                                <p class="text-xs text-zinc-400 truncate" x-text="s.artist"></p>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </main>

        <!-- Mini Player -->
        <div x-show="active && !open" @click="open=true" class="fixed bottom-[95px] left-3 right-3 max-w-[425px] mx-auto bg-zinc-900/90 backdrop-blur-xl border border-white/10 h-16 rounded-xl flex items-center px-3 gap-4 z-40 shadow-2xl">
            <img :src="active?.thumbnail" class="w-11 h-11 rounded-lg object-cover">
            <div class="flex-grow overflow-hidden">
                <p class="text-[12px] font-bold truncate" x-text="active?.title"></p>
                <p class="text-[10px] text-zinc-400 truncate" x-text="active?.artist"></p>
            </div>
            <button @click.stop="toggle()"><i class="fa-solid text-white text-lg" :class="playing ? 'fa-pause' : 'fa-play'"></i></button>
        </div>

        <nav class="bottom-nav">
            <div class="nav-item" :class="currentView === 'home' ? 'active' : ''" @click="currentView = 'home'"><i class="fa-solid fa-house text-xl mb-1"></i><span class="text-[10px] font-bold">Home</span></div>
            <div class="nav-item" :class="currentView === 'search' ? 'active' : ''" @click="currentView = 'search'"><i class="fa-solid fa-magnifying-glass text-xl mb-1"></i><span class="text-[10px] font-bold">Search</span></div>
            <div class="nav-item"><i class="fa-solid fa-lines-leaning text-xl mb-1"></i><span class="text-[10px] font-bold">Your Library</span></div>
        </nav>

        <!-- Full Player View -->
        <div x-show="open" class="player-view" x-transition:enter="translate-y-full" x-transition:enter-end="translate-y-0" x-transition:leave="translate-y-full">
            <img :src="active?.thumbnail" class="immersive-bg" :class="changing ? 'opacity-0' : 'opacity-80'">
            <div class="min-h-screen p-8 flex flex-col relative z-10">
                <header class="flex justify-between items-center mb-10">
                    <i class="fa-solid fa-chevron-down text-xl p-2 btn-active" @click="open=false"></i>
                    <p class="text-[11px] font-bold uppercase tracking-widest text-white/50">Playing from your library</p>
                    <i class="fa-solid fa-ellipsis-vertical text-xl p-2"></i>
                </header>
                
                <div class="w-[90%] mx-auto aspect-square mb-10">
                    <img :src="active?.thumbnail" class="main-art" :class="changing ? 'opacity-0 scale-95' : 'opacity-100 scale-100'">
                </div>

                <div class="transition-all duration-500" :class="changing ? 'opacity-0 translate-y-2' : 'opacity-100 translate-y-0'">
                    <h2 class="text-2xl font-black mb-1 truncate" x-text="active?.title"></h2>
                    <p class="text-lg text-white/60 font-medium truncate mb-8" x-text="active?.artist"></p>
                    
                    <div class="mb-10">
                        <div class="relative h-1.5 bg-white/10 rounded-full mb-2" @click="seek($event)">
                            <div class="absolute h-full bg-white rounded-full" :style="`width: ${prog}%`"></div>
                        </div>
                        <div class="flex justify-between text-[10px] font-bold text-white/40">
                            <span x-text="formatTime(currentTime)">0:00</span>
                            <span x-text="formatTime(duration)">0:00</span>
                        </div>
                    </div>
                </div>

                <div class="flex justify-around items-center mb-12">
                    <i @click="toggleShuffle()" class="fa-solid fa-shuffle text-lg" :class="shuffle ? 'text-white' : 'text-white/20'"></i>
                    <i @click="prev()" class="fa-solid fa-backward-step text-3xl btn-active"></i>
                    <button @click="toggle()" class="w-16 h-16 bg-white text-black rounded-full flex items-center justify-center btn-active">
                        <i class="fa-solid text-2xl" :class="playing ? 'fa-pause' : 'fa-play'"></i>
                    </button>
                    <i @click="next()" class="fa-solid fa-forward-step text-3xl btn-active"></i>
                    <i @click="toggleRepeat()" class="fa-solid fa-repeat text-lg" :class="repeatMode !== 'off' ? 'text-white' : 'text-white/20'"></i>
                </div>

                <div class="flex flex-col flex-grow relative">
                    <div x-show="isFetchingLyrics" class="absolute inset-x-0 top-0 text-center z-10"><p class="text-[10px] font-black uppercase tracking-widest shimmer">Fetching Lyrics...</p></div>
                    <div class="lyrics-window" id="lyrics-window">
                        <template x-for="(line, index) in lyrics">
                            <div class="lyrics-line" :id="'line-'+index" :class="currentLineIndex === index ? 'active' : ''" x-text="line.text"></div>
                        </template>
                    </div>
                </div>
            </div>
        </div>
        
        <div id="yt-player-container"><div id="player"></div></div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let ytPlayer;
        function onYouTubeIframeAPIReady() {
            ytPlayer = new YT.Player('player', {
                height: '1', width: '1', videoId: '',
                playerVars: { 'autoplay': 1, 'controls': 0, 'disablekb': 1, 'playsinline': 1 },
                events: {
                    'onStateChange': (e) => {
                        if(window.audifyAppInstance) {
                            window.audifyAppInstance.playing = (e.data === YT.PlayerState.PLAYING);
                            if (e.data === YT.PlayerState.ENDED) window.audifyAppInstance.next();
                            if(e.data === YT.PlayerState.PLAYING && !window.audifyAppInstance.lyrics.length) {
                                window.audifyAppInstance.fetchLyrics(window.audifyAppInstance.active);
                            }
                        }
                    }
                }
            });
        }

        function audifyApp() {
            return {
                launched: false, splash: true, currentView: 'home', query: '', open: false,
                playing: false, prog: 0, currentTime: 0, duration: 0, changing: false,
                trending: [], searchResults: [], active: null, lyrics: [], currentLineIndex: -1, 
                isFetchingLyrics: false, shuffle: false, repeatMode: 'off', queue: [], originalQueue: [], currentIndex: -1,

                launch() { this.launched = true; },
                greet() { return ['Good Morning','Good Afternoon','Good Evening'][Math.floor(new Date().getHours()/8)] },
                formatTime(s) { if(!s) return "0:00"; let m = Math.floor(s/60), sec = Math.floor(s%60); return `${m}:${sec < 10 ? '0' : ''}${sec}`; },
                
                async init() {
                    window.audifyAppInstance = this;
                    setTimeout(() => this.splash = false, 1800);
                    try {
                        const res = await fetch('/search?q=top+global+hits+2026');
                        const data = await res.json();
                        // THE VIBE FILTER
                        const blocked = ['tseries','t-series','bollywood','indian','hindi','shruti rane','set india'];
                        this.trending = data.filter(s => !blocked.some(term => (s.title + s.artist).toLowerCase().includes(term)));
                    } catch(e) {}
                    setInterval(() => {
                        if(this.playing && ytPlayer?.getCurrentTime) {
                            this.currentTime = ytPlayer.getCurrentTime();
                            this.duration = ytPlayer.getDuration();
                            this.prog = (this.currentTime / this.duration) * 100;
                            this.syncLyrics();
                        }
                    }, 150);
                },

                async searchMusic() {
                    if(!this.query) { this.searchResults = []; return; }
                    const res = await fetch(`/search?q=${encodeURIComponent(this.query)}`);
                    const data = await res.json();
                    this.searchResults = data.filter(s => !['bollywood','tseries'].some(b => s.title.toLowerCase().includes(b)));
                },

                async play(s, list = null) {
                    this.changing = true;
                    if (list) { this.originalQueue = [...list]; this.queue = this.shuffle ? this.shuffleArray([...list]) : [...list]; }
                    this.active = s;
                    this.currentIndex = this.queue.findIndex(item => item.id === s.id);
                    this.lyrics = []; this.prog = 0;
                    if(ytPlayer?.loadVideoById) { ytPlayer.loadVideoById({ videoId: s.id, suggestedQuality: 'small' }); }
                    setTimeout(() => this.changing = false, 500);
                },

                async fetchLyrics(track) {
                    this.isFetchingLyrics = true;
                    try {
                        const clean = track.title.replace(/\(.*\)|\[.*\]/g, '');
                        const res = await fetch(`https://lrclib.net/api/search?track_name=${encodeURIComponent(clean)}&artist_name=${encodeURIComponent(track.artist)}`);
                        const data = await res.json();
                        if(data[0]?.syncedLyrics) {
                            this.lyrics = data[0].syncedLyrics.split('\n').map(line => {
                                const m = line.match(/\[(\d+):(\d+\.\d+)\](.*)/);
                                return m ? { time: parseInt(m[1])*60 + parseFloat(m[2]), text: m[3].trim() } : null;
                            }).filter(l => l?.text);
                        }
                    } catch(e) {} finally { this.isFetchingLyrics = false; }
                },

                syncLyrics() {
                    if(!this.lyrics.length) return;
                    let idx = this.lyrics.findLastIndex(l => this.currentTime >= l.time);
                    if (idx !== -1 && idx !== this.currentLineIndex) {
                        this.currentLineIndex = idx;
                        const el = document.getElementById('line-' + idx);
                        if(el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                },

                toggle() { this.playing ? ytPlayer.pauseVideo() : ytPlayer.playVideo(); },
                next() { let i = this.currentIndex + 1; if(i < this.queue.length) this.play(this.queue[i]); },
                prev() { let i = this.currentIndex - 1; if(i >= 0) this.play(this.queue[i]); },
                toggleShuffle() { this.shuffle = !this.shuffle; },
                toggleRepeat() { this.repeatMode = this.repeatMode === 'off' ? 'all' : 'off'; },
                seek(e) { ytPlayer.seekTo((e.offsetX / e.currentTarget.offsetWidth) * this.duration); }
            }
        }
    </script>
</body>
</html>
