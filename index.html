<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audify Mobile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Figtree', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Spinner Animation */
        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #fff;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="w-full max-w-md p-6">
        <h1 class="text-2xl font-bold mb-6">Good evening</h1>
        
        <div onclick="playSong('kIFt-LUHHVA', 'Espresso', 'Sabrina Carpenter')" class="bg-zinc-900 p-4 rounded-lg flex items-center cursor-pointer hover:bg-zinc-800 transition">
            <img src="https://img.youtube.com/vi/kIFt-LUHHVA/mqdefault.jpg" class="w-12 h-12 rounded mr-4">
            <div>
                <p class="font-semibold">Espresso</p>
                <p class="text-sm text-zinc-400">Sabrina Carpenter</p>
            </div>
        </div>

        <div id="player-bar" class="fixed bottom-20 left-1/2 -translate-x-1/2 w-[90%] max-w-md bg-zinc-800 p-3 rounded-xl flex items-center justify-between">
            <div class="flex items-center">
                <div id="player-loading" class="spinner mr-3 hidden"></div>
                <div>
                    <p id="current-title" class="font-bold text-sm">Not Playing</p>
                    <p id="current-artist" class="text-xs text-zinc-400">Select a song</p>
                </div>
            </div>
            <button id="play-btn" class="text-xl">▶</button>
        </div>
    </div>

    <audio id="main-audio"></audio>

    <script>
        const audio = document.getElementById('main-audio');
        const loadingSpinner = document.getElementById('player-loading');
        const playBtn = document.getElementById('play-btn');
        const titleDisplay = document.getElementById('current-title');
        const artistDisplay = document.getElementById('current-artist');

        // Replace this with your actual Render URL if it changes
        const BACKEND_URL = "https://open-je44.onrender.com";

        async function playSong(videoId, title, artist) {
            // 1. UI Feedback: Show loading
            loadingSpinner.classList.remove('hidden');
            titleDisplay.innerText = title;
            artistDisplay.innerText = artist;
            
            try {
                // 2. Fetch from your Python Backend
                const response = await fetch(`${BACKEND_URL}/get_audio/${videoId}`);
                const data = await response.json();

                if (data.status === "success" && data.url) {
                    // 3. Set audio source and play
                    audio.src = data.url;
                    audio.play();
                } else {
                    alert("Error fetching audio: " + (data.message || "Unknown error"));
                }
            } catch (error) {
                console.error("Fetch failed:", error);
                alert("Backend server is currently down or waking up. Please wait.");
            }
        }

        // Hide spinner when audio actually starts playing
        audio.onplaying = () => {
            loadingSpinner.classList.add('hidden');
            playBtn.innerText = "⏸";
        };

        // Handle Play/Pause button
        playBtn.onclick = () => {
            if (audio.paused) {
                audio.play();
                playBtn.innerText = "⏸";
            } else {
                audio.pause();
                playBtn.innerText = "▶";
            }
        };
    </script>
</body>
</html>
