<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Knockoff</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-base: #000000;
            --bg-surface: #121212;
            --bg-card: #181818;
            --bg-card-hover: #282828;
            --spotify-green: #1DB954;
            --text-main: #ffffff;
            --text-sub: #b3b3b3;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar Styling */
        .sidebar {
            width: 240px;
            background-color: var(--bg-base);
            display: flex;
            flex-direction: column;
            padding: 20px;
            gap: 20px;
        }

        .sidebar h2 { font-size: 1.5rem; color: var(--text-main); margin-bottom: 20px; }
        .nav-item { color: var(--text-sub); text-decoration: none; font-weight: bold; display: flex; align-items: center; gap: 15px; cursor: pointer; }
        .nav-item:hover { color: var(--text-main); }

        /* Main Content Styling */
        .main-content {
            flex-grow: 1;
            background: linear-gradient(to bottom, #222222, var(--bg-surface));
            overflow-y: auto;
            padding: 20px;
            padding-bottom: 110px; /* Space for player bar */
        }

        .search-container {
            margin-bottom: 30px;
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            background-color: #242424;
            border: 1px solid transparent;
            border-radius: 500px;
            padding: 12px 20px;
            color: white;
            width: 350px;
            outline: none;
        }

        input[type="text"]:focus { border: 1px solid white; }

        button#search-btn {
            background-color: var(--spotify-green);
            border: none;
            border-radius: 500px;
            padding: 10px 25px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s;
        }

        button#search-btn:hover { transform: scale(1.04); background-color: #1ed760; }

        /* Song Grid */
        .song-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 24px;
        }

        .song-card {
            background-color: var(--bg-card);
            padding: 16px;
            border-radius: 8px;
            transition: background-color 0.3s ease;
            cursor: pointer;
            position: relative;
        }

        .song-card:hover { background-color: var(--bg-card-hover); }

        .song-card img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            border-radius: 4px;
            margin-bottom: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        .song-card h4 { margin: 0; font-size: 1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .song-card p { margin: 8px 0 0; color: var(--text-sub); font-size: 0.85rem; }

        /* Player Bar */
        .player-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 90px;
            background-color: #000;
            border-top: 1px solid #282828;
            display: flex;
            align-items: center;
            padding: 0 20px;
            justify-content: space-between;
            box-sizing: border-box;
        }

        .now-playing { display: flex; align-items: center; gap: 15px; width: 30%; }
        .now-playing img { width: 56px; height: 56px; border-radius: 4px; background: #282828; }
        .song-info h5 { margin: 0; font-size: 0.9rem; }
        .song-info p { margin: 5px 0 0; font-size: 0.75rem; color: var(--text-sub); }

        .controls { width: 40%; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        audio { height: 30px; width: 100%; filter: invert(100%) hue-rotate(180deg) brightness(1.5); }

        /* Loading Spinner */
        .loader {
            display: none;
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--spotify-green);
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 2s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <div class="sidebar">
        <h2><i class="fa-brands fa-spotify"></i> Knockoff</h2>
        <a class="nav-item"><i class="fa-solid fa-house"></i> Home</a>
        <a class="nav-item"><i class="fa-solid fa-magnifying-glass"></i> Search</a>
        <a class="nav-item"><i class="fa-solid fa-lines-leaning"></i> Your Library</a>
    </div>

    <div class="main-content">
        <div class="search-container">
            <input type="text" id="query" placeholder="What do you want to listen to?">
            <button id="search-btn" onclick="searchMusic()">Search</button>
            <div id="loader" class="loader"></div>
        </div>

        <div class="song-grid" id="results">
            <!-- Results injected here -->
        </div>
    </div>

    <div class="player-bar">
        <div class="now-playing">
            <img id="current-art" src="" alt="">
            <div class="song-info">
                <h5 id="current-title">No song selected</h5>
                <p id="current-artist"></p>
            </div>
        </div>

        <div class="controls">
            <audio id="audio-player" controls></audio>
        </div>

        <div style="width: 30%;"></div> <!-- Spacer for symmetry -->
    </div>

    <script>
        const queryInput = document.getElementById('query');
        const loader = document.getElementById('loader');

        // Allow pressing "Enter" to search
        queryInput.addEventListener("keypress", (event) => {
            if (event.key === "Enter") searchMusic();
        });

        async function searchMusic() {
            const q = queryInput.value;
            if (!q) return;

            loader.style.display = "block";
            const res = await fetch(`/search?q=${encodeURIComponent(q)}`);
            const songs = await res.json();
            loader.style.display = "none";

            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '';

            songs.forEach(song => {
                const card = document.createElement('div');
                card.className = 'song-card';
                card.innerHTML = `
                    <img src="${song.thumbnail}" alt="${song.title}">
                    <h4>${song.title}</h4>
                    <p>${song.artist}</p>
                `;
                card.onclick = () => loadSong(song);
                resultsDiv.appendChild(card);
            });
        }

        async function loadSong(song) {
            const player = document.getElementById('audio-player');
            const titleDisplay = document.getElementById('current-title');
            
            titleDisplay.innerText = "Connecting to stream...";
            document.getElementById('current-art').src = song.thumbnail;
            document.getElementById('current-artist').innerText = song.artist;

            try {
                const res = await fetch(`/get_url?id=${song.id}`);
                const data = await res.json();

                if (data.url) {
                    player.src = data.url;
                    player.play();
                    titleDisplay.innerText = song.title;
                } else {
                    alert("Error: Could not retrieve audio URL.");
                    titleDisplay.innerText = "Error loading song";
                }
            } catch (err) {
                console.error(err);
                titleDisplay.innerText = "Error loading song";
            }
        }
    </script>
</body>
</html>
