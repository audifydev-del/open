<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Music Player</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white font-sans">

    <div class="p-8">
        <div class="flex gap-4 mb-10">
            <input id="search-input" type="text" placeholder="Search for a song..." 
                   class="w-full max-w-md p-3 rounded-full bg-zinc-800 text-white outline-none border-2 border-transparent focus:border-green-500">
            <button onclick="searchMusic()" class="bg-green-500 text-black font-bold py-3 px-8 rounded-full hover:scale-105 transition">Search</button>
        </div>

        <div id="results" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6">
            </div>
    </div>

    <div id="player-bar" class="fixed bottom-0 w-full h-24 bg-zinc-900 border-t border-zinc-800 p-4 flex items-center hidden">
        <img id="p-thumb" src="" class="w-14 h-14 rounded mr-4">
        <div>
            <div id="p-title" class="font-bold">Title</div>
            <div id="p-artist" class="text-zinc-400 text-sm">Artist</div>
        </div>
        <div id="video-dest" class="hidden"></div>
    </div>

    <script>
        async function searchMusic() {
            const query = document.getElementById('search-input').value;
            const resultsDiv = document.getElementById('results');
            
            resultsDiv.innerHTML = '<p class="text-zinc-500">Searching...</p>';

            try {
                const response = await fetch(`/search?q=${encodeURIComponent(query)}`);
                const songs = await response.json();

                console.log("Songs found:", songs); // Check your browser console!

                resultsDiv.innerHTML = ''; // Clear "Searching..."

                if (songs.length === 0) {
                    resultsDiv.innerHTML = '<p>No songs found.</p>';
                    return;
                }

                songs.forEach(song => {
                    const card = document.createElement('div');
                    card.className = "bg-zinc-900 p-4 rounded-lg hover:bg-zinc-800 cursor-pointer transition group";
                    card.onclick = () => playSong(song.id, song.title, song.artist, song.thumbnail);
                    
                    card.innerHTML = `
                        <img src="${song.thumbnail}" class="w-full aspect-square object-cover rounded-md mb-4">
                        <h3 class="font-bold truncate">${song.title}</h3>
                        <p class="text-zinc-400 text-sm truncate">${song.artist}</p>
                    `;
                    resultsDiv.appendChild(card);
                });

            } catch (error) {
                console.error("Search failed:", error);
                resultsDiv.innerHTML = '<p class="text-red-500">Error connecting to server.</p>';
            }
        }

        function playSong(id, title, artist, thumb) {
            document.getElementById('player-bar').classList.remove('hidden');
            document.getElementById('p-title').innerText = title;
            document.getElementById('p-artist').innerText = artist;
            document.getElementById('p-thumb').src = thumb;

            // Simple autoplay logic
            document.getElementById('video-dest').innerHTML = `
                <iframe width="0" height="0" src="https://www.youtube.com/embed/${id}?autoplay=1" frameborder="0" allow="autoplay"></iframe>
            `;
        }
    </script>
</body>
</html>
