<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Audify</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        [x-cloak] { display: none !important; }
        body { 
            background-color: #000; color: white; font-family: 'Inter', sans-serif; 
            overflow: hidden; margin: 0; height: 100dvh; 
        }
        .app-shell { 
            width: 100%; max-width: 450px; height: 100%; margin: 0 auto; 
            position: relative; background: #121212; 
            display: flex; flex-direction: column;
            padding-top: env(safe-area-inset-top);
        }
        
        .song-card {
            background: #181818;
            padding: 12px;
            border-radius: 8px;
            transition: background 0.3s ease;
        }
        .song-card:active { background: #282828; transform: scale(0.98); }

        /* Immersive Player Styles */
        .hero-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 60%; /* Occupies top 60% of the screen */
            z-index: 0;
        }
        .hero-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .hero-fade {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(18,18,18,0) 0%, rgba(18,18,18,0.2) 50%, #121212 100%);
        }

        .player-content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            height: 100%;
            padding: 20px 32px 60px 32px;
        }

        #player-container { position: absolute; top: -9999px; left: -9999px; visibility: hidden; }
    </style>
</head>
<body>

<div x-data="audifyApp()" x-init="initApp()">
    <div class="app-shell">
        
        <!-- Library View -->
        <main class="flex-grow overflow-y-auto px-4 pt-6 pb-40" x-show="!playerOpen">
            <header class="flex justify-between items-center mb-6">
                <h1 class="text-2xl font-black tracking-tighter">Good afternoon</h1>
                <div class="flex gap-4">
                    <i class="fa-solid fa-bell opacity-70"></i>
                    <i class="fa-solid fa-gear opacity-70"></i>
                </div>
            </header>
            
            <div class="sticky top-0 z-20 pb-4 bg-transparent">
                <div class="flex items-center bg-white/10 rounded-md px-3 py-2 border border-white/5 backdrop-blur-md">
                    <i class="fa-solid fa-magnifying-glass text-white/50 mr-2"></i>
                    <input type="text" x-model="searchQuery" @keydown.enter="fetchData(searchQuery)" 
                           placeholder="Search music..." 
                           class="bg-transparent w-full outline-none text-sm font-medium">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <template x-for="song in songs" :key="song.id">
                    <div class="song-card flex flex-col gap-3" @click="playSong(song)">
                        <div class="relative w-full aspect-square shadow-xl">
                            <img :src="song.thumbnail" class="w-full h-full rounded-md object-cover">
                        </div>
                        <div class="overflow-hidden">
                            <p class="text-sm font-bold truncate text-white" x-text="song.title"></p>
                            <p class="text-xs text-[#b3b3b3] font-medium truncate" x-text="song.artist"></p>
                        </div>
                    </div>
                </template>
            </div>
        </main>

        <!-- Mini Player -->
        <div x-show="activeTrack && !playerOpen" @click="playerOpen = true" x-cloak
             class="mx-2 mb-2 p-2 bg-[#282828] rounded-md flex items-center gap-3 shadow-2xl">
            <img :src="activeTrack?.thumbnail" class="w-10 h-10 rounded shadow-md object-cover">
            <div class="flex-grow overflow-hidden">
                <p class="text-xs font-bold truncate" x-text="activeTrack?.title"></p>
                <p class="text-[10px] text-white/70 truncate" x-text="activeTrack?.artist"></p>
            </div>
            <button @click.stop="togglePlay()" class="px-3">
                <i class="fa-solid" :class="isPlaying ? 'fa-pause' : 'fa-play'"></i>
            </button>
        </div>

        <!-- Immersive Full Player -->
        <div x-show="playerOpen" x-cloak 
             class="absolute inset-0 bg-[#121212] z-50 flex flex-col overflow-hidden">
            
            <!-- Immersive Hero Section -->
            <div class="hero-container">
                <img :src="activeTrack?.thumbnail" class="hero-image">
                <div class="hero-fade"></div>
            </div>
            
            <div class="player-content">
                <header class="flex justify-between items-center mb-auto pt-4">
                    <i class="fa-solid fa-chevron-down text-xl" @click="playerOpen = false"></i>
                    <p class="text-[11px] font-bold uppercase tracking-[2px] opacity-80">Audify Player</p>
                    <i class="fa-solid fa-ellipsis text-xl"></i>
                </header>

                <div class="mt-auto">
                    <div class="flex justify-between items-end mb-8">
                        <div class="overflow-hidden mr-4">
                            <h2 class="text-3xl font-black truncate leading-tight" x-text="activeTrack?.title"></h2>
                            <p class="text-xl text-[#b3b3b3] font-bold" x-text="activeTrack?.artist"></p>
                        </div>
                        <i class="fa-regular fa-heart text-2xl opacity-60"></i>
                    </div>

                    <!-- Spotify Style Controls -->
                    <div class="flex justify-between items-center">
                        <i class="fa-solid fa-shuffle text-xl text-[#1DB954]"></i>
                        <i class="fa-solid fa-backward-step text-3xl"></i>
                        
                        <button @click="togglePlay()" class="w-20 h-20 bg-white text-black rounded-full flex items-center justify-center shadow-lg active:scale-90 transition-transform">
                            <i class="fa-solid text-3xl" :class="isPlaying ? 'fa-pause' : 'fa-play'"></i>
                        </button>
                        
                        <i class="fa-solid fa-forward-step text-3xl"></i>
                        <i class="fa-solid fa-repeat text-xl opacity-60"></i>
                    </div>
                </div>
            </div>
        </div>

        <div id="player-container">
            <iframe id="yt-iframe" src="" allow="autoplay"></iframe>
        </div>
    </div>
</div>

<script>
    function audifyApp() {
        return {
            songs: [], searchQuery: '', activeTrack: null,
            playerOpen: false, isPlaying: false,

            initApp() {
                this.fetchData('top hits');
            },

            async fetchData(q) {
                try {
                    const res = await fetch(`/search?q=${encodeURIComponent(q)}`);
                    this.songs = await res.json();
                } catch (e) { console.error("Search failed"); }
            },

            playSong(song) {
                this.activeTrack = song;
                this.playerOpen = true;
                this.isPlaying = true;
                const iframe = document.getElementById('yt-iframe');
                iframe.src = `https://www.youtube.com/embed/${song.id}?autoplay=1&enablejsapi=1`;
            },

            togglePlay() {
                const iframe = document.getElementById('yt-iframe');
                this.isPlaying = !this.isPlaying;
                const command = this.isPlaying ? 'playVideo' : 'pauseVideo';
                iframe.contentWindow.postMessage(JSON.stringify({
                    "event": "command", "func": command, "args": ""
                }), "*");
            }
        }
    }
</script>
</body>
</html>
