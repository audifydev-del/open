<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Audify</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        [x-cloak] { display: none !important; }
        body { background-color: #000; color: white; font-family: 'Inter', sans-serif; overflow: hidden; margin: 0; height: 100dvh; }
        .app-shell { width: 100%; max-width: 450px; height: 100%; margin: 0 auto; position: relative; background-color: #121212; display: flex; flex-direction: column; }
        .dynamic-bg { position: absolute; inset: 0; z-index: -1; filter: blur(80px) brightness(0.3); transform: scale(1.2); transition: background-image 0.8s; background-size: cover; background-position: center; }
        /* This hides the actual video but keeps the audio playing */
        #player-container { position: absolute; top: -9999px; left: -9999px; width: 1px; height: 1px; overflow: hidden; }
    </style>
</head>
<body>

<div x-data="audifyApp()" x-init="initApp()">
    <div class="app-shell">
        
        <!-- Library View -->
        <main class="flex-grow overflow-y-auto px-5 pt-8 pb-32" x-show="!playerOpen">
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-3xl font-black">Audify</h1>
                <i class="fa-solid fa-circle-user text-2xl opacity-50"></i>
            </div>
            
            <input type="text" x-model="searchQuery" @keydown.enter="fetchData(searchQuery)" 
                   placeholder="Search songs..." 
                   class="w-full bg-zinc-800 rounded-xl py-3 px-6 mb-6 outline-none text-sm border border-white/5 focus:border-[#1DB954]">
            
            <div class="flex flex-col gap-4">
                <template x-for="song in songs" :key="song.id">
                    <div class="flex items-center gap-4 cursor-pointer active:scale-95 transition-transform" @click="playSong(song)">
                        <img :src="song.thumbnail" class="w-14 h-14 rounded-lg bg-zinc-800 object-cover shadow-lg">
                        <div class="flex-grow overflow-hidden">
                            <p class="text-sm font-bold truncate" x-text="song.title"></p>
                            <p class="text-xs text-zinc-400 font-medium" x-text="song.artist"></p>
                        </div>
                        <i class="fa-solid fa-play text-xs opacity-30"></i>
                    </div>
                </template>
            </div>
        </main>

        <!-- Full Player View -->
        <div x-show="playerOpen" x-cloak class="absolute inset-0 bg-[#121212] z-50 flex flex-col p-8 transition-all">
            <div class="dynamic-bg" :style="`background-image: url(${activeTrack?.thumbnail})`"></div>
            
            <header class="flex justify-between items-center mb-8">
                <i class="fa-solid fa-chevron-down text-xl" @click="playerOpen = false"></i>
                <p class="text-[10px] font-bold uppercase tracking-widest opacity-60">Streaming Audio</p>
                <i class="fa-solid fa-ellipsis text-xl opacity-60"></i>
            </header>

            <div class="flex-grow flex flex-col justify-center">
                <div class="relative group mb-10">
                    <img :src="activeTrack?.thumbnail" class="w-full aspect-square rounded-2xl shadow-2xl object-cover">
                </div>
                
                <h2 class="text-2xl font-black truncate leading-tight" x-text="activeTrack?.title"></h2>
                <p class="text-lg text-white/50 font-bold mb-10" x-text="activeTrack?.artist"></p>

                <!-- Controls -->
                <div class="flex justify-around items-center">
                    <i class="fa-solid fa-shuffle text-xl opacity-30"></i>
                    <i class="fa-solid fa-backward-step text-3xl"></i>
                    
                    <button @click="togglePlay()" class="w-20 h-20 bg-white text-black rounded-full flex items-center justify-center shadow-2xl active:scale-90 transition-transform">
                        <i class="fa-solid text-3xl" :class="isPlaying ? 'fa-pause' : 'fa-play'"></i>
                    </button>
                    
                    <i class="fa-solid fa-forward-step text-3xl"></i>
                    <i class="fa-solid fa-repeat text-xl opacity-30"></i>
                </div>
            </div>
        </div>

        <!-- Hidden IFrame Player -->
        <div id="player-container">
            <iframe id="yt-iframe" 
                    width="100" height="100" 
                    src="" 
                    frameborder="0" 
                    allow="autoplay">
            </iframe>
        </div>
    </div>
</div>

<script>
    function audifyApp() {
        return {
            songs: [], 
            searchQuery: '', 
            activeTrack: null,
            playerOpen: false, 
            isPlaying: false,

            initApp() {
                this.fetchData('trending hits');
                // Listen for messages from the iframe (optional, for state)
                window.addEventListener('message', (event) => {
                    // This is where you'd handle autoplay finishing if needed
                });
            },

            async fetchData(q) {
                try {
                    const res = await fetch(`/search?q=${encodeURIComponent(q)}`);
                    this.songs = await res.json();
                } catch (e) { console.error("Search failed"); }
            },

            playSong(song) {
                this.activeTrack = song;
                this.playerOpen = true;
                this.isPlaying = true;
                
                // Construct the embed URL with autoplay enabled
                const iframe = document.getElementById('yt-iframe');
                iframe.src = `https://www.youtube.com/embed/${song.id}?autoplay=1&enablejsapi=1`;
            },

            togglePlay() {
                const iframe = document.getElementById('yt-iframe');
                this.isPlaying = !this.isPlaying;
                
                // Use postMessage to talk to the YouTube embed without a heavy API
                const command = this.isPlaying ? 'playVideo' : 'pauseVideo';
                iframe.contentWindow.postMessage(JSON.stringify({
                    "event": "command",
                    "func": command,
                    "args": ""
                }), "*");
            }
        }
    }
</script>
</body>
</html>
