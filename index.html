<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audify Mobile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;600;700;800&display=swap');

        body {
            background-color: #000;
            color: #fff;
            font-family: 'Figtree', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #splash-screen {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        .app-container {
            width: 100%;
            max-width: 420px;
            height: 100%;
            background-color: #000;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .view-wrapper {
            position: relative;
            flex: 1;
            width: 100%;
            overflow: hidden;
        }

        .view {
            position: absolute;
            inset: 0;
            opacity: 0;
            pointer-events: none;
            transform: translateY(10px);
            transition: opacity 0.3s ease, transform 0.3s ease;
            overflow-y: auto;
            padding-bottom: 180px; 
        }

        .view.active {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0);
            z-index: 10;
        }

        .view::-webkit-scrollbar { display: none; }

        /* Full Player View Slide Animation */
        #full-player {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, #444 0%, #121212 100%);
            z-index: 200;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.33, 1, 0.68, 1);
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        #full-player.open {
            transform: translateY(0);
        }

        .home-gradient {
            background: linear-gradient(to bottom, #2a2a2a 0%, #121212 25%, #121212 100%);
        }

        .ui-fixed-bottom {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: linear-gradient(to top, rgba(0,0,0,1) 85%, rgba(0,0,0,0) 100%);
            padding-bottom: env(safe-area-inset-bottom);
        }

        .mini-player {
            background: #282828;
            margin: 0 8px 8px 8px;
            height: 56px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            padding: 0 12px;
            cursor: pointer;
        }

        .bottom-nav {
            height: 70px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: 10px;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 10px;
            color: #b3b3b3;
            cursor: pointer;
        }

        .nav-item.active { color: #fff; }

        .shortcut-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            padding: 16px;
        }

        .shortcut-card {
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            height: 56px;
            display: flex;
            align-items: center;
            overflow: hidden;
            font-size: 11px;
            font-weight: bold;
        }
        .shortcut-card img { height: 100%; width: 56px; object-fit: cover; margin-right: 8px; }

        .album-scroll {
            display: flex;
            gap: 16px;
            overflow-x: auto;
            padding: 0 16px 20px 16px;
        }

        .song-list-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 16px;
            cursor: pointer;
        }

        .progress-bar {
            position: absolute;
            bottom: 0;
            left: 12px;
            right: 12px;
            height: 2px;
            background: rgba(255,255,255,0.1);
        }
        .progress-fill { width: 0%; height: 100%; background: #fff; border-radius: 2px; }

        #yt-player-container {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="splash-screen">
        <img src="https://audifydev-del.github.io/open/assets/ic.png" alt="Logo" class="w-40 h-40">
    </div>

    <div id="yt-player-container"></div>

    <div class="app-container">
        <!-- FULL PLAYER VIEW -->
        <div id="full-player">
            <div class="flex justify-between items-center mb-10">
                <button onclick="toggleFullPlayer(false)" class="text-2xl"><i class="fa-solid fa-chevron-down"></i></button>
                <p class="text-[10px] font-bold tracking-widest uppercase">Playing from your library</p>
                <i class="fa-solid fa-ellipsis-vertical text-xl"></i>
            </div>
            
            <img id="mainPlayerThumb" src="" class="w-full aspect-square rounded-lg shadow-2xl mb-12 object-cover">
            
            <div class="flex justify-between items-end mb-8">
                <div>
                    <h2 id="mainPlayerTitle" class="text-2xl font-bold mb-1 truncate max-w-[280px]">Song Title</h2>
                    <p id="mainPlayerArtist" class="text-gray-400 text-lg">Artist Name</p>
                </div>
                <i class="fa-regular fa-heart text-2xl"></i>
            </div>

            <div class="w-full bg-white/20 h-1 rounded-full mb-2">
                <div id="fullProgressFill" class="bg-white h-full rounded-full" style="width: 0%"></div>
            </div>
            <div class="flex justify-between text-[10px] text-gray-400 mb-8">
                <span>0:00</span>
                <span>3:45</span>
            </div>

            <div class="flex justify-between items-center px-4">
                <i class="fa-solid fa-shuffle text-xl text-gray-400"></i>
                <i class="fa-solid fa-backward-step text-3xl"></i>
                <div class="bg-white text-black w-16 h-16 rounded-full flex items-center justify-center">
                    <i class="fa-solid fa-play text-2xl"></i>
                </div>
                <i class="fa-solid fa-forward-step text-3xl"></i>
                <i class="fa-solid fa-repeat text-xl text-gray-400"></i>
            </div>
        </div>

        <div class="view-wrapper">
            <!-- HOME VIEW -->
            <div id="home" class="view active home-gradient">
                <header class="p-4 pt-10 flex justify-between items-center">
                    <h1 class="text-2xl font-bold">Good evening</h1>
                    <div class="flex gap-5 text-xl">
                        <i class="fa-regular fa-bell"></i>
                        <i class="fa-solid fa-gear"></i>
                    </div>
                </header>
                <div id="shortcutGrid" class="shortcut-grid"></div>
                <div class="mt-6">
                    <h2 class="text-xl font-bold px-4 mb-4">Trending Now</h2>
                    <div id="recentList" class="flex flex-col"></div>
                </div>
            </div>

            <!-- SEARCH VIEW -->
            <div id="search" class="view bg-black">
                <header class="p-4 pt-10">
                    <h1 class="text-2xl font-bold mb-4">Search</h1>
                    <div class="bg-white text-black p-3 rounded font-bold flex items-center gap-3">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input type="text" id="mainSearch" placeholder="Search songs..." class="w-full outline-none bg-transparent">
                    </div>
                    <div id="searchRecs" class="mt-4"></div>
                </header>
            </div>
        </div>

        <!-- MINI PLAYER & NAV -->
        <div class="ui-fixed-bottom">
            <div class="mini-player" onclick="toggleFullPlayer(true)">
                <img id="playerThumb" src="" class="w-10 h-10 rounded">
                <div class="flex-1 ml-3 overflow-hidden">
                    <p id="playerTitle" class="text-xs font-bold truncate">Not playing</p>
                    <p id="playerArtist" class="text-[10px] text-gray-400 truncate">Select a song</p>
                </div>
                <i class="fa-solid fa-play text-white text-xl mr-2"></i>
                <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
            </div>
            <nav class="bottom-nav">
                <div class="nav-item active" onclick="switchTab('home', this)"><i class="fa-solid fa-house text-xl mb-1"></i><span>Home</span></div>
                <div class="nav-item" onclick="switchTab('search', this)"><i class="fa-solid fa-magnifying-glass text-xl mb-1"></i><span>Search</span></div>
            </nav>
        </div>
    </div>

    <script>
        const fallbackThumb = "https://audifydev-del.github.io/open/assets/ic.png";
        const BANNED_KEYWORDS = ['bollywood', 't-series', 'remix', 'hindi', 'mashup', 'cover'];

        function isClean(song) {
            const text = `${song.title} ${song.artist}`.toLowerCase();
            return !BANNED_KEYWORDS.some(word => text.includes(word));
        }

        async function fetchSongs(query) {
            try {
                const response = await fetch(`/search?q=${encodeURIComponent(query)}`);
                const data = await response.json();
                return data.filter(isClean);
            } catch (err) { return []; }
        }

        function toggleFullPlayer(show) {
            const player = document.getElementById('full-player');
            if (show) player.classList.add('open');
            else player.classList.remove('open');
        }

        function playSong(title, artist, thumb, videoId) {
            // Update Mini Player
            document.getElementById('playerTitle').innerText = title;
            document.getElementById('playerArtist').innerText = artist;
            document.getElementById('playerThumb').src = thumb || fallbackThumb;
            
            // Update Full Player
            document.getElementById('mainPlayerTitle').innerText = title;
            document.getElementById('mainPlayerArtist').innerText = artist;
            document.getElementById('mainPlayerThumb').src = thumb || fallbackThumb;

            if (videoId) {
                document.getElementById('yt-player-container').innerHTML = `
                    <iframe src="https://www.youtube.com/embed/${videoId}?autoplay=1" allow="autoplay"></iframe>`;
                
                // Automatically open the player
                toggleFullPlayer(true);
                
                // Progress Simulation
                let p = 0;
                const interval = setInterval(() => {
                    p += 1;
                    if(p > 100) clearInterval(interval);
                    document.getElementById('progressFill').style.width = p + '%';
                    document.getElementById('fullProgressFill').style.width = p + '%';
                }, 1000);
            }
        }

        async function loadHome() {
            const trending = await fetchSongs("top hits 2026");
            const hits = await fetchSongs("popular tracks");
            
            document.getElementById('shortcutGrid').innerHTML = hits.slice(0, 6).map(s => `
                <div class="shortcut-card" onclick="playSong('${s.title.replace(/'/g, "\\'")}', '${s.artist.replace(/'/g, "\\'")}', '${s.thumbnail}', '${s.videoId}')">
                    <img src="${s.thumbnail}"><span>${s.title}</span>
                </div>`).join('');

            document.getElementById('recentList').innerHTML = trending.slice(0, 8).map(s => `
                <div class="song-list-item" onclick="playSong('${s.title.replace(/'/g, "\\'")}', '${s.artist.replace(/'/g, "\\'")}', '${s.thumbnail}', '${s.videoId}')">
                    <img src="${s.thumbnail}" class="w-12 h-12 rounded">
                    <div class="flex-1 overflow-hidden"><p class="font-bold truncate">${s.title}</p><p class="text-xs text-gray-400">${s.artist}</p></div>
                </div>`).join('');
        }

        function switchTab(tabId, el) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        }

        window.onload = () => {
            loadHome();
            setTimeout(() => {
                document.getElementById('splash-screen').style.opacity = '0';
                setTimeout(() => document.getElementById('splash-screen').remove(), 500);
            }, 1000);
        };
    </script>
</body>
</html>
