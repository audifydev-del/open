<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Audify</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        [x-cloak] { display: none !important; }
        :root { --app-height: 100dvh; }
        body { background: #000; color: white; overflow: hidden; height: var(--app-height); font-family: 'Inter', sans-serif; }
        .app-shell { width: 100%; max-width: 450px; height: var(--app-height); margin: 0 auto; position: relative; display: flex; flex-direction: column; }
        .shelf { display: flex; overflow-x: auto; gap: 16px; scrollbar-width: none; padding-bottom: 10px; }
        .shelf::-webkit-scrollbar { display: none; }
        .bottom-nav { background: linear-gradient(to top, #000 85%, transparent); position: absolute; bottom: 0; left: 0; right: 0; height: 85px; display: flex; justify-content: space-around; align-items: center; z-index: 50; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { display: flex; flex-direction: column; align-items: center; opacity: 0.6; transition: 0.2s; cursor: pointer; }
        .nav-item.active { opacity: 1; transform: scale(1.1); }
        .player-view { position: absolute; inset: 0; z-index: 100; background: #121212; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1); overflow-y: auto; }
        .immersive-img { width: 100%; height: 70vh; object-fit: cover; mask-image: linear-gradient(to bottom, black 30%, transparent 100%); -webkit-mask-image: linear-gradient(to bottom, black 30%, transparent 100%); }
        .btn-active:active { transform: scale(0.95); opacity: 0.8; }
    </style>
</head>
<body x-data="audifyApp()" x-init="init()">

    <!-- Splash Screen -->
    <div class="fixed inset-0 bg-black z-[200] flex items-center justify-center" x-show="splash" x-transition:leave="duration-700">
        <div class="text-center">
            <div class="w-16 h-16 border-4 border-white border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
            <p class="font-bold tracking-widest uppercase text-xs">Audify</p>
        </div>
    </div>

    <div class="app-shell" x-cloak>
        <main class="flex-grow overflow-y-auto px-4 pt-12 pb-44 z-10 relative">
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-2xl font-bold" x-text="currentView === 'home' ? greet() : 'Search'"></h1>
                <div class="flex gap-4 text-xl"><i class="fa-regular fa-bell"></i><i class="fa-solid fa-gear"></i></div>
            </div>

            <!-- Home View -->
            <div x-show="currentView === 'home'" x-transition>
                <div class="grid grid-cols-2 gap-2 mb-8">
                    <template x-for="s in trending.slice(0, 6)">
                        <div @click="play(s)" class="bg-white/10 rounded flex items-center gap-2 h-14 btn-active overflow-hidden">
                            <img :src="s.thumbnail" class="h-full w-14 object-cover">
                            <span class="text-[10px] font-bold truncate pr-1" x-text="s.title"></span>
                        </div>
                    </template>
                </div>
                <h2 class="text-xl font-bold mb-4">Jump back in</h2>
                <div class="shelf">
                    <template x-for="s in trending">
                        <div @click="play(s)" class="w-32 flex-shrink-0 btn-active">
                            <img :src="s.thumbnail" class="w-32 h-32 rounded shadow-lg mb-2 object-cover">
                            <p class="text-xs font-bold truncate" x-text="s.title"></p>
                            <p class="text-[10px] text-zinc-400 truncate" x-text="s.artist"></p>
                        </div>
                    </template>
                </div>
            </div>

            <!-- Search View -->
            <div x-show="currentView === 'search'" x-transition>
                <div class="relative mb-6">
                    <i class="fa-solid fa-magnifying-glass absolute left-3 top-3.5 text-zinc-400"></i>
                    <input type="text" x-model="query" @input.debounce.500ms="searchMusic()" placeholder="Search YouTube Music..." class="w-full p-3 pl-10 rounded-md bg-zinc-800 text-white font-medium outline-none focus:ring-1 ring-white/30">
                </div>
                <div class="flex flex-col gap-4">
                    <template x-for="s in searchResults">
                        <div @click="play(s)" class="flex items-center gap-4 btn-active">
                            <img :src="s.thumbnail" class="w-12 h-12 rounded object-cover">
                            <div class="overflow-hidden">
                                <p class="font-bold text-sm truncate" x-text="s.title"></p>
                                <p class="text-xs text-zinc-400 truncate" x-text="s.artist"></p>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </main>

        <!-- Mini Player -->
        <div x-show="active && !open" @click="open=true" class="fixed bottom-[90px] left-2 right-2 max-w-[430px] mx-auto bg-zinc-900 h-14 rounded-md flex items-center px-2 gap-3 z-40 shadow-2xl">
            <img :src="active?.thumbnail" class="w-10 h-10 rounded object-cover">
            <div class="flex-grow overflow-hidden">
                <p class="text-[11px] font-bold truncate" x-text="active?.title"></p>
                <p class="text-[9px] text-zinc-400 truncate" x-text="active?.artist"></p>
            </div>
            <button @click.stop="toggle()"><i class="fa-solid text-white p-2" :class="playing ? 'fa-pause' : 'fa-play'"></i></button>
        </div>

        <nav class="bottom-nav">
            <div class="nav-item" :class="currentView === 'home' ? 'active' : ''" @click="currentView = 'home'"><i class="fa-solid fa-house"></i><span class="text-[10px]">Home</span></div>
            <div class="nav-item" :class="currentView === 'search' ? 'active' : ''" @click="currentView = 'search'"><i class="fa-solid fa-magnifying-glass"></i><span class="text-[10px]">Search</span></div>
        </nav>

        <!-- Full Player -->
        <div x-show="open" class="player-view" x-transition:enter="translate-y-full" x-transition:enter-end="translate-y-0" x-transition:leave="translate-y-full">
            <div class="min-h-screen p-8 flex flex-col relative">
                <img :src="active?.thumbnail" class="absolute inset-0 immersive-img opacity-40">
                <header class="flex justify-between items-center z-10"><i class="fa-solid fa-chevron-down text-2xl p-2" @click="open=false"></i><p class="text-[10px] font-bold uppercase tracking-widest">YouTube Stream</p><i class="fa-solid fa-ellipsis p-2"></i></header>
                
                <div class="mt-auto z-10 pb-16">
                    <h2 class="text-3xl font-black mb-1 truncate" x-text="active?.title"></h2>
                    <p class="text-lg text-zinc-300 mb-8 truncate" x-text="active?.artist"></p>
                    
                    <!-- Simplified Progress -->
                    <div class="relative h-1 bg-white/20 rounded mb-6">
                        <div class="absolute h-full bg-white rounded" :style="`width: ${prog}%`"></div>
                    </div>

                    <div class="flex justify-around items-center">
                        <i class="fa-solid fa-backward-step text-3xl btn-active"></i>
                        <button @click="toggle()" class="w-16 h-16 bg-white text-black rounded-full flex items-center justify-center btn-active shadow-xl">
                            <i class="fa-solid text-2xl" :class="playing ? 'fa-pause' : 'fa-play'"></i>
                        </button>
                        <i class="fa-solid fa-forward-step text-3xl btn-active"></i>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Note: YouTube Music doesn't provide direct audio URLs easily. 
             This player assumes you are piping audio or using the videoId to stream. -->
        <audio id="aud" @timeupdate="prog = ($el.currentTime / $el.duration) * 100" @ended="playing=false"></audio>
    </div>

    <script>
        function audifyApp() {
            return {
                splash: true, currentView: 'home', query: '', open: false,
                playing: false, prog: 0, trending: [], searchResults: [], active: null,
                greet() { 
                    const h = new Date().getHours();
                    return h < 12 ? 'Good morning' : h < 18 ? 'Good afternoon' : 'Good evening';
                },
                async init() {
                    setTimeout(() => this.splash = false, 1500);
                    // On load, fetch trending songs from your Python /search endpoint
                    try {
                        const res = await fetch('/search?q=trending+hits');
                        this.trending = await res.json();
                    } catch(e) { console.error("Init fetch failed"); }
                },
                async searchMusic() {
                    if(!this.query) return;
                    try {
                        const res = await fetch(`/search?q=${encodeURIComponent(this.query)}`);
                        this.searchResults = await res.json();
                    } catch(e) { console.error("Search failed"); }
                },
                play(s) {
                    this.active = s;
                    this.open = true;
                    this.playing = true;
                    // Important: ytmusicapi gives you a videoId. 
                    // To actually HEAR audio, you need a streaming URL provider 
                    // or a library that converts videoId to a streamable .mp3/webm.
                    console.log("Now playing ID:", s.id); 
                },
                toggle() {
                    const a = document.getElementById('aud');
                    if(!a.src) return;
                    a.paused ? a.play() : a.pause();
                    this.playing = !a.paused;
                }
            }
        }
    </script>
</body>
</html>
