<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Audify</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Base theme starts dark, changes dynamically */
        :root { --theme-color: #0a0a0a; }
        [x-cloak] { display: none !important; }
        
        body, html { 
            background-color: #000; margin: 0; padding: 0; 
            height: 100%; width: 100%; display: flex; 
            justify-content: center; align-items: center; overflow: hidden;
        }

        .app-shell { 
            width: 100%; max-width: 450px; height: 100%; 
            position: relative; 
            /* This makes the home page background change too! */
            background-color: var(--theme-color); 
            transition: background-color 1s ease;
            overflow: hidden;
        }

        /* Home Page Layer */
        .home-page { 
            position: absolute; inset: 0;
            display: flex; flex-direction: column; z-index: 1;
            /* Subtle gradient to keep top readable */
            background: linear-gradient(to bottom, rgba(0,0,0,0.4) 0%, transparent 30%);
        }

        /* Player Overlay */
        .immersive-player {
            position: absolute; inset: 0;
            background-color: var(--theme-color); 
            z-index: 100;
            display: flex; flex-direction: column;
            transition: transform 0.6s cubic-bezier(0.32, 0.72, 0, 1), background-color 1s ease;
            will-change: transform;
        }

        .artwork-container { 
            position: absolute; top: 0; left: 0; width: 100%; height: 65%; z-index: 1;
        }
        .artwork-container img { width: 100%; height: 100%; object-fit: cover; }
        
        .artwork-overlay { 
            position: absolute; inset: 0; 
            background: linear-gradient(to bottom, transparent 0%, rgba(0,0,0,0.2) 50%, var(--theme-color) 100%); 
            z-index: 2;
        }

        .player-content { 
            position: relative; z-index: 10; margin-top: auto;
            padding: 0 30px 60px;
        }

        input[type="range"].progress-bar { 
            width: 100%; -webkit-appearance: none; background: rgba(255,255,255,0.2); 
            height: 4px; border-radius: 4px; outline: none;
        }
        input[type="range"].progress-bar::-webkit-slider-thumb { 
            -webkit-appearance: none; height: 14px; width: 14px; background: #fff; border-radius: 50%; 
        }

        /* Transparent cards to show the background color */
        .song-card { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(10px);
            border-radius: 12px; padding: 10px; 
            border: 1px solid rgba(255,255,255,0.1); 
        }
        
        #yt-hidden { position: absolute; top: -9999px; visibility: hidden; }
        canvas { display: none; }
    </style>
</head>
<body>

<div x-data="audifyApp()" x-init="initApp()" class="app-shell">
    <canvas id="colorCanvas"></canvas>
    
    <!-- HOME PAGE -->
    <div class="home-page">
        <header class="p-6 shrink-0">
            <h1 class="text-3xl font-black mb-4 tracking-tighter text-white">Audify</h1>
            <input type="text" x-model="searchQuery" @keydown.enter="fetchData(searchQuery)" 
                   placeholder="Search..." 
                   class="w-full bg-white/10 backdrop-blur-md rounded-xl py-3 px-5 text-white outline-none border border-white/10">
        </header>

        <main class="flex-grow overflow-y-auto px-4 pb-10">
            <div class="grid grid-cols-2 gap-4">
                <template x-for="song in songs" :key="song.id">
                    <div class="song-card active:scale-95 transition-all" @click="playSong(song)">
                        <img :src="song.thumbnail" class="w-full aspect-square rounded-lg object-cover mb-2">
                        <p class="text-xs font-bold truncate text-white" x-text="song.title"></p>
                        <p class="text-[10px] text-white/50 truncate" x-text="song.artist"></p>
                    </div>
                </template>
            </div>
        </main>
    </div>

    <!-- PLAYER -->
    <div class="immersive-player" 
         :style="playerOpen ? 'transform: translateY(0)' : 'transform: translateY(100%)'">
        
        <div class="artwork-container">
            <img :src="activeTrack?.thumbnail" id="main-thumb" crossorigin="anonymous">
            <div class="artwork-overlay"></div>
        </div>

        <div class="relative z-20 flex justify-between p-6 pt-10 text-white">
            <button @click="playerOpen = false" class="p-2 active:opacity-50"><i class="fa-solid fa-chevron-down text-xl"></i></button>
            <i class="fa-solid fa-ellipsis-vertical text-xl opacity-50 p-2"></i>
        </div>

        <div class="player-content text-white">
            <div class="mb-10">
                <h2 class="text-2xl font-black truncate leading-tight" x-text="activeTrack?.title"></h2>
                <p class="text-lg text-white/60 font-bold" x-text="activeTrack?.artist"></p>
            </div>

            <div class="mb-8">
                <input type="range" class="progress-bar" min="0" :max="duration" x-model="currentTime" @input="seekMusic">
                <div class="flex justify-between mt-3 text-[10px] font-bold text-white/40 tracking-widest uppercase">
                    <span x-text="formatTime(currentTime)">0:00</span>
                    <span x-text="formatTime(duration)">0:00</span>
                </div>
            </div>

            <div class="flex justify-between items-center px-2">
                <i class="fa-solid fa-shuffle text-xl opacity-20"></i>
                <i class="fa-solid fa-backward-step text-3xl"></i>
                <button @click="togglePlay()" class="w-16 h-16 bg-white text-black rounded-full flex items-center justify-center shadow-2xl active:scale-90 transition-transform">
                    <i class="fa-solid text-2xl" :class="isPlaying ? 'fa-pause' : 'fa-play'"></i>
                </button>
                <i class="fa-solid fa-forward-step text-3xl"></i>
                <i class="fa-solid fa-repeat text-xl opacity-20"></i>
            </div>
        </div>
    </div>

    <div id="yt-hidden"><div id="youtube-player"></div></div>
</div>

<script>
    var player;
    function audifyApp() {
        return {
            songs: [], searchQuery: '', activeTrack: null, playerOpen: false, isPlaying: false, currentTime: 0, duration: 0,
            initApp() {
                this.fetchData('Latest Music');
                let tag = document.createElement('script');
                tag.src = "https://www.youtube.com/iframe_api";
                document.head.appendChild(tag);
            },
            async fetchData(q) {
                const res = await fetch(`/search?q=${encodeURIComponent(q)}`);
                this.songs = await res.json();
            },
            async playSong(song) {
                this.activeTrack = song;
                this.playerOpen = true;
                this.isPlaying = true;

                // ITUNES ARTWORK FETCH
                const itunesUrl = `https://itunes.apple.com/search?term=${encodeURIComponent(song.artist + ' ' + song.title)}&limit=1&entity=song`;
                
                try {
                    const response = await fetch(itunesUrl);
                    const data = await response.json();
                    if (data.results && data.results.length > 0) {
                        const highRes = data.results[0].artworkUrl100.replace('100x100bb.jpg', '1000x1000bb.jpg');
                        this.activeTrack.thumbnail = highRes;

                        // COLOR EXTRACTION
                        const img = new Image();
                        img.crossOrigin = "Anonymous";
                        img.src = `https://images1-focus-opensocial.googleusercontent.com/gadgets/proxy?container=focus&refresh=2592000&url=${encodeURIComponent(highRes)}`;
                        img.onload = () => this.updateTheme(img);
                    }
                } catch (e) { console.error("iTunes Error", e); }

                if (player && typeof player.loadVideoById === 'function') {
                    player.loadVideoById(song.id);
                } else {
                    player = new YT.Player('youtube-player', {
                        height: '1', width: '1', videoId: song.id,
                        events: { 'onStateChange': (e) => { if(e.data == 1) this.duration = Math.floor(player.getDuration()); } }
                    });
                }
                
                if(!this.intervalSet) {
                    setInterval(() => { 
                        if(player && this.isPlaying && player.getCurrentTime) 
                            this.currentTime = Math.floor(player.getCurrentTime()); 
                    }, 1000);
                    this.intervalSet = true;
                }
            },
            updateTheme(img) {
                const canvas = document.getElementById('colorCanvas');
                const ctx = canvas.getContext('2d');
                canvas.width = 10; canvas.height = 10;
                ctx.drawImage(img, 0, 0, 10, 10);
                const p = ctx.getImageData(0, 0, 10, 10).data;
                
                let r=0, g=0, b=0;
                for (let i=0; i<p.length; i+=4) { r += p[i]; g += p[i+1]; b += p[i+2]; }
                r = Math.floor(r/25); g = Math.floor(g/25); b = Math.floor(b/25);
                
                // Adjusted darkening: slightly lighter than before for iTunes art
                const finalColor = `rgb(${Math.max(15, r-30)}, ${Math.max(15, g-30)}, ${Math.max(15, b-30)})`;
                document.documentElement.style.setProperty('--theme-color', finalColor);
            },
            seekMusic() { if(player) player.seekTo(this.currentTime, true); },
            togglePlay() { 
                if(!player) return;
                this.isPlaying = !this.isPlaying; 
                this.isPlaying ? player.playVideo() : player.pauseVideo(); 
            },
            formatTime(s) { if(!s) return '0:00'; let m=Math.floor(s/60), sec=Math.floor(s%60); return `${m}:${sec<10?'0':''}${sec}`; }
        }
    }
</script>
</body>
</html>
