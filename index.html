<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Audify</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --theme-color: #121212; }
        [x-cloak] { display: none !important; }
        
        body, html { 
            background-color: #000; color: white; font-family: 'Inter', sans-serif; 
            margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden;
        }

        /* Centered Homepage Shell */
        .app-shell { 
            width: 100%; max-width: 450px; height: 100dvh; margin: 0 auto; 
            position: relative; background: #000; display: flex; flex-direction: column;
        }

        /* THE PLAYER (Floating Layer) */
        .immersive-player {
            position: fixed; top: 0; left: 50%; transform: translateX(-50%);
            width: 100%; max-width: 450px; height: 100%;
            background-color: var(--theme-color); 
            z-index: 999; /* Higher than everything */
            display: flex; flex-direction: column;
            transition: transform 0.5s cubic-bezier(0.32, 0.72, 0, 1), background-color 0.8s ease;
            pointer-events: all;
        }

        .artwork-container { position: absolute; top: 0; left: 0; width: 100%; height: 60%; z-index: 1; }
        .artwork-container img { width: 100%; height: 100%; object-fit: cover; }
        .artwork-overlay { 
            position: absolute; inset: 0; 
            background: linear-gradient(to bottom, transparent 0%, rgba(0,0,0,0.3) 50%, var(--theme-color) 100%); 
            z-index: 2; 
        }

        .player-content { position: relative; z-index: 10; margin-top: auto; padding: 0 30px 60px; }
        
        /* Smooth Range Slider */
        input[type="range"].progress-bar { width: 100%; -webkit-appearance: none; background: rgba(255,255,255,0.1); height: 4px; border-radius: 2px; outline: none; }
        input[type="range"].progress-bar::-webkit-slider-thumb { -webkit-appearance: none; height: 14px; width: 14px; background: #fff; border-radius: 50%; }

        .song-card { background: #111; border-radius: 12px; padding: 10px; border: 1px solid rgba(255,255,255,0.05); }
        #yt-hidden { position: absolute; top: -9999px; left: -9999px; visibility: hidden; }
        canvas { display: none; }
    </style>
</head>
<body>

<div x-data="audifyApp()" x-init="initApp()" class="h-full w-full">
    <canvas id="colorCanvas"></canvas>
    
    <div class="app-shell">
        <!-- HEADER -->
        <header class="p-6 shrink-0">
            <h1 class="text-3xl font-black mb-4 tracking-tighter">Audify</h1>
            <div class="relative">
                <input type="text" x-model="searchQuery" @keydown.enter="fetchData(searchQuery)" 
                       placeholder="Search music..." 
                       class="w-full bg-zinc-900/50 rounded-xl py-3 px-5 outline-none border border-white/10 focus:border-white/30 transition-all">
            </div>
        </header>

        <!-- CENTERED LIST -->
        <main class="flex-grow overflow-y-auto px-4 pb-10">
            <div class="grid grid-cols-2 gap-4">
                <template x-for="song in songs" :key="song.id">
                    <div class="song-card active:scale-95 transition-transform" @click="playSong(song)">
                        <img :src="song.thumbnail" class="w-full aspect-square rounded-lg object-cover mb-2 shadow-lg">
                        <p class="text-sm font-bold truncate px-1" x-text="song.title"></p>
                        <p class="text-[11px] text-zinc-500 truncate px-1" x-text="song.artist"></p>
                    </div>
                </template>
            </div>
        </main>

        <!-- PLAYER OVERLAY -->
        <div class="immersive-player" 
             :style="playerOpen ? 'transform: translateX(-50%) translateY(0)' : 'transform: translateX(-50%) translateY(100%)'">
            
            <div class="artwork-container">
                <img :src="activeTrack?.thumbnail" id="main-thumb" crossorigin="anonymous">
                <div class="artwork-overlay"></div>
            </div>

            <div class="relative z-20 flex justify-between p-6 pt-10">
                <button @click="playerOpen = false" class="p-2"><i class="fa-solid fa-chevron-down text-xl"></i></button>
                <button class="p-2"><i class="fa-solid fa-ellipsis-vertical text-xl opacity-50"></i></button>
            </div>

            <div class="player-content">
                <div class="mb-10">
                    <h2 class="text-3xl font-black truncate leading-tight" x-text="activeTrack?.title"></h2>
                    <p class="text-xl text-white/60 font-medium" x-text="activeTrack?.artist"></p>
                </div>

                <div class="mb-8">
                    <input type="range" class="progress-bar" min="0" :max="duration" x-model="currentTime" @input="seekMusic">
                    <div class="flex justify-between mt-3 text-[11px] font-bold text-white/40 tracking-widest">
                        <span x-text="formatTime(currentTime)">0:00</span>
                        <span x-text="formatTime(duration)">0:00</span>
                    </div>
                </div>

                <div class="flex justify-between items-center px-2 pb-6">
                    <i class="fa-solid fa-shuffle text-xl opacity-20"></i>
                    <i class="fa-solid fa-backward-step text-3xl"></i>
                    <button @click="togglePlay()" class="w-20 h-20 bg-white text-black rounded-full flex items-center justify-center shadow-2xl active:scale-90 transition-transform">
                        <i class="fa-solid text-3xl" :class="isPlaying ? 'fa-pause' : 'fa-play'"></i>
                    </button>
                    <i class="fa-solid fa-forward-step text-3xl"></i>
                    <i class="fa-solid fa-repeat text-xl opacity-20"></i>
                </div>
            </div>
        </div>
    </div>

    <div id="yt-hidden"><div id="youtube-player"></div></div>
</div>

<script>
    var player;
    function audifyApp() {
        return {
            songs: [], searchQuery: '', activeTrack: null, playerOpen: false, isPlaying: false, currentTime: 0, duration: 0,
            initApp() {
                this.fetchData('new songs');
                let tag = document.createElement('script');
                tag.src = "https://www.youtube.com/iframe_api";
                document.head.appendChild(tag);
            },
            async fetchData(q) {
                const res = await fetch(`/search?q=${encodeURIComponent(q)}`);
                this.songs = await res.json();
            },
            playSong(song) {
                this.activeTrack = song;
                this.playerOpen = true;
                this.isPlaying = true;

                const proxyUrl = `https://images1-focus-opensocial.googleusercontent.com/gadgets/proxy?container=focus&refresh=2592000&url=${encodeURIComponent(song.thumbnail)}`;
                const img = new Image();
                img.crossOrigin = "Anonymous";
                img.src = proxyUrl;
                img.onload = () => this.extractColor(img);

                if (player) { 
                    player.loadVideoById(song.id); 
                } else { 
                    player = new YT.Player('youtube-player', { 
                        height: '1', width: '1', videoId: song.id, 
                        events: { 'onStateChange': (e) => { if(e.data==1) this.duration = Math.floor(player.getDuration()); } } 
                    }); 
                }
                setInterval(() => { if(player && this.isPlaying) this.currentTime = Math.floor(player.getCurrentTime()); }, 1000);
            },
            extractColor(img) {
                const canvas = document.getElementById('colorCanvas');
                const ctx = canvas.getContext('2d');
                canvas.width = 10; canvas.height = 10;
                ctx.drawImage(img, 0, 0, 10, 10);
                const data = ctx.getImageData(0, 0, 10, 10).data;
                let r=0, g=0, b=0;
                for (let i=0; i<data.length; i+=4) { r += data[i]; g += data[i+1]; b += data[i+2]; }
                r = Math.floor(r/25); g = Math.floor(g/25); b = Math.floor(b/25);
                const color = `rgb(${Math.max(15, r-20)}, ${Math.max(15, g-20)}, ${Math.max(15, b-20)})`;
                document.documentElement.style.setProperty('--theme-color', color);
            },
            seekMusic() { player.seekTo(this.currentTime, true); },
            togglePlay() { this.isPlaying = !this.isPlaying; this.isPlaying ? player.playVideo() : player.pauseVideo(); },
            formatTime(s) { if(!s) return '0:00'; let m=Math.floor(s/60), sec=Math.floor(s%60); return `${m}:${sec<10?'0':''}${sec}`; }
        }
    }
</script>
</body>
</html>
