<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Audify</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        [x-cloak] { display: none !important; }
        :root { --app-height: 100dvh; }
        body { background: #000; color: white; overflow: hidden; height: var(--app-height); font-family: 'Inter', sans-serif; }
        .app-shell { width: 100%; max-width: 450px; height: var(--app-height); margin: 0 auto; position: relative; display: flex; flex-direction: column; background: #000; }
        
        .global-bg {
            position: fixed; inset: 0; width: 100%; height: 100%;
            object-fit: cover; filter: blur(80px) saturate(150%);
            opacity: 0.35; z-index: 0; transition: opacity 0.8s ease;
            pointer-events: none;
        }

        .player-view { 
            position: fixed; inset: 0; z-index: 100; background: #000; 
            transition: transform 0.5s cubic-bezier(0.32, 0.72, 0, 1); 
            overflow-y: auto; scrollbar-width: none;
        }
        
        .lyrics-window { 
            margin-top: 10px; padding: 120px 20px 20px 20px; 
            height: auto; max-height: 550px; overflow-y: auto;
            scrollbar-width: none; position: relative; z-index: 20;
            mask-image: linear-gradient(to bottom, transparent 0%, black 10%, black 95%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 10%, black 95%, transparent 100%);
        }

        .lyrics-line { 
            font-size: 1.6rem; font-weight: 800; line-height: 1.4; 
            color: rgba(255,255,255,0.15); transition: all 0.4s ease; 
            margin-bottom: 30px;
        }
        
        .lyrics-line.active { color: #fff; transform: scale(1.02); text-shadow: 0 0 15px rgba(255,255,255,0.4); }

        .song-card { background: rgba(255,255,255,0.05); border-radius: 16px; transition: 0.3s; }
        .song-card:active { transform: scale(0.95); background: rgba(255,255,255,0.1); }
        
        #yt-player-container { position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none; }
    </style>
</head>
<body x-data="audifyApp()" x-init="init()">

    <!-- Launch Screen -->
    <div x-show="!launched" @click="launch()" class="fixed inset-0 bg-black z-[300] flex flex-col items-center justify-center cursor-pointer">
        <div class="w-20 h-20 bg-white rounded-3xl flex items-center justify-center mb-6 shadow-[0_0_50px_rgba(255,255,255,0.2)]">
            <i class="fa-solid fa-play text-black text-3xl ml-1"></i>
        </div>
        <p class="font-bold tracking-[0.4em] uppercase text-[14px] mb-2">Audify</p>
        <p class="text-zinc-500 text-[10px] uppercase tracking-widest animate-pulse">Tap to Start</p>
    </div>

    <div class="app-shell" x-cloak x-show="launched">
        
        <!-- Header / Search -->
        <header class="p-6 pb-2 z-20">
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-2xl font-black tracking-tighter">Discover</h1>
                <div class="w-10 h-10 rounded-full bg-zinc-800 flex items-center justify-center">
                    <i class="fa-solid fa-user text-sm"></i>
                </div>
            </div>
            <div class="relative">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-zinc-500"></i>
                <input type="text" placeholder="Search songs or artists..." 
                       class="w-full bg-zinc-900 border-none rounded-2xl py-4 pl-12 pr-4 text-sm focus:ring-2 ring-white/20 outline-none">
            </div>
        </header>

        <!-- Main Feed -->
        <main class="flex-grow overflow-y-auto z-10 px-6 pb-32">
            <h3 class="text-zinc-500 text-[10px] font-bold uppercase tracking-widest mb-4">Trending Now</h3>
            
            <div class="grid gap-3">
                <!-- Example Items -->
                <template x-for="song in trending" :key="song.id">
                    <div @click="play(song, trending)" class="song-card p-3 flex items-center gap-4 cursor-pointer">
                        <img :src="song.thumbnail" class="w-14 h-14 rounded-xl object-cover shadow-lg">
                        <div class="flex-grow overflow-hidden">
                            <p class="font-bold text-sm truncate" x-text="song.title"></p>
                            <p class="text-xs text-zinc-500 truncate" x-text="song.artist"></p>
                        </div>
                        <i class="fa-solid fa-play text-zinc-700 mr-2"></i>
                    </div>
                </template>
            </div>
        </main>

        <!-- Mini Player -->
        <div x-show="active && !open" @click="open=true" 
             class="fixed bottom-6 left-4 right-4 bg-zinc-900/90 backdrop-blur-xl border border-white/5 h-20 rounded-2xl flex items-center px-4 gap-4 z-40 shadow-2xl cursor-pointer">
            <img :src="active?.thumbnail" class="w-12 h-12 rounded-xl object-cover">
            <div class="flex-grow overflow-hidden">
                <p class="text-sm font-bold truncate" x-text="active?.title"></p>
                <p class="text-[11px] text-zinc-400 truncate" x-text="active?.artist"></p>
            </div>
            <button @click.stop="toggle()" class="w-10 h-10 flex items-center justify-center">
                <i class="fa-solid text-white text-xl" :class="playing ? 'fa-pause' : 'fa-play'"></i>
            </button>
        </div>

        <!-- Full Player View -->
        <div x-show="open" class="player-view" 
             x-transition:enter="transition duration-500" x-transition:enter-start="translate-y-full">
            <div class="p-8 flex flex-col min-h-full">
                <header class="flex justify-between items-center mb-8">
                    <i class="fa-solid fa-chevron-down text-xl p-2" @click="open=false"></i>
                    <p class="text-[10px] font-bold uppercase tracking-[0.2em]">Now Playing</p>
                    <i class="fa-solid fa-ellipsis text-xl p-2"></i>
                </header>

                <div class="aspect-square w-full mb-10">
                    <img :src="active?.thumbnail" class="w-full h-full rounded-3xl object-cover shadow-[0_40px_80px_rgba(0,0,0,0.6)]">
                </div>

                <div class="mb-8">
                    <h2 class="text-2xl font-black mb-1 truncate" x-text="active?.title"></h2>
                    <p class="text-lg text-white/50 truncate" x-text="active?.artist"></p>
                </div>

                <!-- Progress -->
                <div class="mb-10">
                    <div class="h-1.5 bg-white/10 rounded-full mb-2" @click="seek($event)">
                        <div class="h-full bg-white rounded-full transition-all duration-200" :style="`width: ${prog}%`"></div>
                    </div>
                    <div class="flex justify-between text-[10px] font-bold text-zinc-500">
                        <span x-text="formatTime(currentTime)"></span>
                        <span x-text="formatTime(duration)"></span>
                    </div>
                </div>

                <!-- Controls -->
                <div class="flex justify-around items-center mb-10">
                    <i class="fa-solid fa-backward-step text-3xl" @click="prev()"></i>
                    <button @click="toggle()" class="w-20 h-20 bg-white text-black rounded-full flex items-center justify-center shadow-xl">
                        <i class="fa-solid text-3xl" :class="playing ? 'fa-pause' : 'fa-play'"></i>
                    </button>
                    <i class="fa-solid fa-forward-step text-3xl" @click="next()"></i>
                </div>

                <!-- Lyrics -->
                <div class="lyrics-window" id="lyrics-window">
                    <template x-for="(line, index) in lyrics">
                        <div class="lyrics-line" :id="'line-'+index" :class="currentLineIndex === index ? 'active' : ''" x-text="line.text"></div>
                    </template>
                </div>
            </div>
        </div>

        <div id="yt-player-container"><div id="player"></div></div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let ytPlayer;
        function onYouTubeIframeAPIReady() {
            ytPlayer = new YT.Player('player', {
                height: '1', width: '1', videoId: 'dQw4w9WgXcQ',
                playerVars: { 'autoplay': 0, 'controls': 0, 'playsinline': 1 },
                events: {
                    'onStateChange': (e) => {
                        if(window.audifyAppInstance) {
                            window.audifyAppInstance.playing = (e.data === YT.PlayerState.PLAYING);
                            if (e.data === YT.PlayerState.ENDED) window.audifyAppInstance.next();
                        }
                    }
                }
            });
        }

        function audifyApp() {
            return {
                launched: false, open: false, playing: false,
                prog: 0, currentTime: 0, duration: 0,
                active: null, lyrics: [], currentLineIndex: -1,
                queue: [], currentIndex: -1,
                trending: [
                    { id: 'dQw4w9WgXcQ', title: 'Never Gonna Give You Up', artist: 'Rick Astley', thumbnail: 'https://i.ytimg.com/vi/dQw4w9WgXcQ/maxresdefault.jpg' },
                    { id: 'kJQP7kiw5Fk', title: 'Despacito', artist: 'Luis Fonsi', thumbnail: 'https://i.ytimg.com/vi/kJQP7kiw5Fk/maxresdefault.jpg' }
                ],

                launch() { 
                    this.launched = true; 
                    if(ytPlayer?.playVideo) { ytPlayer.playVideo(); setTimeout(() => ytPlayer.pauseVideo(), 100); }
                },
                formatTime(s) { let m=Math.floor(s/60), sec=Math.floor(s%60); return `${m}:${sec<10?'0':''}${sec}`; },
                
                init() {
                    window.audifyAppInstance = this;
                    setInterval(() => {
                        if(this.playing && ytPlayer?.getCurrentTime) {
                            this.currentTime = ytPlayer.getCurrentTime();
                            this.duration = ytPlayer.getDuration();
                            this.prog = (this.currentTime / this.duration) * 100;
                            this.syncLyrics();
                        }
                    }, 300);
                },

                play(song, list) {
                    this.active = song;
                    this.queue = list;
                    this.currentIndex = list.indexOf(song);
                    ytPlayer.loadVideoById(song.id);
                    this.playing = true;
                    this.fetchLyrics(song);
                },

                async fetchLyrics(track) {
                    try {
                        const res = await fetch(`https://lrclib.net/api/search?track_name=${encodeURIComponent(track.title)}&artist_name=${encodeURIComponent(track.artist)}`);
                        const data = await res.json();
                        if(data.length && data[0].syncedLyrics) {
                            this.lyrics = data[0].syncedLyrics.split('\n').map(line => {
                                const match = line.match(/\[(\d+):(\d+\.\d+)\](.*)/);
                                return match ? { time: parseInt(match[1]) * 60 + parseFloat(match[2]), text: match[3].trim() } : null;
                            }).filter(l => l?.text);
                        } else { this.lyrics = [{time:0, text:"No lyrics found"}]; }
                    } catch(e) { this.lyrics = []; }
                },

                syncLyrics() {
                    let index = this.lyrics.findLastIndex(l => this.currentTime >= l.time);
                    if (index !== -1 && index !== this.currentLineIndex) {
                        this.currentLineIndex = index;
                        const el = document.getElementById('line-' + index);
                        if(el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                },

                toggle() { this.playing ? ytPlayer.pauseVideo() : ytPlayer.playVideo(); },
                next() { if(this.currentIndex < this.queue.length-1) this.play(this.queue[this.currentIndex+1], this.queue); },
                prev() { if(this.currentIndex > 0) this.play(this.queue[this.currentIndex-1], this.queue); },
                seek(e) { ytPlayer.seekTo((e.offsetX / e.currentTarget.offsetWidth) * this.duration); }
            }
        }
    </script>
</body>
</html>
