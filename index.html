<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Audify</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        [x-cloak] { display: none !important; }
        body { 
            background-color: #000; color: white; font-family: 'Inter', sans-serif; 
            overflow: hidden; margin: 0; height: 100dvh; 
        }
        .app-shell { 
            width: 100%; max-width: 450px; height: 100%; margin: 0 auto; 
            position: relative; background: #121212; 
            display: flex; flex-direction: column;
        }

        /* The "Literal" Player Layout */
        .player-view {
            position: absolute;
            inset: 0;
            background: #121212;
            z-index: 100; /* Ensures it sits on top of everything */
            display: flex;
            flex-direction: column;
        }

        .hero-section {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 70%; /* Image takes up most of the top */
            z-index: 1;
        }

        .hero-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .hero-overlay {
            position: absolute;
            inset: 0;
            /* Fades the bottom of the image into the background color */
            background: linear-gradient(to bottom, transparent 0%, rgba(18,18,18,0.4) 60%, #121212 100%);
            z-index: 2;
        }

        .player-ui {
            position: relative;
            z-index: 3; /* Sits above the image and fade */
            margin-top: auto; /* Pushes content to the bottom */
            padding: 40px 25px;
            background: linear-gradient(to top, #121212 80%, transparent);
        }

        #player-container { position: absolute; top: -9999px; visibility: hidden; }
        
        /* Basic list/grid styles */
        .song-card { background: #181818; padding: 10px; border-radius: 8px; }
    </style>
</head>
<body>

<div x-data="audifyApp()" x-init="initApp()">
    <div class="app-shell">
        
        <!-- Library / Search View -->
        <main class="flex-grow overflow-y-auto px-4 pt-6 pb-20" x-show="!playerOpen">
            <h1 class="text-2xl font-black mb-6">Audify</h1>
            
            <div class="mb-6">
                <input type="text" x-model="searchQuery" @keydown.enter="fetchData(searchQuery)" 
                       placeholder="Search songs..." 
                       class="w-full bg-zinc-800 rounded-lg py-3 px-4 outline-none border border-white/10">
            </div>

            <div class="grid grid-cols-2 gap-3">
                <template x-for="song in songs" :key="song.id">
                    <div class="song-card" @click="playSong(song)">
                        <img :src="song.thumbnail" class="w-full aspect-square rounded-md object-cover mb-2">
                        <p class="text-sm font-bold truncate" x-text="song.title"></p>
                        <p class="text-xs text-zinc-400 truncate" x-text="song.artist"></p>
                    </div>
                </template>
            </div>
        </main>

        <!-- THE ACTUAL PLAYER -->
        <template x-if="playerOpen">
            <div class="player-view" x-transition:enter="transition ease-out duration-300" x-transition:enter-start="transform translate-y-full" x-transition:enter-end="transform translate-y-0">
                
                <!-- Background Image Section -->
                <div class="hero-section">
                    <img :src="activeTrack?.thumbnail" class="hero-image">
                    <div class="hero-overlay"></div>
                </div>

                <!-- Top Controls (Floating) -->
                <div class="relative z-10 flex justify-between p-6">
                    <button @click="playerOpen = false" class="w-10 h-10 flex items-center justify-center bg-black/20 rounded-full backdrop-blur-md">
                        <i class="fa-solid fa-chevron-down"></i>
                    </button>
                    <i class="fa-solid fa-ellipsis-vertical text-xl opacity-60"></i>
                </div>

                <!-- Player Controls & Info -->
                <div class="player-ui">
                    <div class="mb-8">
                        <h2 class="text-3xl font-black truncate leading-tight" x-text="activeTrack?.title"></h2>
                        <p class="text-xl text-zinc-400 font-bold" x-text="activeTrack?.artist"></p>
                    </div>

                    <div class="flex justify-between items-center px-4">
                        <i class="fa-solid fa-shuffle text-xl text-zinc-500"></i>
                        <i class="fa-solid fa-backward-step text-3xl"></i>
                        
                        <button @click="togglePlay()" class="w-20 h-20 bg-white text-black rounded-full flex items-center justify-center shadow-2xl active:scale-90 transition-transform">
                            <i class="fa-solid text-3xl" :class="isPlaying ? 'fa-pause' : 'fa-play'"></i>
                        </button>
                        
                        <i class="fa-solid fa-forward-step text-3xl"></i>
                        <i class="fa-solid fa-repeat text-xl text-zinc-500"></i>
                    </div>
                </div>
            </div>
        </template>

        <!-- Hidden Audio Engine -->
        <div id="player-container">
            <iframe id="yt-iframe" src="" allow="autoplay"></iframe>
        </div>
    </div>
</div>

<script>
    function audifyApp() {
        return {
            songs: [], 
            searchQuery: '', 
            activeTrack: null,
            playerOpen: false, 
            isPlaying: false,

            initApp() {
                this.fetchData('new music 2026');
            },

            async fetchData(q) {
                try {
                    const res = await fetch(`/search?q=${encodeURIComponent(q)}`);
                    this.songs = await res.json();
                } catch (e) { console.error("Search failed"); }
            },

            playSong(song) {
                this.activeTrack = song;
                this.isPlaying = true;
                this.playerOpen = true; // Open the player view
                
                // Set Iframe source
                const iframe = document.getElementById('yt-iframe');
                iframe.src = `https://www.youtube.com/embed/${song.id}?autoplay=1&enablejsapi=1`;
            },

            togglePlay() {
                const iframe = document.getElementById('yt-iframe');
                this.isPlaying = !this.isPlaying;
                const command = this.isPlaying ? 'playVideo' : 'pauseVideo';
                iframe.contentWindow.postMessage(JSON.stringify({
                    "event": "command", "func": command, "args": ""
                }), "*");
            }
        }
    }
</script>
</body>
</html>
