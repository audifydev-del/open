<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audify Mobile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;600;700;800&display=swap');

        body {
            background-color: #000;
            color: #fff;
            font-family: 'Figtree', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #splash-screen {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        .app-container {
            width: 100%;
            max-width: 420px;
            height: 100%;
            background-color: #000;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .view-wrapper {
            position: relative;
            flex: 1;
            width: 100%;
            overflow: hidden;
        }

        .view {
            position: absolute;
            inset: 0;
            opacity: 0;
            pointer-events: none;
            transform: translateY(10px);
            transition: opacity 0.3s ease, transform 0.3s ease;
            overflow-y: auto;
            padding-bottom: 180px; 
        }

        .view.active {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0);
            z-index: 10;
        }

        .view::-webkit-scrollbar { display: none; }

        @keyframes songPop {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-song {
            animation: songPop 0.4s ease forwards;
            opacity: 0;
        }

        .home-gradient {
            background: linear-gradient(to bottom, #2a2a2a 0%, #121212 25%, #121212 100%);
        }

        .ui-fixed-bottom {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: linear-gradient(to top, rgba(0,0,0,1) 85%, rgba(0,0,0,0) 100%);
            padding-bottom: env(safe-area-inset-bottom);
        }

        .mini-player {
            background: #282828;
            margin: 0 8px 8px 8px;
            height: 56px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            padding: 0 12px;
            position: relative;
        }

        .bottom-nav {
            height: 70px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: 10px;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 10px;
            color: #b3b3b3;
            cursor: pointer;
            transition: color 0.2s;
        }

        .nav-item.active { color: #fff; }

        .shortcut-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            padding: 16px;
        }

        .shortcut-card {
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            height: 56px;
            display: flex;
            align-items: center;
            overflow: hidden;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
        }

        .shortcut-card img { height: 100%; width: 56px; object-fit: cover; margin-right: 8px; }

        .album-scroll {
            display: flex;
            gap: 16px;
            overflow-x: auto;
            padding: 0 16px 20px 16px;
        }
        .album-scroll::-webkit-scrollbar { display: none; }

        .album-item { min-width: 145px; cursor: pointer; }
        .album-item img {
            width: 145px;
            height: 145px;
            border-radius: 4px;
            margin-bottom: 8px;
            object-fit: cover;
        }

        .artist-item { min-width: 110px; text-align: center; cursor: pointer; }
        .artist-item img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            margin-bottom: 8px;
            object-fit: cover;
        }

        .song-list-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 16px;
            cursor: pointer;
        }

        .thumb-sm { width: 48px; height: 48px; border-radius: 4px; object-fit: cover; }
        .thumb-xs { width: 40px; height: 40px; border-radius: 3px; object-fit: cover; }
        .thumb-round { width: 56px; height: 56px; border-radius: 50%; object-fit: cover; }

        .progress-bar {
            position: absolute;
            bottom: 0;
            left: 12px;
            right: 12px;
            height: 2px;
            background: rgba(255,255,255,0.1);
        }
        .progress-fill { width: 30%; height: 100%; background: #fff; border-radius: 2px; }

        .chip { background: rgba(255,255,255,0.1); padding: 6px 14px; border-radius: 20px; font-size: 12px; white-space: nowrap; cursor: pointer; transition: 0.2s; }
        .chip.active-chip { background: #1ed760; color: #000; }
        
        .artist-banner {
            height: 280px;
            background-size: cover;
            background-position: center;
            position: relative;
            display: flex;
            align-items: flex-end;
            padding: 20px;
        }
        .artist-banner::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.9));
        }
    </style>
</head>
<body>

    <div id="splash-screen">
        <img src="https://audifydev-del.github.io/open/assets/ic.png" alt="Logo" class="w-40 h-40">
    </div>

    <div class="app-container">
        <div class="view-wrapper">
            <!-- HOME VIEW -->
            <div id="home" class="view active home-gradient">
                <header class="p-4 pt-10 flex justify-between items-center">
                    <h1 class="text-2xl font-bold">Good evening</h1>
                    <div class="flex gap-5 text-xl">
                        <i class="fa-regular fa-bell"></i>
                        <i class="fa-solid fa-clock-rotate-left"></i>
                        <i class="fa-solid fa-gear"></i>
                    </div>
                </header>

                <!-- Shortcut Grid (API Linked) -->
                <div id="shortcutGrid" class="shortcut-grid">
                    <!-- Dynamic shortcuts will load here -->
                </div>

                <div class="mt-4">
                    <h2 class="text-xl font-bold px-4 mb-4">Your top mixes</h2>
                    <div id="topMixesScroll" class="album-scroll">
                        <!-- Dynamic mixes will load here -->
                    </div>
                </div>

                <div class="mt-6">
                    <h2 class="text-xl font-bold px-4 mb-4">Popular Artists</h2>
                    <div id="popularArtistsScroll" class="album-scroll">
                        <!-- Dynamic artists will load here -->
                    </div>
                </div>

                <div class="mt-6">
                    <h2 class="text-xl font-bold px-4 mb-4">Trending Now</h2>
                    <div id="recentList" class="flex flex-col">
                        <!-- Trending list will load here -->
                    </div>
                </div>
            </div>

            <!-- SEARCH VIEW -->
            <div id="search" class="view bg-black">
                <header class="p-4 pt-10">
                    <h1 class="text-2xl font-bold mb-4">Search</h1>
                    <div class="bg-white text-black p-3 rounded font-bold flex items-center gap-3 mb-6">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input type="text" id="mainSearch" placeholder="What do you want to listen to?" class="w-full outline-none bg-transparent">
                    </div>
                    <div id="searchDefault">
                        <h2 class="text-lg font-bold mb-4">Browse all</h2>
                        <div class="grid grid-cols-2 gap-3 mb-8">
                            <div class="h-24 bg-pink-600 rounded p-3 font-bold relative overflow-hidden">Pop</div>
                            <div class="h-24 bg-purple-700 rounded p-3 font-bold relative overflow-hidden">Dance</div>
                            <div class="h-24 bg-blue-600 rounded p-3 font-bold relative overflow-hidden">Rock</div>
                            <div class="h-24 bg-orange-600 rounded p-3 font-bold relative overflow-hidden">Hip Hop</div>
                        </div>
                    </div>
                    <div id="searchRecs" class="flex flex-col gap-1 pb-10"></div>
                </header>
            </div>

            <!-- LIBRARY VIEW -->
            <div id="library" class="view bg-black">
                <header class="p-4 pt-10 sticky top-0 bg-black z-20">
                    <h1 class="text-2xl font-bold mb-4">Your Library</h1>
                    <div class="flex gap-2 overflow-x-auto pb-2 no-scrollbar">
                        <div class="chip active-chip" onclick="filterLibrary('all', this)">All</div>
                        <div class="chip" onclick="filterLibrary('playlist', this)">Playlists</div>
                        <div class="chip" onclick="filterLibrary('artist', this)">Artists</div>
                    </div>
                </header>
                <div id="libraryList" class="flex flex-col gap-1 pb-40"></div>
            </div>

            <!-- ARTIST PROFILE VIEW -->
            <div id="artist-profile" class="view bg-[#121212]">
                <div id="artistBanner" class="artist-banner">
                    <button onclick="switchTab('home', document.querySelector('.nav-item'))" class="absolute top-10 left-4 z-20 bg-black/40 w-8 h-8 rounded-full flex items-center justify-center"><i class="fa-solid fa-chevron-left"></i></button>
                    <h1 id="artistNameDisplay" class="text-5xl font-black z-10">Artist</h1>
                </div>
                <div id="artistSongs" class="flex flex-col gap-1 p-2"></div>
            </div>
        </div>

        <!-- FIXED PLAYER & NAV -->
        <div class="ui-fixed-bottom">
            <div class="mini-player">
                <img id="playerThumb" src="https://audifydev-del.github.io/open/assets/ic.png" class="w-10 h-10 rounded">
                <div class="flex-1 ml-3 overflow-hidden">
                    <p id="playerTitle" class="text-xs font-bold truncate">Not playing</p>
                    <p id="playerArtist" class="text-[10px] text-gray-400 truncate">Select a song</p>
                </div>
                <div class="flex items-center gap-5 mr-1">
                    <i class="fa-solid fa-play text-white text-xl"></i>
                </div>
                <div class="progress-bar"><div class="progress-fill"></div></div>
            </div>
            <nav class="bottom-nav">
                <div class="nav-item active" onclick="switchTab('home', this)"><i class="fa-solid fa-house text-xl mb-1"></i><span>Home</span></div>
                <div class="nav-item" onclick="switchTab('search', this)"><i class="fa-solid fa-magnifying-glass text-xl mb-1"></i><span>Search</span></div>
                <div class="nav-item" onclick="switchTab('library', this)"><i class="fa-solid fa-lines-leaning text-xl mb-1"></i><span>Your Library</span></div>
            </nav>
        </div>
    </div>

    <script>
        const fallbackThumb = "https://audifydev-del.github.io/open/assets/ic.png";

        // Global Play Function
        function playSong(title, artist, thumb) {
            document.getElementById('playerTitle').innerText = title;
            document.getElementById('playerArtist').innerText = artist;
            document.getElementById('playerThumb').src = thumb || fallbackThumb;
        }

        // Fetch Songs helper
        async function fetchSongs(query) {
            try {
                const response = await fetch(`/search?q=${encodeURIComponent(query)}`);
                return await response.json();
            } catch (err) {
                console.error("API Error:", err);
                return [];
            }
        }

        // Load Home Sections using API
        async function loadHomeSections() {
            // 1. Load Shortcut Grid
            const shortcutData = await fetchSongs("hits 2026");
            const grid = document.getElementById('shortcutGrid');
            grid.innerHTML = shortcutData.slice(0, 6).map(s => `
                <div class="shortcut-card animate-song" onclick="playSong('${s.title.replace(/'/g, "\\'")}', '${s.artist.replace(/'/g, "\\'")}', '${s.thumbnail}')">
                    <img src="${s.thumbnail}" onerror="this.src='${fallbackThumb}'">
                    <span>${s.title}</span>
                </div>
            `).join('');

            // 2. Load Top Mixes (Albums)
            const mixData = await fetchSongs("lofi hip hop");
            const mixScroll = document.getElementById('topMixesScroll');
            mixScroll.innerHTML = mixData.slice(0, 5).map(s => `
                <div class="album-item" onclick="playSong('${s.title.replace(/'/g, "\\'")}', '${s.artist.replace(/'/g, "\\'")}', '${s.thumbnail}')">
                    <img src="${s.thumbnail}" onerror="this.src='${fallbackThumb}'">
                    <p class="text-[11px] font-bold truncate">${s.title}</p>
                    <p class="text-[10px] text-gray-400 truncate">Daily Mix</p>
                </div>
            `).join('');

            // 3. Load Popular Artists
            const artistData = await fetchSongs("top pop artists");
            const artistScroll = document.getElementById('popularArtistsScroll');
            artistScroll.innerHTML = artistData.slice(0, 6).map(s => `
                <div class="artist-item" onclick="openArtistProfile('${s.artist.replace(/'/g, "\\'")}', '${s.thumbnail}')">
                    <img src="${s.thumbnail}" onerror="this.src='${fallbackThumb}'">
                    <p class="text-xs font-bold truncate">${s.artist}</p>
                </div>
            `).join('');

            // 4. Load Trending List
            const trendData = await fetchSongs("opm trending 2026");
            const recentList = document.getElementById('recentList');
            recentList.innerHTML = trendData.slice(0, 8).map(s => `
                <div class="song-list-item" onclick="playSong('${s.title.replace(/'/g, "\\'")}', '${s.artist.replace(/'/g, "\\'")}', '${s.thumbnail}')">
                    <img src="${s.thumbnail}" class="thumb-sm" onerror="this.src='${fallbackThumb}'">
                    <div class="flex-1 overflow-hidden">
                        <p class="text-base font-bold truncate">${s.title}</p>
                        <p class="text-xs text-gray-400">${s.artist}</p>
                    </div>
                </div>
            `).join('');
        }

        async function openArtistProfile(name, thumb) {
            document.getElementById('artistNameDisplay').innerText = name;
            document.getElementById('artistBanner').style.backgroundImage = `url(${thumb})`;
            switchTab('artist-profile');
            const results = await fetchSongs(name);
            document.getElementById('artistSongs').innerHTML = results.map((s, i) => `
                <div class="song-list-item animate-song" onclick="playSong('${s.title.replace(/'/g, "\\'")}', '${s.artist.replace(/'/g, "\\'")}', '${s.thumbnail}')">
                    <p class="text-gray-400 w-4 text-xs">${i+1}</p>
                    <img src="${s.thumbnail}" class="thumb-xs" onerror="this.src='${fallbackThumb}'">
                    <div class="flex-1 overflow-hidden">
                        <p class="text-base font-bold truncate">${s.title}</p>
                        <p class="text-xs text-gray-400">Popular</p>
                    </div>
                </div>
            `).join('');
        }

        // Search logic
        document.getElementById('mainSearch').addEventListener('keypress', async (e) => {
            if (e.key === 'Enter') {
                const query = e.target.value;
                if (!query) return;
                document.getElementById('searchDefault').style.display = 'none';
                const results = await fetchSongs(query);
                document.getElementById('searchRecs').innerHTML = results.map(s => `
                    <div class="song-list-item animate-song" onclick="playSong('${s.title.replace(/'/g, "\\'")}', '${s.artist.replace(/'/g, "\\'")}', '${s.thumbnail}')">
                        <img src="${s.thumbnail}" class="thumb-sm" onerror="this.src='${fallbackThumb}'">
                        <div class="flex-1 overflow-hidden">
                            <p class="text-base font-bold truncate">${s.title}</p>
                            <p class="text-xs text-gray-400">${s.artist}</p>
                        </div>
                    </div>
                `).join('');
            }
        });

        function switchTab(tabId, el) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            if(el) {
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                el.classList.add('active');
            }
        }

        window.onload = () => {
            loadHomeSections();
            setTimeout(() => {
                document.getElementById('splash-screen').style.opacity = '0';
                setTimeout(() => document.getElementById('splash-screen').remove(), 500);
            }, 1000);
        };
    </script>
</body>
</html>
