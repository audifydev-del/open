<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player - Official Audio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000000; color: #ffffff; }
        .spotify-card { background: #181818; transition: 0.3s; }
        .spotify-card:hover { background: #282828; }
        #player-container { position: absolute; top: -9999px; left: -9999px; }
        .truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    </style>
</head>
<body class="flex flex-col h-screen font-sans overflow-hidden">

    <div class="flex flex-1 overflow-hidden">
        <div class="w-64 bg-black p-6 flex flex-col gap-4 border-r border-zinc-800 hidden md:flex">
            <div class="text-green-500 font-bold text-2xl mb-8 flex items-center gap-2">
                <svg width="30" height="30" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12s5.37 12 12 12 12-5.37 12-12S18.63 0 12 0zm5.49 17.3c-.22.35-.67.46-1.03.25-2.86-1.75-6.47-2.14-10.71-1.17-.4.09-.81-.16-.9-.57-.09-.4.16-.81.57-.9 4.65-1.06 8.62-.61 11.82 1.34.36.22.47.68.25 1.05zm1.47-3.26c-.27.44-.85.58-1.29.31-3.28-2.01-8.27-2.6-12.15-1.42-.5.15-1.03-.13-1.18-.63-.15-.5.13-1.03.63-1.18 4.42-1.34 9.92-.69 13.68 1.62.44.27.58.85.31 1.29zm.13-3.41c-3.93-2.33-10.41-2.55-14.19-1.4-.6.18-1.25-.16-1.43-.77-.18-.6.16-1.25.77-1.43 4.33-1.32 11.51-1.06 16.03 1.63.54.32.72 1.02.4 1.56-.32.54-1.02.72-1.56.4z"/></svg>
                Not-Spotify
            </div>
            <button class="text-left font-bold hover:text-green-500">Home</button>
            <button class="text-left font-bold text-zinc-400 hover:text-white">Your Library</button>
        </div>

        <main class="flex-1 p-8 overflow-y-auto bg-gradient-to-b from-zinc-900 to-black">
            <div class="flex items-center gap-4 mb-10">
                <input id="search-input" type="text" placeholder="Search for Official Audio..." 
                       class="w-full max-w-md p-3 rounded-full bg-zinc-800 text-white border-none focus:ring-2 focus:ring-green-500 outline-none">
                <button onclick="searchMusic()" class="bg-green-500 text-black font-bold py-3 px-8 rounded-full hover:scale-105 transition">Search</button>
            </div>

            <h2 class="text-2xl font-bold mb-6">Results</h2>
            <div id="results" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-6 mb-24">
                </div>
        </main>
    </div>

    <div class="h-24 bg-zinc-950 border-t border-zinc-800 p-4 flex items-center justify-between fixed bottom-0 w-full">
        <div class="flex items-center gap-4 w-1/3">
            <div class="w-14 h-14 bg-zinc-800 rounded shadow-lg overflow-hidden">
                <img id="player-album-art" src="" class="hidden w-full h-full object-cover">
            </div>
            <div class="overflow-hidden">
                <div id="player-title" class="font-bold text-sm truncate">Select a song</div>
                <div id="player-artist" class="text-zinc-400 text-xs truncate">Artist</div>
            </div>
        </div>

        <div class="flex flex-col items-center gap-2 w-1/3">
            <div class="flex items-center gap-6">
                <button onclick="player.pauseVideo()" class="text-zinc-400 hover:text-white text-2xl">⏸</button>
                <button onclick="player.playVideo()" class="bg-white text-black rounded-full w-10 h-10 flex items-center justify-center hover:scale-105 transition">▶</button>
            </div>
            <div id="player-album-display" class="text-[10px] text-zinc-500 uppercase tracking-widest font-bold"></div>
        </div>

        <div class="w-1/3"></div>

        <div id="player-container"><div id="youtube-player"></div></div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        let player;

        // Initialize API
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('youtube-player', {
                height: '0', width: '0',
                playerVars: { 'autoplay': 1, 'playsinline': 1, 'origin': window.location.origin },
                events: { 'onError': onPlayerError }
            });
        }

        function onPlayerError(e) {
            if (e.data === 101 || e.data === 150) {
                alert("This 'Official Audio' is restricted by the label. Try another song.");
            }
        }

        // Search Logic
        async function searchMusic() {
            const query = document.getElementById('search-input').value;
            if (!query) return;

            const res = await fetch(`/search?q=${encodeURIComponent(query)}`);
            const data = await res.json();
            
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '';

            data.forEach(song => {
                resultsDiv.innerHTML += `
                    <div class="spotify-card p-4 rounded-lg cursor-pointer group" 
                         onclick="playSong('${song.id}', '${song.title.replace(/'/g, "\\'")}', '${song.artist.replace(/'/g, "\\'")}', '${song.thumbnail}', '${song.album.replace(/'/g, "\\'")}')">
                        <div class="relative mb-4">
                            <img src="${song.thumbnail}" class="w-full aspect-square object-cover rounded shadow-lg">
                            <div class="absolute bottom-2 right-2 bg-green-500 p-3 rounded-full opacity-0 group-hover:opacity-100 transition translate-y-2 group-hover:translate-y-0 shadow-xl">
                                <svg width="16" height="16" fill="black" viewBox="0 0 24 24"><path d="M3 22v-20l18 10-18 10z"/></svg>
                            </div>
                        </div>
                        <h3 class="font-bold truncate">${song.title}</h3>
                        <p class="text-zinc-400 text-xs truncate">${song.artist}</p>
                    </div>
                `;
            });
        }

        // Play Logic
        function playSong(id, title, artist, thumb, album) {
            document.getElementById('player-title').innerText = title;
            document.getElementById('player-artist').innerText = artist;
            document.getElementById('player-album-display').innerText = album;
            
            const img = document.getElementById('player-album-art');
            img.src = thumb;
            img.classList.remove('hidden');

            if (player && player.loadVideoById) {
                player.loadVideoById(id);
            }
        }
    </script>
</body>
</html>
